name: Encrypt & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  encrypt-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PageCrypt
        run: npm install -g pagecrypt

      - name: Encrypt HTML
        run: |
          mkdir -p _site
          # Production site: Program only (hide CDO Portfolio area / switch). Local repo keeps full app.
          sed -i 's/const ATLAS_INCLUDE_CDO_PORTFOLIO = true/const ATLAS_INCLUDE_CDO_PORTFOLIO = false/' atlas.html
          pagecrypt atlas.html _site/index.html "${{ secrets.SITE_PASSWORD }}"
          # CDO portfolio preview: separate HTML, same password (linked from repo / optional nav when enabled).
          pagecrypt atlas-portfolio-unified.html _site/atlas-portfolio-unified.html "${{ secrets.SITE_PASSWORD }}"
          cp favicon.svg _site/favicon.svg
          # Inject favicon link into the encrypted page's head
          sed -i 's|<head>|<head><link rel="icon" type="image/svg+xml" href="favicon.svg">|' _site/index.html
          sed -i 's|<head>|<head><link rel="icon" type="image/svg+xml" href="favicon.svg">|' _site/atlas-portfolio-unified.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
