function extractFromText(text){
  const tasks=[],people=new Set();let dateFound='';
  text.split('\n').forEach(l=>{
    if(/^(action|todo|task|follow.?up|next.?step|deliver|ai:|action item)\s*[:—\-]/i.test(l.trim()))tasks.push(l.trim().replace(/^[^:—\-]*[:—\-]\s*/,''));
    const names=l.match(/@(\w+(?:\s\w+)?)/g);if(names)names.forEach(n=>people.add(n.replace('@','')));
    if(!dateFound){const dm=l.match(/(\d{4}-\d{2}-\d{2})/);if(dm)dateFound=dm[1]}
  });
  return{tasks,people:[...people],dateFound};
}

async function submitInbox(){
  const text=(document.getElementById('in-content').value||'').trim();
  if(!text){toast('Paste some content first');return}
  const title=document.getElementById('in-title').value.trim();
  const docId=uid();
  const docTitle=title||('Document — '+new Date().toLocaleDateString());

  if(OPENAI_KEY){
    toast('AI is analyzing...');
    const wsContext=(D.workstreams||[]).map(w=>w.id+': '+w.name).join('\n');
    const prompt=`Extract all action items, tasks, follow-ups, and to-dos from the text below. For each, return a JSON array of objects with:
- "title": concise task description
- "owner": person responsible (if mentioned, otherwise "")
- "due": date in YYYY-MM-DD format (if mentioned or inferable, otherwise "")
- "priority": "high", "medium", or "low" based on urgency
- "workstream": best-matching workstream ID from the list below, or "" if none fit
- "isMilestone": true if it's a major deliverable or milestone, false for regular tasks

WORKSTREAMS:
${wsContext||'(none defined yet)'}

Return ONLY valid JSON array, no markdown fences or explanation.

TEXT:
${text}`;
    const result=await callAI(
      'You are a project management assistant for an enterprise AI Transformation Program at Digital Realty. Extract actionable tasks from text. Be thorough — capture every action item, follow-up, and deliverable mentioned.',
      prompt
    );
    let aiTasks=[];
    if(result){
      try{aiTasks=JSON.parse(result.replace(/```json?\n?/g,'').replace(/```/g,'').trim())}catch(e){
        try{const m=result.match(/\[[\s\S]*\]/);if(m)aiTasks=JSON.parse(m[0])}catch(e2){}
      }
    }
    if(aiTasks.length){
      const extractedTasks=aiTasks.map(t=>t.title);
      D.inbox.push({id:docId,title:docTitle,source:inboxSrc,content:text,created:new Date().toISOString(),extractedTasks,aiTasks,people:[],dateFound:'',addedBy:ME});
      save();log('AI extracted '+aiTasks.length+' task(s) from: '+esc(docTitle));
      document.getElementById('in-title').value='';document.getElementById('in-content').value='';
      render();toast(aiTasks.length+' tasks found by AI — review below');
      return;
    }
  }

  const ex=extractFromText(text);
  D.inbox.push({id:docId,title:docTitle,source:inboxSrc,content:text,created:new Date().toISOString(),extractedTasks:ex.tasks,people:ex.people,dateFound:ex.dateFound,addedBy:ME});
  save();log('Added to inbox: '+esc(docTitle));
  document.getElementById('in-title').value='';document.getElementById('in-content').value='';
  render();toast(ex.tasks.length?ex.tasks.length+' tasks found — review below':'Document added'+(OPENAI_KEY?'':' (set AI key for smarter extraction)'));
}

function addGroup(){
  const inp=document.getElementById('new-group-name');if(!inp)return;
  const name=inp.value.trim();if(!name){toast('Enter a group name');return}
  if(!D.groups)D.groups=[];
  if(D.groups.includes(name)){toast('That group already exists');return}
  D.groups.push(name);D.groups.sort((a,b)=>a.localeCompare(b));
  save();inp.value='';openManageGroupsModal();toast('Group added');
}
function editGroupStart(btn){
  const row=btn.closest('tr.grp-row');if(!row)return;
  document.querySelectorAll('.grp-row').forEach(r=>{r.querySelector('.grp-label').style.display='';r.querySelector('.grp-edit').style.display='none'});
  const lbl=row.querySelector('.grp-label');const ed=row.querySelector('.grp-edit');
  if(lbl)lbl.style.display='none';if(ed){ed.style.display='block';ed.value=ed.getAttribute('data-original')||'';ed.focus();}
  document.getElementById('grp-edit-ft').style.display='flex';
}
function editGroupSave(){
  const ed=document.querySelector('.grp-edit[style*="block"]');
  if(!ed||!ed.value.trim()){editGroupCancel();return}
  const oldName=(ed.getAttribute('data-original')||'').replace(/&#39;/g,"'");
  const newName=ed.value.trim().replace(/&#39;/g,"'");
  if(!oldName||oldName===newName){editGroupCancel();return}
  if((D.groups||[]).includes(newName)){toast('A group with that name already exists');return}
  const idx=(D.groups||[]).indexOf(oldName);
  if(idx>=0)D.groups[idx]=newName;
  else{D.groups=D.groups||[];D.groups.push(newName);D.groups.sort((a,b)=>a.localeCompare(b))}
  (D.people||[]).forEach(p=>{if(p.group===oldName)p.group=newName});
  D.groups.sort((a,b)=>a.localeCompare(b));save();openManageGroupsModal();toast('Group renamed');
}
function editGroupCancel(){openManageGroupsModal();}
function deleteGroup(btn){
  const row=btn.closest('tr.grp-row');if(!row)return;
  const g=(row.getAttribute('data-gname')||'').replace(/&#39;/g,"'");
  if(!g)return;
  if(!confirm('Remove the group "'+g+'"? All people in this group will have their group cleared.'))return;
  D.groups=(D.groups||[]).filter(x=>x!==g);
  (D.people||[]).forEach(p=>{if(p.group===g)p.group=''});
  save();openManageGroupsModal();render();toast('Group removed');
}

function recentAccomplishmentsFromApp(wsId){
  const done=(D.tasks||[]).filter(t=>t.workstream===wsId&&t.status==='done').sort((a,b)=>{
    const mile=(t)=>(t.isMilestone?1:0); if(mile(b)!==mile(a))return mile(b)-mile(a);
    return (b.due||'0').localeCompare(a.due||'0');
  });
  return done.slice(0,3).map(t=>'• '+(t.title||'')+(t.due?' ('+fmtDate(t.due)+')':'')).filter(s=>s.length>2).join('\n')||'';
}
function whatsNextFromApp(wsId){
  const open=(D.tasks||[]).filter(t=>t.workstream===wsId&&t.status!=='done').sort((a,b)=>{
    const mile=(t)=>(t.isMilestone?1:0); if(mile(b)!==mile(a))return mile(b)-mile(a);
    return (a.due||'9').localeCompare(b.due||'9');
  });
  return open.slice(0,2).map(t=>'• '+(t.title||'')+(t.due?' ('+fmtDate(t.due)+')':'')).filter(s=>s.length>2).join('\n')||'';
}
function fillWsFromApp(wsId){
  const rec=document.getElementById('ws-recent');const nxt=document.getElementById('ws-whatsnext');
  if(rec)rec.value=recentAccomplishmentsFromApp(wsId);
  if(nxt)nxt.value=whatsNextFromApp(wsId);
  toast('Filled from tasks in the app — edit and Save');
}
function updateAllWorkstreamsFromActionItems(){
  const allWs=(D.workstreams||[]).filter(w=>w.category==='BU'||w.category==='Cross-cutting');
  let updated=0;
  allWs.forEach(w=>{
    const rec=recentAccomplishmentsFromApp(w.id);
    const nxt=whatsNextFromApp(w.id);
    w.recentAccomplishments=rec;
    w.whatsNext=nxt;
    updated++;
  });
  save();render();
  toast(updated?'Recent accomplishments & What\'s next updated for '+updated+' workstreams from action items':'No report workstreams to update');
}

async function runAskAI(){
  const inp=document.getElementById('ask-input');
  const q=(inp&&inp.value||'').trim();
  if(!q){toast('Enter a question');return}
  if(!OPENAI_KEY){toast('Set your OpenAI API key first (sidebar)');return}
  const wrap=document.getElementById('ask-response-wrap');
  const respEl=document.getElementById('ask-response');
  if(wrap)wrap.style.display='';
  if(respEl)respEl.innerHTML='<p style="color:var(--muted)">Thinking...</p>';
  window._askAILastQuestion=q;
  const ctx=getAskContext();
  const result=await callAI(
    `You are an assistant for Digital Realty's AI Transformation Program (ATLAS). Answer the user's question using ONLY the program data provided below. STRICT RULES: (1) Output raw HTML only — NO code fences, NO backticks, NO markdown. (2) Use <strong> for section headings and <ul>/<li> for bullets. (3) Be concise and accurate. (4) Reference specific workstream names, owners, dates, and action items when relevant. (5) If the data doesn't support the answer, say so.`,
    `Program data (use this to answer):\n\n${ctx}\n\n---\n\nUser question: ${q}`
  );
  if(respEl){
    if(result){
      let clean=result.replace(/```html\s*/gi,'').replace(/```\s*/g,'').trim();
      respEl.innerHTML=clean;
      window._askAILastResponseHtml=clean;
    }else{respEl.textContent='No response.';window._askAILastResponseHtml=''}
  }
  window._askAILastResponse=result||'No response.';
  toast(result?'Done':'AI returned nothing');
}

function rReport(c){

  const msUp=allMs.filter(t=>t.status!=='done'&&(!t.due||t.due>=today())).sort((a,b)=>(a.due||'9').localeCompare(b.due||'9'));
  const msOD=allMs.filter(t=>t.status!=='done'&&t.due&&t.due<today());
  const allWs=(D.workstreams||[]).filter(w=>w.category==='BU'||w.category==='Cross-cutting');
  const buWs=allWs.filter(w=>w.category==='BU');
  const ccWs=allWs.filter(w=>w.category==='Cross-cutting');
  const buWsSorted=[...buWs].sort((a,b)=>(a.name||'').toLowerCase().localeCompare((b.name||'').toLowerCase()));
  const ccWsSorted=[...ccWs].sort((a,b)=>(a.name||'').toLowerCase().localeCompare((b.name||'').toLowerCase()));
  try{var reportViewMode=localStorage.getItem('atlas_report_view')||'outcomes'}catch(e){var reportViewMode='outcomes'}
  function keyDatesForWs(wsId){
    const openWithDue=(D.tasks||[]).filter(t=>t.workstream===wsId&&t.status!=='done'&&t.due).sort((a,b)=>(a.due||'9').localeCompare(b.due||'9'));
    const nextTwo=openWithDue.slice(0,2).map(t=>fmtDate(t.due)+(t.title?' — '+t.title:'')).filter(Boolean);
    return nextTwo.length?nextTwo.join('; '):'—';
  }
  function keyDatesLinesForWs(wsId){
    const openWithDue=(D.tasks||[]).filter(t=>t.workstream===wsId&&t.status!=='done'&&t.due).sort((a,b)=>(a.due||'9').localeCompare(b.due||'9'));
    return openWithDue.slice(0,3).map(t=>fmtDate(t.due)+(t.title?' — '+t.title:'')).filter(Boolean);
  }
  function nextDue(wsId){
    const next=(D.tasks||[]).filter(t=>t.workstream===wsId&&t.status!=='done'&&t.due&&t.due>=today()).sort((a,b)=>(a.due||'9').localeCompare(b.due||'9'))[0];

    const max=(maxItems||3)|0;

function saveReportAsOf(){
  const el=document.getElementById('rpt-asof');if(!el)return;
  if(!D.reportNotes)D.reportNotes={accomplishments:'',blockers:'',nextPeriod:'',asOf:today(),executiveSummary:'',businessOutcomes:''};
  D.reportNotes.asOf=el.value;save();toast('Report date updated');
}
function saveReport(){
  const asOfEl=document.getElementById('rpt-asof');
  const accEl=document.getElementById('rpt-acc');
  const blockEl=document.getElementById('rpt-block');
  const nextEl=document.getElementById('rpt-next');
  const sumEl=document.getElementById('rpt-exec-summary');
  const outcomesEl=document.getElementById('rpt-businessOutcomes');
  D.reportNotes=D.reportNotes||{};
  D.reportNotes.asOf=asOfEl?asOfEl.value:today();
  D.reportNotes.accomplishments=accEl?accEl.value:(D.reportNotes.accomplishments||'');
  D.reportNotes.blockers=blockEl?blockEl.value:(D.reportNotes.blockers||'');
  D.reportNotes.nextPeriod=nextEl?nextEl.value:(D.reportNotes.nextPeriod||'');
  D.reportNotes.executiveSummary=sumEl?sumEl.value.trim():(D.reportNotes.executiveSummary||'');
  D.reportNotes.businessOutcomes=outcomesEl?outcomesEl.value:(D.reportNotes.businessOutcomes||'');
  save();log('Updated report notes');toast('Report notes saved');
}

      const recentTxt=(w.recentAccomplishments||'').trim()||recentAccomplishmentsFromApp(w.id);

      text+=`${w.name}\n  Status: ${wsStatusLabel(w.status)}\n  Recent accomplishments:\n${recentBullets}\n  What's next:\n${nextBullets}\n\n`;

function reportExportAreaSwapForCapture(restore){
  const el=document.getElementById('report-export-area');
  if(!el)return restore?[]:[];
  if(restore){
    (window._rptExportSwapped||[]).forEach(({input,repl})=>{if(input.parentNode===repl.parentNode)repl.parentNode.replaceChild(input,repl)});
    window._rptExportSwapped=[];return;
  }
  const swaps=[];
  const dateInput=el.querySelector('input[type="date"]#rpt-asof');
  if(dateInput){
    const span=document.createElement('span');
    span.textContent=dateInput.value||'';
    span.style.cssText='padding:2px 6px;font-size:11px;display:inline-block';
    dateInput.parentNode.replaceChild(span,dateInput);
    swaps.push({input:dateInput,repl:span});
  }
  el.querySelectorAll('textarea').forEach(ta=>{
    const div=document.createElement('div');
    div.textContent=ta.value||ta.placeholder||'';
    const s=window.getComputedStyle(ta);
    div.style.width=ta.offsetWidth+'px';div.style.minHeight=Math.max(ta.offsetHeight,24)+'px';
    div.style.padding=s.padding;div.style.font=s.font;div.style.lineHeight=s.lineHeight;
    div.style.color=s.color;div.style.backgroundColor=s.backgroundColor||'transparent';
    div.style.border='none';div.style.boxSizing='border-box';div.style.whiteSpace='pre-wrap';div.style.wordBreak='break-word';
    div.style.outline='none';div.style.resize='none';
    ta.parentNode.replaceChild(div,ta);
    swaps.push({input:ta,repl:div});
  });
  window._rptExportSwapped=swaps;
}
function captureReportCanvas(){
  return new Promise((resolve,reject)=>{
    const el=document.getElementById('report-export-area');
    if(!el){reject(new Error('Report area not found'));return}
    if(typeof html2canvas!=='function'){reject(new Error('html2canvas not loaded'));return}
    reportExportAreaSwapForCapture(false);
    html2canvas(el,{scale:2,useCORS:true,logging:false,backgroundColor:getComputedStyle(document.body).backgroundColor||'#ffffff'}).then(canvas=>{
      reportExportAreaSwapForCapture(true);
      resolve(canvas);
    }).catch(err=>{
      reportExportAreaSwapForCapture(true);
      reject(err);
    });
  });
}

function firstTwoSentences(text){
  const clean=(text||'').replace(/\s+/g,' ').trim();
  if(!clean)return '';
  const matches=clean.match(/[^.!?]+[.!?]/g);
  if(matches&&matches.length)return matches.slice(0,2).join(' ').trim();
  return clean;
}

function getWorkstreamOutcomeContext(wsId){
  const w=(D.workstreams||[]).find(x=>x.id===wsId);
  if(!w)return '';
  const recentRaw=(w.recentAccomplishments||'').trim()||recentAccomplishmentsFromApp(wsId);
  const nextRaw=(w.whatsNext||'').trim()||whatsNextFromApp(wsId);
  const open=(D.tasks||[]).filter(t=>t.workstream===wsId&&t.status!=='done').sort((a,b)=>(a.due||'9').localeCompare(b.due||'9')).slice(0,6);
  const done=(D.tasks||[]).filter(t=>t.workstream===wsId&&(t.status==='done'||t.isMilestone)).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,6);
  const openTxt=open.map(t=>{
    const due=t.due?(' due '+t.due):'';
    return `${t.title}${due}${t.owner?(' — '+t.owner):''}`;
  }).join('; ');
  const doneTxt=done.map(t=>{
    const due=t.due?(' due '+t.due):'';
    return `${t.title}${due}`;
  }).join('; ');
  return `WORKSTREAM
Name: ${w.name}
Category: ${w.category||'BU'}
Owner/Lead: ${w.owner||''}
Status: ${wsStatusLabel(w.status)}
Description: ${w.desc||''}

Recent accomplishments (bullets): ${recentRaw||'None'}
What's next (bullets): ${nextRaw||'None'}

Open action items: ${openTxt||'None'}
Recent completed items: ${doneTxt||'None'}`;
}

async function aiGenerateWorkstreamBusinessOutcome(wsId){
  const ctx=getWorkstreamOutcomeContext(wsId);
  const result=await callAI(
    "You write executive-ready business outcome / impact statements for Digital Realty's AI Transformation Program (ATLAS). Output EXACTLY 1-2 sentences (no bullets, no headings). Focus on the business outcome/impact, not on process updates. If metrics or percentages are implied by the context, use them; otherwise use best-effort qualitative impact.",
    `Generate the business outcome / impact statement for this workstream using ONLY the context below.\n\nCONTEXT:\n${ctx}\n\nOUTPUT FORMAT:\n- EXACTLY 1-2 sentences, plain text.`
  );
  return firstTwoSentences(result||'');
}

    const ry=1.88+i*platRowH;
    if(ry>6.5)return;
    const det=(er.wsDetails||{})[w.id]||{};
    const desc=det.oneLiner||w.desc||'';

    s5.addShape(pptx.ShapeType.roundRect,{x:0.57,y:ry,w:12.20,h:platRowH-0.12,fill:{color:'F8F9FA'},rectRadius:0.06});
    s5.addShape(pptx.ShapeType.ellipse,{x:0.77,y:ry+(platRowH/2)-0.1,w:0.14,h:0.14,fill:{color:(w.color||'999999').replace('#','')}});
    s5.addText(w.name,{x:1.02,y:ry,w:2.8,h:platRowH-0.12,fontSize:12,bold:true,color:NAVY,fontFace:'Arial',valign:'middle'});
    s5.addText(desc,{x:3.95,y:ry,w:8.82,h:platRowH-0.12,fontSize:11,color:'333333',fontFace:'Arial',valign:'middle'});
  });

  if(!platWs.length){
    s5.addText('No workstreams tagged as Platform.',{x:0.57,y:2.5,w:10,h:0.5,fontSize:13,color:GRAY,fontFace:'Arial'});
  }
  addFooter(s5);

  // ── SLIDE 6: Featured Workstreams ──
  const featIds=er.featuredWs||[];
  const featWs=featIds.map(id=>allWs.find(w=>w.id===id)).filter(Boolean);
  if(featWs.length){
    const s6=pptx.addSlide();
    s6.addText('Enterprise AI in Action',{x:0.57,y:0.56,w:12.20,h:0.53,fontSize:30,bold:true,color:NAVY,fontFace:'Arial'});
    s6.addText('Executing Strategy Through Focused Pilots',{x:0.57,y:1.11,w:12.20,h:0.50,fontSize:20,color:GRAY,fontFace:'Arial'});
    featWs.forEach((w,ci)=>{
      const xOff=ci===0?0.57:7.09;
      const colW=5.68;
      const det=(er.wsDetails||{})[w.id]||{};

      s6.addShape(pptx.ShapeType.ellipse,{x:xOff,y:1.95,w:0.16,h:0.16,fill:{color:(w.color||'999999').replace('#','')}});
      s6.addText(w.name,{x:xOff+0.25,y:1.88,w:colW-0.25,h:0.35,fontSize:16,bold:true,color:NAVY,fontFace:'Arial',valign:'middle'});

      let yPos=2.30;
      const addSec=(label,text)=>{
        s6.addText(label,{x:xOff,y:yPos,w:colW,h:0.25,fontSize:10,bold:true,color:NAVY,fontFace:'Arial'});
        yPos+=0.25;
        const lines=parseBullets(text);
        if(lines.length){
          const bH=Math.min(lines.length*0.22+0.05,1.4);
          s6.addText(lines.map(l=>({text:l,options:{fontSize:10,color:BLACK,fontFace:'Arial',bullet:{code:'2022'},paraSpaceAfter:3}})),{x:xOff,y:yPos,w:colW,h:bH,valign:'top'});
          yPos+=bH+0.04;
        }else if(text){
          s6.addText(text,{x:xOff,y:yPos,w:colW,h:0.3,fontSize:10,color:BLACK,fontFace:'Arial',valign:'top'});
          yPos+=0.35;
        }else{yPos+=0.04}
      };
      addSec('Purpose',det.purpose||'');
      addSec('Target Outcomes',det.outcomes||'');
      addSec('Key Progress',det.progress||'');
      addSec('Next Steps',det.nextSteps||'');
      if(det.value){
        s6.addShape(pptx.ShapeType.roundRect,{x:xOff,y:Math.min(yPos+0.04,6.3),w:colW,h:0.35,fill:{color:'F0F4F8'},rectRadius:0.05});
        s6.addText('Enterprise Value: '+det.value,{x:xOff+0.1,y:Math.min(yPos+0.04,6.3),w:colW-0.2,h:0.35,fontSize:9,italic:true,color:NAVY,fontFace:'Arial',valign:'middle'});
      }
    });

    if(featWs.length===2)s6.addShape(pptx.ShapeType.line,{x:6.66,y:1.88,w:0,h:4.88,line:{color:'DDDDDD',width:0.75}});
    addFooter(s6);
  }

  const fileDate=new Date().toISOString().slice(0,10);
  pptx.writeFile({fileName:'AI-Program-Update-'+fileDate+'.pptx'});
  toast('PowerPoint exported');
}

function getAdoConfig(){
  if(!D.adoConfig)D.adoConfig={};
  const c=D.adoConfig;
  if(!c.org)c.org='https://dev.azure.com/CorporateDataOffice';
  if(!c.project)c.project='Data and AI Enablement';
  if(!c.areaPath)c.areaPath='Data and AI Enablement\\AI Transformation Program';
  return c;
}
function getAdoPat(){return localStorage.getItem('atlas-ado-pat')||''}
function setAdoPat(v){localStorage.setItem('atlas-ado-pat',v)}

function adoStateForWs(status){return'New'}
function adoStateForTask(status){return'New'}

function adoCategoryTag(w){
  if(w.category==='BU')return'Vertical AI';
  if(w.ccType==='horizontal')return'Horizontal AI';
  return'Platform AI';
}

async function adoApiCall(method,url,body){
  const pat=getAdoPat();
  if(!pat)throw new Error('ADO PAT not configured');
  const headers={'Content-Type':'application/json-patch+json','Authorization':'Basic '+btoa(':'+pat)};
  const opts={method,headers};
  if(body)opts.body=JSON.stringify(body);
  const resp=await fetch(url,opts);
  if(!resp.ok){
    let msg='ADO API error: '+resp.status;
    try{const j=await resp.json();msg=j.message||msg}catch(e){}
    throw new Error(msg);
  }
  return resp.json();
}

function adoBaseUrl(){
  const c=getAdoConfig();
  let org=c.org.replace(/\/$/,'');
  return org+'/'+encodeURIComponent(c.project)+'/_apis/wit/workitems';
}

function buildAdoPatch(fields){
  return fields.filter(f=>f.value!==undefined&&f.value!==null).map(f=>({op:'add',path:'/fields/'+f.field,value:f.value}));
}

async function adoCreateWorkItem(type,fields){
  const url=adoBaseUrl()+'/$'+type+'?api-version=7.1';
  return adoApiCall('POST',url,buildAdoPatch(fields));
}

async function adoUpdateWorkItem(id,fields){
  const url=adoBaseUrl()+'/'+id+'?api-version=7.1';
  return adoApiCall('PATCH',url,buildAdoPatch(fields));
}

async function adoLinkChild(childId,parentId){
  const c=getAdoConfig();
  let org=c.org.replace(/\/$/,'');
  const url=org+'/'+encodeURIComponent(c.project)+'/_apis/wit/workitems/'+childId+'?api-version=7.1';
  const parentUrl=org+'/'+encodeURIComponent(c.project)+'/_apis/wit/workitems/'+parentId;
  const patch=[{op:'add',path:'/relations/-',value:{rel:'System.LinkTypes.Hierarchy-Reverse',url:parentUrl,attributes:{comment:'Linked by ATLAS'}}}];
  return adoApiCall('PATCH',url,patch);
}

function getAdoSyncItems(){
  const allWs=(D.workstreams||[]).filter(w=>w.category==='BU'||w.category==='Cross-cutting').sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const milestones=(D.tasks||[]).filter(t=>t.isMilestone);
  return{parents:allWs,milestones};
}

async function adoPushAll(){
  const pat=getAdoPat();
  if(!pat){toast('Set your ADO PAT first');return}
  const cfg=getAdoConfig();
  const {parents,milestones}=getAdoSyncItems();
  const area=cfg.areaPath||'';

  let created=0,updated=0,errors=0;
  const log=[];
  const statusEl=document.getElementById('ado-sync-status');
  if(statusEl)statusEl.innerHTML='<span style="color:var(--accent)">Syncing...</span>';

  for(const w of parents){
    const desiredState=adoStateForWs(w.status);
    const baseFields=[
      {field:'System.Title',value:w.name},
      {field:'System.Description',value:w.businessOutcome||w.desc||''},
      {field:'System.Tags',value:adoCategoryTag(w)},
      {field:'System.AreaPath',value:area}
    ];
    if(w.targetStart)baseFields.push({field:'Microsoft.VSTS.Scheduling.StartDate',value:w.targetStart});
    if(w.targetEnd)baseFields.push({field:'Microsoft.VSTS.Scheduling.TargetDate',value:w.targetEnd});
    try{
      if(w.adoId){
        await adoUpdateWorkItem(w.adoId,baseFields);
        updated++;log.push({name:w.name,type:'Epic',action:'Updated',ok:true});
      }else{
        const createFields=[...baseFields,{field:'System.State',value:'New'}];
        const result=await adoCreateWorkItem('Epic',createFields);
        w.adoId=result.id;
        if(desiredState!=='New'){
          try{await adoUpdateWorkItem(result.id,[{field:'System.State',value:desiredState}])}catch(e){}
        }
        created++;log.push({name:w.name,type:'Epic',action:'Created #'+result.id,ok:true});
      }
    }catch(e){
      errors++;log.push({name:w.name,type:'Epic',action:'Error: '+e.message,ok:false});
    }
  }

  for(const w of parents){
    if(w.parentWs&&w.adoId){
      const pw=parents.find(p=>p.id===w.parentWs);
      if(pw&&pw.adoId){
        try{await adoLinkChild(w.adoId,pw.adoId)}catch(e){}
      }
    }
  }

  for(const t of milestones){
    const parentWs=parents.find(w=>w.id===t.workstream);
    const desiredState=adoStateForTask(t.status);
    const baseFields=[
      {field:'System.Title',value:t.title},
      {field:'System.Description',value:t.notes||''},
      {field:'System.AreaPath',value:area}
    ];
    if(t.startDate)baseFields.push({field:'Microsoft.VSTS.Scheduling.StartDate',value:t.startDate});
    if(t.due)baseFields.push({field:'Microsoft.VSTS.Scheduling.TargetDate',value:t.due});
    try{
      if(t.adoId){
        await adoUpdateWorkItem(t.adoId,baseFields);
        updated++;log.push({name:t.title,type:'Feature',action:'Updated',ok:true});
      }else{
        const createFields=[...baseFields,{field:'System.State',value:'New'}];
        const result=await adoCreateWorkItem('Feature',createFields);
        t.adoId=result.id;
        if(desiredState!=='New'){
          try{await adoUpdateWorkItem(result.id,[{field:'System.State',value:desiredState}])}catch(e){}
        }
        created++;log.push({name:t.title,type:'Feature',action:'Created #'+result.id,ok:true});
        if(parentWs&&parentWs.adoId){
          try{await adoLinkChild(result.id,parentWs.adoId)}catch(e){}
        }
      }
    }catch(e){
      errors++;log.push({name:t.title,type:'Feature',action:'Error: '+e.message,ok:false});
    }
  }

  cfg.lastSync=new Date().toISOString();
  save();

  const summary=(created?created+' created  ':'')+(updated?updated+' updated  ':'')+(errors?errors+' errors':'');
  toast('ADO Sync: '+(summary||'Nothing to sync'));
  if(statusEl){
    statusEl.innerHTML='<span style="color:var(--green)">Last sync: '+new Date(cfg.lastSync).toLocaleString()+'</span>';
  }
  renderAdoLog(log);
}

function renderAdoLog(log){
  const el=document.getElementById('ado-sync-log');
  if(!el||!log.length)return;
  el.innerHTML='<table class="tbl" style="margin-top:12px"><thead><tr><th>Item</th><th>Type</th><th>Result</th></tr></thead><tbody>'+
    log.map(l=>'<tr><td>'+esc(l.name)+'</td><td><span class="badge" style="background:'+(l.type==='Epic'?'var(--accent)':'#7C3AED')+'">'+l.type+'</span></td><td style="color:'+(l.ok?'var(--green)':'var(--red)')+'">'+esc(l.action)+'</td></tr>').join('')+
    '</tbody></table>';
}

function adoTestConnection(){
  const pat=getAdoPat();
  if(!pat){toast('Enter a PAT first');return}
  const cfg=getAdoConfig();
  let org=cfg.org.replace(/\/$/,'');
  const url=org+'/'+encodeURIComponent(cfg.project)+'/_apis/wit/workitemtypes?api-version=7.1';
  fetch(url,{headers:{'Authorization':'Basic '+btoa(':'+pat)}})
    .then(r=>{if(!r.ok)throw new Error(r.status);return r.json()})
    .then(j=>{
      const types=(j.value||[]).map(t=>t.name).join(', ');
      toast('Connected! Work item types: '+types);
      document.getElementById('ado-conn-status').innerHTML='<span style="color:var(--green)">Connected</span>';
    })
    .catch(e=>{
      toast('Connection failed: '+e.message);
      document.getElementById('ado-conn-status').innerHTML='<span style="color:var(--red)">Failed: '+esc(e.message)+'</span>';
    });
}

function saveAdoSettings(){
  const cfg=getAdoConfig();
  cfg.org=document.getElementById('ado-org').value.trim();
  cfg.project=document.getElementById('ado-project').value.trim();
  cfg.areaPath=document.getElementById('ado-area').value.trim();
  setAdoPat(document.getElementById('ado-pat').value.trim());
  save();
  toast('ADO settings saved');
  render();
}

function adoResetSync(){
  const {parents,milestones}=getAdoSyncItems();
  const linked=[...parents.filter(w=>w.adoId),...milestones.filter(t=>t.adoId)];
  if(!linked.length){toast('Nothing to reset — no ADO IDs found');return}
  if(!confirm('Reset '+linked.length+' ADO IDs?\n\nItems will remain in ADO but ATLAS will treat them as new on the next sync.')){return}
  parents.forEach(w=>{delete w.adoId});
  milestones.forEach(t=>{delete t.adoId});
  const adoCfg=getAdoConfig();
  delete adoCfg.lastSync;
  save();
  toast('All ADO IDs cleared — next sync will create new items');
  render();
}

function saveDec(id){
  const title=document.getElementById('dec-title').value.trim();if(!title){toast('Decision is required');return}
  let d=id?(D.decisions||[]).find(x=>x.id===id):null;
  if(!d){d={id:uid(),addedBy:ME};if(!D.decisions)D.decisions=[];D.decisions.push(d)}
  d.title=title;d.rationale=document.getElementById('dec-rationale').value.trim();
  d.date=document.getElementById('dec-date').value;d.status=document.getElementById('dec-status').value;
  d.decidedBy=document.getElementById('dec-by').value;d.workstream=document.getElementById('dec-ws').value;
  d.notes=document.getElementById('dec-notes').value.trim();d.updatedBy=ME;d.updatedAt=new Date().toISOString();
  save();closeModal();render();toast('Decision saved');log('Decision: '+esc(title));
}
function delDec(id){if(!confirm('Delete?'))return;D.decisions=(D.decisions||[]).filter(x=>x.id!==id);save();render();toast('Deleted')}

const riskLevels=['low','medium','high','critical'];
const riskStatuses=['open','mitigating','accepted','closed'];
function rRisks(c){
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  const items=(D.risks||[]).filter(r=>!q||r.title?.toLowerCase().includes(q)||r.mitigation?.toLowerCase().includes(q)).sort((a,b)=>{const o={critical:0,high:1,medium:2,low:3};return (o[a.impact]||2)-(o[b.impact]||2)});
  c.innerHTML=`<div class="card"><div class="dash-hd" style="display:flex;justify-content:space-between;align-items:center">Risk Register <button class="mbtn mb-save" onclick="openRiskModal()">+ Risk</button></div>
  <div style="padding:0 18px 14px">${items.length?`<table class="tbl"><thead><tr><th>Risk</th><th>Likelihood</th><th>Impact</th><th>Status</th><th>Owner</th></tr></thead><tbody>${items.map(r=>{
    const ic=r.impact==='critical'?'pill-r':r.impact==='high'?'pill-a':r.impact==='medium'?'pill-m':'pill-g';
    const sc=r.status==='closed'?'pill-g':r.status==='accepted'?'pill-b':r.status==='mitigating'?'pill-a':'pill-r';
    return `<tr style="cursor:pointer" onclick="openRiskModal('${r.id}')"><td><strong>${esc(r.title)}</strong>${r.mitigation?'<div style="font-size:11.5px;color:var(--muted);margin-top:2px">Mitigation: '+esc(r.mitigation)+'</div>':''}</td><td><span class="pill ${r.likelihood==='high'||r.likelihood==='critical'?'pill-r':r.likelihood==='medium'?'pill-a':'pill-g'}">${r.likelihood||'—'}</span></td><td><span class="pill ${ic}">${r.impact||'—'}</span></td><td><span class="pill ${sc}">${r.status}</span></td><td style="font-size:12px">${esc(r.owner||'')}</td></tr>`}).join('')}</tbody></table>`:'<div class="empty"><h4>No risks logged</h4><p>Track regulatory, ethical, data privacy, vendor, and adoption risks.</p></div>'}</div></div>`;
}
function openRiskModal(id){
  const r=id?(D.risks||[]).find(x=>x.id===id):null;
  openModal(`<div class="m-hd"><h3>${r?'Edit':'New'} Risk</h3><button class="m-close" onclick="closeModal()">&times;</button></div>
  <div class="m-bd">
    <div class="fg"><label>Risk Description</label><input id="rk-title" value="${r?esc(r.title):''}"></div>
    <div class="fg-row">
      <div class="fg"><label>Likelihood</label><select id="rk-like">${riskLevels.map(l=>`<option value="${l}"${(r?.likelihood||'medium')===l?' selected':''}>${l}</option>`).join('')}</select></div>
      <div class="fg"><label>Impact</label><select id="rk-imp">${riskLevels.map(l=>`<option value="${l}"${(r?.impact||'medium')===l?' selected':''}>${l}</option>`).join('')}</select></div>
    </div>
    <div class="fg-row">
      <div class="fg"><label>Status</label><select id="rk-status">${riskStatuses.map(s=>`<option value="${s}"${(r?.status||'open')===s?' selected':''}>${s}</option>`).join('')}</select></div>
      <div class="fg"><label>Owner</label><select id="rk-owner">${peopleOpts(r?.owner||'')}</select></div>
    </div>
    <div class="fg-row">
      <div class="fg"><label>Workstream</label><select id="rk-ws"><option value="">— None —</option>${wsOpts(r?.workstream)}</select></div>
    </div>
    <div class="fg"><label>Mitigation Plan</label><textarea id="rk-mit">${r?esc(r.mitigation||''):''}</textarea></div>
  </div>
  <div class="m-ft">
    ${r?'<button class="mbtn mb-del" onclick="delRisk(\''+r.id+'\');closeModal()">Delete</button>':''}

    <button class="mbtn mb-save" onclick="saveRisk('${id||''}')">Save</button>
  </div>`);
}
function saveRisk(id){
  const title=document.getElementById('rk-title').value.trim();if(!title){toast('Description is required');return}
  let r=id?(D.risks||[]).find(x=>x.id===id):null;
  if(!r){r={id:uid(),addedBy:ME};if(!D.risks)D.risks=[];D.risks.push(r)}
  r.title=title;r.likelihood=document.getElementById('rk-like').value;r.impact=document.getElementById('rk-imp').value;

  r.workstream=document.getElementById('rk-ws').value;
  r.mitigation=document.getElementById('rk-mit').value.trim();
  r.updatedBy=ME;r.updatedAt=new Date().toISOString();
  save();closeModal();render();toast('Risk saved');log('Risk: '+esc(title));
}
function delRisk(id){if(!confirm('Delete?'))return;D.risks=(D.risks||[]).filter(x=>x.id!==id);save();render();toast('Deleted')}

function rGovernance(c){
  const q=(document.getElementById('search')?.value||'').toLowerCase();
  const risks=(D.risks||[]).filter(r=>!q||r.title?.toLowerCase().includes(q)||r.mitigation?.toLowerCase().includes(q)).sort((a,b)=>{const o={critical:0,high:1,medium:2,low:3};return (o[a.impact]||2)-(o[b.impact]||2)});
  const decisions=(D.decisions||[]).filter(d=>!q||d.title?.toLowerCase().includes(q)||d.rationale?.toLowerCase().includes(q)).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const openRisks=risks.filter(r=>r.status!=='closed');

  c.innerHTML=`

  <div style="padding:0 18px 14px">${decisions.length?`<table class="tbl"><thead><tr><th>Date</th><th>Decision</th><th>Status</th><th>Decided By</th><th>Workstream</th></tr></thead><tbody>${decisions.map(d=>{
    const sc=d.status==='approved'?'pill-g':d.status==='superseded'?'pill-r':d.status==='deferred'?'pill-a':'pill-m';
    return `<tr style="cursor:pointer" onclick="openDecModal('${d.id}')"><td style="font-size:12px">${d.date?fmtDate(d.date):'—'}</td><td><strong>${esc(d.title)}</strong>${d.rationale?'<div style="font-size:11.5px;color:var(--muted);margin-top:2px">'+esc(d.rationale)+'</div>':''}</td><td><span class="pill ${sc}">${d.status}</span></td><td style="font-size:12px">${esc(d.decidedBy||'')}</td><td style="font-size:12px">${wsName(d.workstream)}</td></tr>`}).join('')}</tbody></table>`:'<div class="empty"><h4>No decisions logged</h4><p>Track key decisions, architectural choices, and trade-offs. <button class="mbtn mb-save" style="margin-top:10px" onclick="openDecModal()">Add your first decision</button></p></div>'}</div></div>`
  :`<div class="card"><div class="dash-hd" style="display:flex;justify-content:space-between;align-items:center">Risk Register <button class="mbtn mb-save" onclick="openRiskModal()">+ Risk</button></div>
  <div style="padding:0 18px 14px">${risks.length?`<table class="tbl"><thead><tr><th>Risk</th><th>Likelihood</th><th>Impact</th><th>Status</th><th>Owner</th></tr></thead><tbody>${risks.map(r=>{
    const ic=r.impact==='critical'?'pill-r':r.impact==='high'?'pill-a':r.impact==='medium'?'pill-m':'pill-g';
    const sc=r.status==='closed'?'pill-g':r.status==='accepted'?'pill-b':r.status==='mitigating'?'pill-a':'pill-r';
    return `<tr style="cursor:pointer" onclick="openRiskModal('${r.id}')"><td><strong>${esc(r.title)}</strong>${r.mitigation?'<div style="font-size:11.5px;color:var(--muted);margin-top:2px">Mitigation: '+esc(r.mitigation)+'</div>':''}</td><td><span class="pill ${r.likelihood==='high'||r.likelihood==='critical'?'pill-r':r.likelihood==='medium'?'pill-a':'pill-g'}">${r.likelihood||'—'}</span></td><td><span class="pill ${ic}">${r.impact||'—'}</span></td><td><span class="pill ${sc}">${r.status}</span></td><td style="font-size:12px">${esc(r.owner||'')}</td></tr>`}).join('')}</tbody></table>`:'<div class="empty"><h4>No risks logged</h4><p>Track regulatory, ethical, data privacy, vendor, and adoption risks. <button class="mbtn mb-save" style="margin-top:10px" onclick="openRiskModal()">Add your first risk</button></p></div>'}</div></div>`}
  `;
}

const pipeStages=['Ideation','Assessment','Funding/Resources Approved','Pilot','Production','Scaled'];
const pipeStageColors={'Ideation':'var(--muted)','Assessment':'var(--amber)','Funding/Resources Approved':'var(--teal)','Pilot':'var(--sky)','Production':'var(--green)','Scaled':'var(--violet)'};
function rPipeline(c){
  const items=(D.usecases||[]);
  const stageCounts=pipeStages.map(s=>({stage:s,items:items.filter(u=>u.stage===s)}));
  c.innerHTML=`<div class="card"><div class="dash-hd" style="display:flex;justify-content:space-between;align-items:center">Use Case Pipeline <button class="mbtn mb-save" onclick="openUCModal()">+ Use Case</button></div>

function saveCad(id){
  const name=document.getElementById('cad-name').value.trim();if(!name){toast('Name is required');return}
  let cd=id?(D.cadences||[]).find(x=>x.id===id):null;
  if(!cd){cd={id:uid(),addedBy:ME};D.cadences.push(cd)}
  cd.name=name;cd.frequency=document.getElementById('cad-freq').value;cd.format=document.getElementById('cad-fmt').value.trim();
  cd.audience=document.getElementById('cad-aud').value.trim();cd.owner=document.getElementById('cad-owner').value;

function delCad(id){if(!confirm('Delete?'))return;D.cadences=(D.cadences||[]).filter(x=>x.id!==id);save();render();toast('Deleted')}

const lessonPhases=['0-30 Days: Discover','30-60 Days: Decide','60-90 Days: Deploy','Q2 2026','Q3-Q4 2026','Q1 2027','General'];

}
function openLessonModal(id){
  const l=id?(D.lessons||[]).find(x=>x.id===id):null;
  openModal(`<div class="m-hd"><h3>${l?'Edit':'New'} Lesson</h3><button class="m-close" onclick="closeModal()">&times;</button></div>
  <div class="m-bd">
    <div class="fg"><label>Title</label><input id="ls-title" value="${l?esc(l.title):''}"></div>
    <div class="fg-row">
      <div class="fg"><label>Type</label><select id="ls-type">${lessonTypes.map(t=>`<option value="${t}"${(l?.type||'Observation')===t?' selected':''}>${t}</option>`).join('')}</select></div>
      <div class="fg"><label>Phase / Period</label><select id="ls-phase">${lessonPhases.map(p=>`<option value="${p}"${(l?.phase||'General')===p?' selected':''}>${p}</option>`).join('')}</select></div>
    </div>
    <div class="fg"><label>Date</label><input type="date" id="ls-date" value="${l?l.date:today()}"></div>
    <div class="fg"><label>Detail</label><textarea id="ls-detail" style="min-height:100px">${l?esc(l.detail||''):''}</textarea></div>
  </div>
  <div class="m-ft">
    ${l?'<button class="mbtn mb-del" onclick="delLesson(\''+l.id+'\');closeModal()">Delete</button>':''}
    <button class="mbtn mb-cancel" onclick="closeModal()">Cancel</button>
    <button class="mbtn mb-save" onclick="saveLesson('${id||''}')">Save</button>
  </div>`);
}
function saveLesson(id){
  const title=document.getElementById('ls-title').value.trim();if(!title){toast('Title is required');return}
  let l=id?(D.lessons||[]).find(x=>x.id===id):null;
  if(!l){l={id:uid(),addedBy:ME,date:today()};D.lessons.push(l)}
  l.title=title;l.type=document.getElementById('ls-type').value;l.phase=document.getElementById('ls-phase').value;
  l.date=document.getElementById('ls-date').value;l.detail=document.getElementById('ls-detail').value.trim();
  l.updatedBy=ME;save();closeModal();render();toast('Lesson saved');log('Lesson: '+esc(title));
}
function delLesson(id){if(!confirm('Delete?'))return;D.lessons=(D.lessons||[]).filter(x=>x.id!==id);save();render();toast('Deleted')}

function exportJSON(){const b=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=`atlas-backup-${today()}.json`;a.click();URL.revokeObjectURL(u);toast('Exported')}
function importJSON(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const d=JSON.parse(ev.target.result);if(d.workstreams||d.tasks){D=d;save();render();toast('Imported')}}catch(err){toast('Invalid JSON')}};r.readAsText(f);e.target.value=''}
