<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root,[data-theme="light"]{
  --bg:#eef0f4;--bg-card:#fff;--bg-subtle:#f5f6f9;--sidebar:#111118;--sidebar-hov:#1e1e28;--sidebar-act:#2a2a3a;
  --text:#1a1a2e;--muted:#5a5e72;--light:#8b8fa3;
  --border:transparent;--border-lt:#ecedf2;
  --accent:#6366f1;--accent-hov:#4f46e5;--accent-lt:rgba(99,102,241,.07);--accent-dk:#312e81;
  --indigo:#6366f1;--indigo-hov:#4f46e5;--indigo-lt:rgba(99,102,241,.07);--indigo-dk:#312e81;
  --violet:#8b5cf6;--violet-lt:rgba(139,92,246,.07);
  --sky:#0284c7;--sky-lt:rgba(2,132,199,.07);
  --green:#16a34a;--green-lt:rgba(22,163,74,.07);
  --amber:#d97706;--amber-lt:rgba(217,119,6,.07);
  --red:#dc2626;--red-lt:rgba(220,38,38,.07);
  --teal:#0d9488;--teal-lt:rgba(13,148,136,.07);
  --r-sm:8px;--r-md:10px;--r-lg:12px;--r-xs:6px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 16px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.04);
  --shadow-lg:0 10px 40px rgba(0,0,0,.1),0 2px 6px rgba(0,0,0,.05);
  --tbl-hover:rgba(99,102,241,.03);--tbl-stripe:rgba(0,0,0,.012);
  --overlay-bg:rgba(15,15,25,.45);
  --ai-glow:linear-gradient(135deg,#6366f1,#a855f7);
}
[data-theme="dark"]{
  --bg:#0c0c14;--bg-card:#16161e;--bg-subtle:#1a1a24;--sidebar:#08080e;--sidebar-hov:#18182a;--sidebar-act:#252540;
  --text:#e8e8f0;--muted:#9a9ab0;--light:#606078;
  --border:#222233;--border-lt:#1e1e2e;
  --accent:#818cf8;--accent-hov:#6366f1;--accent-lt:rgba(129,140,248,.1);--accent-dk:#c7d2fe;
  --indigo:#818cf8;--indigo-hov:#6366f1;--indigo-lt:rgba(129,140,248,.1);--indigo-dk:#c7d2fe;
  --violet:#a78bfa;--violet-lt:rgba(139,92,246,.1);
  --sky:#38bdf8;--sky-lt:rgba(56,189,248,.1);
  --green:#4ade80;--green-lt:rgba(74,222,128,.1);
  --amber:#fbbf24;--amber-lt:rgba(251,191,36,.1);
  --red:#f87171;--red-lt:rgba(248,113,113,.1);
  --teal:#2dd4bf;--teal-lt:rgba(45,212,191,.1);
  --shadow:0 1px 3px rgba(0,0,0,.5),0 1px 2px rgba(0,0,0,.3);
  --shadow-md:0 4px 16px rgba(0,0,0,.4),0 1px 3px rgba(0,0,0,.3);
  --shadow-lg:0 10px 40px rgba(0,0,0,.5),0 2px 6px rgba(0,0,0,.3);
  --tbl-hover:rgba(129,140,248,.06);--tbl-stripe:rgba(255,255,255,.015);
  --overlay-bg:rgba(0,0,0,.7);
  --ai-glow:linear-gradient(135deg,#818cf8,#c084fc);
}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;display:flex;min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
a{color:var(--indigo);text-decoration:none}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit}

/* SIDEBAR */
.side{width:230px;background:linear-gradient(180deg,#0a0f0f 0%,#050808 100%);color:#e0f2f1;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto;transition:width .2s ease}
.side::-webkit-scrollbar{width:4px}
.side::-webkit-scrollbar-track{background:transparent}
.side::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:4px}
.side::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.15)}
.side-hd{padding:20px 16px 14px;border-bottom:1px solid rgba(255,255,255,.04)}
.side-collapse-btn{position:absolute;top:18px;right:10px;width:24px;height:24px;border-radius:6px;background:transparent;color:#8888a8;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;border:none;z-index:2}
.side-collapse-btn:hover{background:rgba(255,255,255,.1);color:#c8c8e0}
body.nav-collapsed .side{width:54px;overflow:hidden}
body.nav-collapsed .side-hd h1,body.nav-collapsed .side-hd .sub,body.nav-collapsed .side-hd .sub2{display:none}
body.nav-collapsed .side-hd{padding:12px 0;display:flex;flex-direction:column;align-items:center}
body.nav-collapsed .side-hd .top-row{justify-content:center}
body.nav-collapsed .side-collapse-btn{position:static;margin:6px auto 0;right:auto}
body.nav-collapsed .nav{padding:6px 6px}
body.nav-collapsed .nav-label{display:none}
body.nav-collapsed .ni{justify-content:center;padding:10px 0;border-left:none;font-size:0;color:transparent;gap:0;overflow:hidden}
body.nav-collapsed .ni svg{margin:0;font-size:initial;width:18px;height:18px}
body.nav-collapsed .ni .badge{display:none}
body.nav-collapsed .sidebar-link{display:none}
body.nav-collapsed .side-ft{padding:6px}
body.nav-collapsed .side-ft button{padding:8px;text-align:center;font-size:0;width:100%;display:flex;justify-content:center}
body.nav-collapsed .side-ft button svg{font-size:initial;display:inline;width:16px;height:16px}
body.nav-collapsed .side-ft>div{flex-direction:column}
body.nav-collapsed .user-badge{justify-content:center;padding:8px;font-size:0}
body.nav-collapsed .user-badge .ub-avatar{margin:0}
body.nav-collapsed #sidebar-links{display:none}
body.nav-collapsed .main{margin-left:54px}
.topbar-menu{display:none;background:none;border:none;cursor:pointer;color:var(--muted);padding:4px;margin-right:8px;transition:color .15s}
.topbar-menu:hover{color:var(--text)}
body.nav-collapsed .topbar-menu{display:flex}
.side-hd .top-row{display:flex;align-items:center;gap:10px}
.side-hd .logo{width:30px;height:30px;background:rgba(99,102,241,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:4px}
.side-hd h1{font-size:16px;font-weight:800;color:#e8e8f0;line-height:1;letter-spacing:.4px;margin:0}
.side-hd .sub{font-size:11px;font-weight:500;color:#a0a0c0;display:block;letter-spacing:.2px;margin-top:6px}
.side-hd .sub2{font-size:10px;font-weight:400;color:#8888a8;display:block;font-style:italic;margin-top:2px}
.nav{flex:1;padding:8px 10px;overflow-y:auto}
.nav-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1.5px;color:#9898b8;padding:20px 12px 6px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;transition:color .15s}
.nav-label:hover{color:#c8c8e0}
.nav-label .nav-arrow{font-size:8px;transition:transform .2s;opacity:.5}
.nav-label .nav-arrow.collapsed{transform:rotate(-90deg)}
.nav-section:first-child .nav-label{padding-top:4px}
.nav-section.collapsed .ni{display:none}
.nav-section.collapsed .sidebar-link{display:none}
.sidebar-link{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:14.5px;color:#d0d0e4;text-decoration:none;border-radius:var(--r-sm);transition:all .15s}
.sidebar-link:hover{background:var(--sidebar-hov);color:#f4f4ff}
.ni{display:flex;align-items:center;gap:10px;padding:9px 12px;margin:1px 0;border-radius:var(--r-sm);font-size:15px;color:#d8d8ea;cursor:pointer;transition:all .15s;position:relative;border-left:2px solid transparent}
.ni:hover{background:rgba(255,255,255,.07);color:#f4f4ff}
.ni.on{background:rgba(99,102,241,.12);color:#f0f0ff;font-weight:600;border-left-color:var(--accent)}
.ni svg{width:17px;height:17px;flex-shrink:0;opacity:.5}
.ni.on svg{opacity:.9;color:var(--accent)}
.badge{font-size:10px;font-weight:600;min-width:16px;text-align:center;padding:1px 5px;border-radius:999px;background:rgba(255,255,255,.06);color:#7070a0;margin-left:auto}
.badge.hot{background:rgba(99,102,241,.3);color:#b4b4ff}
.badge.warn{background:rgba(239,68,68,.3);color:#fca5a5}
.badge.inbox-alert{background:#ec4899;color:#fff;animation:pulse-inbox 1.5s ease-in-out infinite}
@keyframes pulse-inbox{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(1.08)}}
.inbox-dot{display:none;width:8px;height:8px;background:#ec4899;border-radius:50%;margin-left:6px;animation:pulse-inbox 1.5s ease-in-out infinite}
.inbox-dot.show{display:inline-block}
#nav-tasks.has-inbox{background:rgba(236,72,153,.1);border-left:3px solid #ec4899}
.side-ft{padding:10px 10px 14px;border-top:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;gap:1px}
.side-ft button{text-align:left;padding:7px 12px;border-radius:var(--r-sm);font-size:13px;color:#8888a8;cursor:pointer;transition:all .15s}
.side-ft button:hover{background:rgba(255,255,255,.06);color:#d0d0e0}

/* USER BADGE */
.user-badge{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:var(--r-sm);font-size:13px;color:#a0a0bc;cursor:pointer;transition:all .15s;margin-bottom:2px}
.user-badge:hover{background:rgba(255,255,255,.06);color:#d8d8e8}
.user-badge .ub-avatar{width:24px;height:24px;border-radius:50%;background:rgba(99,102,241,.2);color:#8888cc;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}

/* MAIN */
.main{margin-left:230px;flex:1;display:flex;flex-direction:column;min-height:100vh;transition:margin-left .2s ease}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 36px;background:var(--bg-card);border-bottom:1px solid var(--border-lt);position:sticky;top:0;z-index:50}
.topbar h2{font-size:22px;font-weight:800;letter-spacing:-.01em}
.topbar .tb-right{display:flex;align-items:center;gap:12px}
.topbar input[type=text]{padding:8px 16px 8px 36px;border:1px solid var(--border-lt);border-radius:var(--r-sm);font-size:14px;width:260px;outline:none;background:var(--bg-card);color:var(--text);transition:border-color .15s;background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="%23888" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>');background-repeat:no-repeat;background-position:10px center;background-size:16px}
.topbar input[type=text]:focus{border-color:var(--accent)}
.tb-btn{padding:9px 22px;border-radius:var(--r-sm);font-size:14px;font-weight:600;background:var(--accent);color:#fff;transition:background .15s}
.tb-btn:hover{background:var(--accent-hov)}
.focus-popover{display:none;position:absolute;right:0;top:100%;margin-top:8px;width:380px;max-height:70vh;overflow-y:auto;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow-md);z-index:200}
.focus-popover.open{display:block}
.focus-popover .focus-hd{padding:12px 16px;border-bottom:1px solid var(--border);font-weight:800;font-size:14px;color:var(--text);display:flex;align-items:center;gap:8px}
.focus-popover .focus-section{margin:0;padding:10px 16px;border-bottom:1px solid var(--border-lt)}
.focus-popover .focus-section:last-child{border-bottom:none}
.focus-popover .focus-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;color:var(--muted)}
.focus-popover .focus-section.overdue .focus-section-title{color:var(--red)}
.focus-popover .focus-item{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:12.5px;cursor:pointer;border-radius:var(--r-xs);transition:background .12s}
.focus-popover .focus-item:hover{background:var(--bg-subtle)}
.focus-popover .focus-item .focus-item-date{color:var(--light);font-size:11px;flex-shrink:0}
.focus-popover .focus-item .focus-item-title{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.focus-popover .focus-empty{font-size:12px;color:var(--muted);padding:6px 0}
#content{padding:28px 40px 40px;flex:1;min-width:0}

/* CARDS */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:0 1px 2px rgba(0,0,0,.04);overflow:hidden;transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.card+.card{margin-top:14px}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px}
.kpi{padding:20px 24px 20px 26px;position:relative;transition:transform .15s,box-shadow .15s}
.kpi:hover{transform:translateY(-2px);box-shadow:0 2px 6px rgba(0,0,0,.08)}
.kpi .acc{position:absolute;top:14px;bottom:14px;left:0;width:3px;border-radius:0 3px 3px 0}
.kpi .lbl{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.kpi .val{font-size:30px;font-weight:700;line-height:1.1;letter-spacing:-.02em}
.kpi .note{font-size:12px;color:var(--light);margin-top:6px}

/* STATUS PILLS */
.pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:600;white-space:nowrap;letter-spacing:.01em}
.pill-g{background:var(--green-lt);color:var(--green)}
.pill-a{background:var(--amber-lt);color:#92400e}
.pill-r{background:var(--red-lt);color:var(--red)}
.pill-b{background:var(--sky-lt);color:var(--sky)}
.pill-m{background:var(--border-lt);color:var(--muted)}
.pill-v{background:var(--violet-lt);color:var(--violet)}
.pill-t{background:var(--teal-lt);color:var(--teal)}
.pill-i{background:var(--indigo);color:#fff;font-weight:600;border:1px solid var(--indigo);box-shadow:0 1px 3px rgba(99,102,241,.3)}

/* WORKSTREAM CARDS */
.ws-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.ws-card{padding:20px;cursor:pointer;transition:box-shadow .2s}
.ws-card:hover{box-shadow:var(--shadow-md)}
.ws-card .ws-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.ws-card .ws-hd h4{font-size:15px;font-weight:700;line-height:1.3}
.ws-card .ws-desc{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.ws-card .ws-meta{display:flex;gap:14px;flex-wrap:wrap}
.ws-card .ws-meta span{font-size:13px;color:var(--light)}
.ws-full{grid-column:1/-1}

/* TABLES */
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{text-align:left;padding:12px 16px;font-size:11px;font-weight:600;color:var(--light);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border-lt)}
.tbl td{padding:11px 16px;border-bottom:1px solid var(--border-lt);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:nth-child(even) td{background:var(--tbl-stripe)}
.tbl tbody tr:hover td{background:var(--tbl-hover)}
.tbl tr{cursor:pointer;transition:background .15s ease-out}

/* DASH SECTIONS */
.dash-hd{padding:18px 22px 10px;font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.dash-bd{padding:0 22px 18px}
.dash-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.dash-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-lt)}
.dash-item:last-child{border-bottom:none}
.di-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.di-text{flex:1;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.di-due{font-size:13px;color:var(--light);flex-shrink:0;white-space:nowrap}

/* EMPTY STATE */
.empty{text-align:center;padding:48px 32px;color:var(--muted);background:var(--bg-card);border:1px solid var(--border-lt);border-radius:var(--r-md);max-width:420px;margin:0 auto}
.empty h4{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--text)}
.empty p{font-size:13.5px;line-height:1.55}

/* PAGE LAYOUT — Action Items & Workstreams */
.page-wrap{width:100%;max-width:1600px;margin:0 auto}
.page-toolbar{display:flex;align-items:center;gap:0;flex-wrap:wrap;padding:14px 20px 14px 18px;background:var(--bg-card);border:1px solid var(--border-lt);border-radius:var(--r-md);box-shadow:0 1px 4px rgba(0,0,0,.05);margin-bottom:18px}
.page-toolbar .page-title{font-size:17px;font-weight:800;letter-spacing:-.02em;color:var(--text);margin-right:20px;padding-right:16px;border-right:1px solid var(--border-lt)}
.page-toolbar .pill-filters{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.page-toolbar .pill-filters .pill{cursor:pointer;transition:all .15s;padding:5px 12px;font-size:12px;border-radius:var(--r-sm)}
.page-toolbar .pill-filters .pill:hover{opacity:.92}
.page-toolbar .pill-filters .pill.pill-i{box-shadow:0 3px 8px rgba(99,102,241,.4);transform:translateY(-1px)}
.page-toolbar .pill-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-left:auto;padding-left:16px;border-left:1px solid var(--border-lt)}
.page-toolbar .pill-actions select{padding:6px 10px 6px 12px;border:1px solid var(--border);border-radius:var(--r-xs);font-size:12.5px;font-family:inherit;background:var(--bg-card);color:var(--text);cursor:pointer;outline:none;min-width:0}
.page-toolbar .pill-actions .mbtn{padding:6px 12px;font-size:12.5px}
.page-section{margin-bottom:20px}
.page-section .section-header{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;padding:10px 16px;background:var(--bg-subtle);border:1px solid var(--border-lt);border-bottom-color:var(--border);transition:background .12s,border-color .12s;margin-bottom:0;border-radius:var(--r-md) var(--r-md) 0 0}
.page-section .section-header:hover{background:var(--border-lt);border-color:var(--border)}
.page-section .section-header .section-chevron{font-size:10px;color:var(--muted);width:16px;text-align:center;transition:transform .2s;display:inline-block;flex-shrink:0}
.page-section .section-header .section-bar{width:3px;height:18px;border-radius:2px;flex-shrink:0}
.page-section .section-header .section-label{font-size:14px;font-weight:700;letter-spacing:-.01em;color:var(--text)}
.page-section .section-header .section-meta{font-size:12px;color:var(--muted);margin-left:2px}
.page-section .section-body{margin-top:0;border:1px solid var(--border-lt);border-top:none;border-radius:0 0 var(--r-md) var(--r-md);overflow:hidden;background:var(--bg-card)}
.page-section .section-body .card-inner{background:transparent;border:none;border-radius:0;overflow:hidden;box-shadow:none}
.page-section .section-body .tbl{width:100%;table-layout:auto}
.page-section .section-body .tbl th{padding:10px 16px;font-size:11px;font-weight:700;letter-spacing:.4px;color:var(--muted)}
.page-section .section-body .tbl td{padding:10px 16px;font-size:13px}
.page-section .section-body .tbl tbody tr{transition:background .1s}
.page-section .section-body .tbl tbody tr:hover td{background:var(--tbl-hover)}
.page-section.collapsed .section-body{display:none}
.page-section.collapsed .section-header{border-radius:var(--r-md);border-bottom-color:var(--border-lt)}
.page-section.collapsed .section-header .section-chevron{transform:rotate(-90deg)}
.tasks-page .page-section .section-header{transition:filter .12s,background .12s,border-color .12s}
.tasks-page .page-section .section-header:hover{filter:brightness(.85)}
.ws-page .page-section .section-header{background:#1e293b;border-color:#334155;border-bottom-color:#475569}
.ws-page .page-section .section-header:hover{background:#334155;border-color:#475569}
.ws-page .page-section .section-header .section-chevron,.ws-page .page-section .section-header .section-label,.ws-page .page-section .section-header .section-meta{color:#cbd5e1}
.ws-page .page-section .section-header .section-meta{opacity:.9}
.tasks-page .page-section.collapsed .section-header,.ws-page .page-section.collapsed .section-header{border-bottom-color:inherit}
[data-theme="dark"] .ws-page .page-section .section-header{background:#e2e8f0;border-color:#cbd5e1;border-bottom-color:#94a3b8}
[data-theme="dark"] .ws-page .page-section .section-header:hover{background:#cbd5e1;border-color:#94a3b8}
[data-theme="dark"] .ws-page .page-section .section-header .section-chevron,[data-theme="dark"] .ws-page .page-section .section-header .section-label,[data-theme="dark"] .ws-page .page-section .section-header .section-meta{color:#1e293b}
[data-theme="dark"] .ws-page .page-section.collapsed .section-header,[data-theme="dark"] .ws-page .page-section.collapsed .section-header{border-bottom-color:#cbd5e1}

/* KANBAN BOARD */
.kb-board{display:flex;gap:14px;align-items:flex-start;overflow-x:auto;padding:4px 0 8px;min-height:calc(100vh - 200px)}
.kb-col{flex:1 1 0;min-width:240px;max-width:360px;background:var(--bg-subtle);border:1px solid var(--border-lt);border-radius:var(--r-md);display:flex;flex-direction:column;max-height:calc(100vh - 200px)}
.kb-col-hdr{padding:12px 14px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--border);position:sticky;top:0;background:var(--bg-subtle);border-radius:var(--r-md) var(--r-md) 0 0;z-index:1}
.kb-col-hdr .kb-count{font-size:11px;font-weight:600;background:var(--border-lt);color:var(--muted);border-radius:10px;padding:2px 8px}
.kb-col-body{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:8px;min-height:60px}
.kb-col.drag-over .kb-col-body{background:rgba(99,102,241,.06);border-radius:0 0 var(--r-md) var(--r-md)}
.kb-card{background:var(--bg-card);border:1px solid var(--border-lt);border-radius:var(--r-sm);padding:10px 12px;cursor:grab;transition:box-shadow .15s,transform .15s;position:relative}
.kb-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}
.kb-card.dragging{opacity:.5;transform:rotate(2deg)}
.ws-drop-target{background:rgba(99,102,241,.15)!important;outline:2px dashed var(--accent);outline-offset:-2px;transition:all .15s}
.ws-drop-target td:first-child::before{content:'↳ Drop here';position:absolute;left:40px;color:var(--accent);font-size:10px;font-weight:600;opacity:.8}
.ws-draggable{cursor:grab}
.ws-draggable:active{cursor:grabbing}
.dragging-row{opacity:.4;background:var(--accent-lt)!important}
.drag-ghost{position:fixed;pointer-events:none;z-index:1000;background:var(--bg-card);border:2px solid var(--accent);border-radius:6px;padding:8px 12px;font-size:12px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.15);transform:rotate(2deg)}
.kb-card-title{font-size:12.5px;font-weight:600;margin-bottom:6px;line-height:1.35}
.kb-card-meta{display:flex;flex-wrap:wrap;gap:4px 8px;font-size:11px;color:var(--muted);align-items:center}
.kb-card-ws{display:inline-flex;align-items:center;gap:4px}
.kb-card-ws .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kb-card-overdue{color:var(--red);font-weight:600}
.kb-card.kb-overdue{border-left:3px solid var(--red);background:var(--red-lt)}
.kb-card.kb-due-today{border-left:3px solid var(--amber);background:var(--amber-lt)}

/* QUICK CAPTURE BUTTON */
.fab{position:fixed;top:16px;right:24px;height:36px;border-radius:20px;background:#ec4899;color:#fff;border:none;cursor:pointer;box-shadow:0 3px 12px rgba(236,72,153,.45);display:flex;align-items:center;gap:6px;padding:0 16px 0 12px;z-index:200;transition:transform .15s,box-shadow .15s;font-size:12px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
.fab:hover{transform:scale(1.04);box-shadow:0 5px 18px rgba(236,72,153,.55)}
.fab:active{transform:scale(.96)}

/* COMMENT THREAD */
.comment-thread{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.comment-item{display:flex;gap:8px;padding:8px 10px;background:var(--bg-subtle);border-radius:var(--r-sm);border:1px solid var(--border-lt)}
.comment-avatar{width:28px;height:28px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.comment-body{flex:1;min-width:0}
.comment-meta{font-size:11px;color:var(--muted);margin-bottom:2px}
.comment-meta strong{color:var(--text);font-weight:600}
.comment-text{font-size:12.5px;line-height:1.5;color:var(--text);white-space:pre-wrap;word-break:break-word}
.comment-input-row{display:flex;gap:8px;margin-top:6px}
.comment-input-row textarea{flex:1;min-height:36px;max-height:120px;padding:7px 10px;border:1px solid var(--border-lt);border-radius:var(--r-sm);font-size:12.5px;font-family:inherit;background:var(--bg-card);color:var(--text);resize:vertical}
.comment-input-row button{align-self:flex-end;padding:7px 14px;font-size:12px;font-weight:600;border-radius:var(--r-sm);background:var(--accent);color:#fff;border:none;cursor:pointer}
.comment-input-row button:hover{background:var(--accent-hov)}

/* PROGRESS BAR */
.ws-progress{height:6px;border-radius:3px;background:var(--border-lt);overflow:hidden;flex:1}
.ws-progress-fill{height:100%;border-radius:3px;transition:width .3s}

.ws-page-toolbar .page-title{font-size:17px;font-weight:800;letter-spacing:-.02em;padding-right:16px;margin-right:16px;border-right:1px solid var(--border-lt)}
.ws-page-toolbar .toolbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-left:auto;padding-left:16px;border-left:1px solid var(--border-lt)}
.ws-page-toolbar .toolbar-right select{padding:6px 10px 6px 12px;border:1px solid var(--border);border-radius:var(--r-xs);font-size:12.5px;font-family:inherit;background:var(--bg-card);color:var(--text);cursor:pointer;outline:none}
.ws-page-toolbar .toolbar-right .tb-btn{padding:6px 14px;font-size:12.5px;border-radius:var(--r-sm)}
.ws-page-toolbar .toolbar-right .tb-btn:first-of-type{background:var(--bg-subtle);color:var(--text);border:1px solid var(--border)}
.ws-page-toolbar .toolbar-right .tb-btn:first-of-type:hover{background:var(--border-lt)}
.ws-pipeline{display:flex;align-items:stretch;flex-wrap:nowrap;gap:0;padding:10px 8px;margin-bottom:14px;background:var(--bg-card);border:1px solid var(--border-lt);border-radius:var(--r-md);box-shadow:0 1px 3px rgba(0,0,0,.04);width:100%;box-sizing:border-box}
.ws-pipeline-stage{display:flex;flex:1 1 0;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:12px 6px;min-width:0;min-height:56px;border:1px solid var(--border-lt);border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;margin:0 2px}
.ws-pipeline-stage:first-child{margin-left:0}
.ws-pipeline-stage:hover{filter:brightness(0.96);border-color:var(--border)}
.ws-pipeline-stage.on{background:var(--accent)!important;border-color:var(--accent)!important;color:#fff!important}
.ws-pipeline-stage .ws-pipeline-label{white-space:normal;text-align:center;line-height:1.25;max-width:100%;word-break:break-word}
.ws-pipeline-stage .ws-pipeline-count{font-size:17px;font-weight:800;letter-spacing:-.02em}
.ws-pipeline-arrow{color:var(--muted);font-size:12px;padding:0 2px;flex-shrink:0;align-self:center}
.ws-pipeline-stage-all{background:#e2e8f0;color:#334155;border-color:#cbd5e1}
.ws-pipeline-stage-not-started{background:#f8fafc;color:#475569;border-color:#e2e8f0}
.ws-pipeline-stage-reachout-kickoff{background:#f1f5f9;color:#475569;border-color:#e2e8f0}
.ws-pipeline-stage-discovery-workshops{background:#e2e8f0;color:#334155;border-color:#cbd5e1}
.ws-pipeline-stage-capability-mapping{background:#cbd5e1;color:#334155;border-color:#94a3b8}
.ws-pipeline-stage-prioritization-planning{background:#94a3b8;color:#fff;border-color:#64748b}
.ws-pipeline-stage-roadmap-integration{background:#64748b;color:#fff;border-color:#475569}
.ws-pipeline-stage-resourcing{background:#475569;color:#fff;border-color:#334155}
.ws-pipeline-stage-delivery{background:#334155;color:#fff;border-color:#1e293b}
.ws-pipeline-stage-complete{background:#1e293b;color:#fff;border-color:#0f172a}
[data-theme="dark"] .ws-pipeline-stage-all{background:#475569;color:#e2e8f0;border-color:#64748b}
[data-theme="dark"] .ws-pipeline-stage-not-started{background:#334155;color:#cbd5e1;border-color:#475569}
[data-theme="dark"] .ws-pipeline-stage-reachout-kickoff{background:#475569;color:#e2e8f0;border-color:#64748b}
[data-theme="dark"] .ws-pipeline-stage-discovery-workshops{background:#64748b;color:#f1f5f9;border-color:#94a3b8}
[data-theme="dark"] .ws-pipeline-stage-capability-mapping{background:#94a3b8;color:#0f172a;border-color:#cbd5e1}
[data-theme="dark"] .ws-pipeline-stage-prioritization-planning{background:#cbd5e1;color:#0f172a;border-color:#e2e8f0}
[data-theme="dark"] .ws-pipeline-stage-roadmap-integration{background:#e2e8f0;color:#1e293b;border-color:#f1f5f9}
[data-theme="dark"] .ws-pipeline-stage-resourcing{background:#f1f5f9;color:#1e293b;border-color:#e2e8f0}
[data-theme="dark"] .ws-pipeline-stage-delivery{background:#e2e8f0;color:#0f172a;border-color:#cbd5e1}
[data-theme="dark"] .ws-pipeline-stage-complete{background:#cbd5e1;color:#0f172a;border-color:#94a3b8}

/* MODAL */
.overlay{position:fixed;inset:0;background:var(--overlay-bg);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s ease-out}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg-card);border-radius:var(--r-lg);width:720px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);transform:scale(.95) translateY(-10px);opacity:0;transition:all .25s cubic-bezier(.4,0,.2,1)}
.overlay.open .modal{transform:scale(1) translateY(0);opacity:1}
.m-hd{padding:22px 24px 12px;display:flex;align-items:center;justify-content:space-between}
.m-hd h3{font-size:19px;font-weight:800;letter-spacing:-.01em}
.m-close{font-size:22px;color:var(--light);cursor:pointer;background:none;border:none;line-height:1;transition:color .15s;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:var(--r-xs)}
.m-close:hover{color:var(--text);background:var(--border-lt)}
.m-bd{padding:0 24px 18px}
.m-ft{padding:14px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.ws-section{border:1px solid var(--border-lt);border-radius:var(--r-sm);margin-bottom:12px;overflow:hidden}
.ws-section-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:var(--bg-subtle);user-select:none;transition:background .15s}
.ws-section-hd:hover{background:var(--border-lt)}
.ws-section-hd h4{font-size:13px;font-weight:700;margin:0;letter-spacing:.01em}
.ws-section-arrow{font-size:10px;color:var(--muted);transition:transform .2s}
.ws-section.collapsed .ws-section-arrow{transform:rotate(-90deg)}
.ws-section-bd{padding:14px;animation:slideDown .2s ease-out}
.ws-section.collapsed .ws-section-bd{display:none}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 14px;border:1px solid var(--border-lt);border-radius:var(--r-sm);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;background:var(--bg-card);color:var(--text)}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--indigo)}
.fg textarea{resize:vertical;min-height:80px}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mbtn{padding:10px 24px;border-radius:var(--r-sm);font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .15s}
.mb-save{background:var(--indigo);color:#fff}.mb-save:hover{background:var(--indigo-hov)}
.mb-cancel{background:var(--bg-subtle);color:var(--muted);border:1px solid var(--border)}.mb-cancel:hover{background:var(--border-lt);color:var(--text)}
.mb-del{background:var(--red-lt);color:var(--red)}.mb-del:hover{background:rgba(220,38,38,.15)}

/* TOAST */
.toast{position:fixed;bottom:28px;right:28px;background:#1a1a2e;color:#e8e8f0;padding:14px 20px;border-radius:var(--r-md);font-size:14px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.2);z-index:300;opacity:0;transform:translateY(10px);transition:all .3s;border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:12px}
.toast.show{opacity:1;transform:translateY(0)}
.toast-msg{flex:1}
.toast-undo{background:rgba(255,255,255,.15);border:none;color:#fff;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.toast-undo:hover{background:rgba(255,255,255,.25)}
.toast-progress{position:absolute;bottom:0;left:0;height:3px;background:var(--accent);border-radius:0 0 var(--r-md) var(--r-md);transition:width linear}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes highlightRow{0%{background:rgba(99,102,241,.15)}100%{background:transparent}}
.anim-fade-in{animation:fadeIn .2s ease-out}
.anim-slide-down{animation:slideDown .2s ease-out}
.anim-slide-up{animation:slideUp .2s ease-out}
.anim-scale-in{animation:scaleIn .2s ease-out}
.anim-highlight{animation:highlightRow 1.5s ease-out}

/* DARK MODE POLISH */
[data-theme="dark"] .toast{background:#2a2a3a;border-color:rgba(255,255,255,.1)}
[data-theme="dark"] .drag-ghost{background:#2a2a3a;border-color:var(--accent)}
[data-theme="dark"] .ws-drop-target{background:rgba(129,140,248,.15)!important}
[data-theme="dark"] .card:hover{box-shadow:0 4px 16px rgba(0,0,0,.3)}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:var(--bg-subtle);border-color:var(--border);color:var(--text)}
[data-theme="dark"] input:focus,[data-theme="dark"] select:focus,[data-theme="dark"] textarea:focus{border-color:var(--accent);outline:none;box-shadow:0 0 0 3px rgba(129,140,248,.15)}
[data-theme="dark"] .pill{background:var(--bg-subtle);border-color:var(--border)}
[data-theme="dark"] .pill-i{background:var(--accent);border-color:var(--accent);color:#fff}
[data-theme="dark"] .gantt-bar{box-shadow:0 2px 8px rgba(0,0,0,.3)}
[data-theme="dark"] .kb-card{background:var(--bg-card);border-color:var(--border)}
[data-theme="dark"] .kb-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.4)}
[data-theme="dark"] #export-menu{background:var(--bg-card);border-color:var(--border)}

/* TASK CHECKMARKS */
.task-chk{width:20px;height:20px;border:2px solid var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;color:transparent;cursor:pointer;transition:all .15s;font-size:11px;flex-shrink:0}
.task-chk:hover{border-color:var(--indigo);background:var(--indigo-lt)}
.task-chk.done{background:var(--green);border-color:var(--green);color:#fff}
.task-done{text-decoration:line-through;color:var(--light)}

/* ENGAGEMENT CARDS */
.eng-card{padding:22px 24px;transition:box-shadow .2s;cursor:pointer}
.eng-card:hover{box-shadow:var(--shadow-md)}
.eng-card .eng-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.eng-card .eng-hd h4{font-size:15px;font-weight:700}
.eng-card .eng-body{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:12px}
.eng-card .eng-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:13px;color:var(--light)}

/* MTG CARDS */
.mtg-card{margin-bottom:0}
.mtg-top{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 4px}
.mtg-top h4{font-size:16px;font-weight:700;cursor:pointer}
.mtg-top h4:hover{color:var(--accent)}
.mtg-date{font-size:13px;color:var(--light)}
.mtg-body{padding:0 18px 10px}
.mtg-summary{font-size:14px;color:var(--muted);line-height:1.6;white-space:pre-wrap;max-height:100px;overflow:hidden;margin-bottom:8px}
.mtg-ai-list{border-top:1px solid var(--border-lt);padding-top:8px}
.mtg-ai-list h5{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px}
.mtg-ai{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:14px}
.mtg-ai-chk{width:15px;height:15px;border:1.5px solid var(--border);border-radius:3px;display:flex;align-items:center;justify-content:center;color:transparent;cursor:pointer;font-size:9px;flex-shrink:0;transition:all .15s}
.mtg-ai-chk.done{background:var(--green);border-color:var(--green);color:#fff}
.mtg-ai-owner{font-size:12px;color:var(--light);margin-left:auto}
.mtg-btns{display:flex;gap:8px;padding:10px 18px 14px;border-top:1px solid var(--border-lt)}
.mtg-btns button{font-size:13px;color:var(--accent);font-weight:500;padding:5px 10px;border-radius:var(--r-xs)}
.mtg-btns button:hover{background:var(--indigo-lt)}


/* REPORT VIEW — uniform 14px, tight spacing, row/field shading, slide-friendly export */
.rpt{width:100%;max-width:100%;margin:0}
#report-export-area{width:100%;max-width:100%;padding:0}
.rpt-header{text-align:center;margin-bottom:4px;padding-bottom:4px;border-bottom:2px solid var(--accent)}
.rpt-header h2{font-size:18px;font-weight:800;margin-bottom:2px;letter-spacing:-.01em}
.rpt-header p{font-size:14px;color:var(--muted)}
.rpt-section{margin-bottom:6px}
.rpt-section h3{font-size:14px;font-weight:700;margin-bottom:3px;padding-bottom:3px;border-bottom:2px solid var(--border);color:var(--text)}
.rpt-exec-summary-wrap{background:rgba(99,102,241,.08);border-left:4px solid var(--accent);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:6px 10px;box-shadow:0 1px 2px rgba(0,0,0,.04);font-size:14px}
.rpt-field-card{background:rgba(0,0,0,.03);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:6px}
[data-theme="dark"] .rpt-field-card{background:rgba(255,255,255,.06)}
.rpt-ws{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.rpt-ws-card{padding:12px;border-radius:var(--r-md);border:1px solid var(--border);background:var(--bg-card);transition:box-shadow .2s}
.rpt-ws-card:hover{box-shadow:var(--shadow)}
.rpt-ws-card h4{font-size:14px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.rpt-ws-card .rpt-ws-desc{font-size:14px;color:var(--muted);margin-bottom:6px}
.rpt-ws-card ul{font-size:14px;padding-left:18px;color:var(--text)}
.rpt-ws-card ul li{margin-bottom:2px}
.rpt-exec-table{width:100%;border-collapse:collapse;font-size:14px;margin-bottom:6px;border:1px solid #cbd5e1;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.rpt-exec-table th,.rpt-exec-table td,.rpt-exec-table .rpt-status,.rpt-exec-table .rpt-scope,.rpt-exec-table .rpt-timing,.rpt-exec-table .rpt-ws-name{font-size:14px}
.rpt-exec-table th{text-align:left;padding:8px 10px;background:#000;color:#fff;border:1px solid #000;font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:12px}
.rpt-exec-table td{padding:8px 10px;border:1px solid #cbd5e1;vertical-align:top}
.rpt-exec-table tr:not(.rpt-group-header) td{background:#fff}
.rpt-exec-table.rpt-ws-focus tr:not(.rpt-group-header) td:first-child{border-left:2px solid var(--accent);font-weight:600}
.rpt-exec-table .rpt-status{display:inline-block;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap;text-align:center;min-width:60px}
.rpt-exec-table .rpt-status.on-track{background:#059669;color:#fff}
.rpt-exec-table .rpt-status.at-risk{background:#d97706;color:#fff}
.rpt-exec-table .rpt-status.blocked{background:#dc2626;color:#fff}
.rpt-exec-table .rpt-status.complete{background:#2563eb;color:#fff}
.rpt-exec-table .rpt-status.not-started{background:#f1f5f9;color:#334155;border:1px solid #e2e8f0}
.rpt-exec-table .rpt-status.in-progress{background:#6366f1;color:#fff}
.rpt-exec-table .rpt-scope{max-width:280px;color:var(--text);line-height:1.4}
.rpt-exec-table .rpt-timing{color:var(--muted);white-space:nowrap}
.rpt-metrics-strip{display:flex;flex-wrap:wrap;gap:6px 12px;padding:6px 10px;background:rgba(0,0,0,.04);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:6px;font-size:14px}
.rpt-metrics-strip .rpt-metric{display:flex;align-items:center;gap:6px}
.rpt-metrics-strip .rpt-metric strong{color:var(--accent);font-size:14px}
.rpt-timeline{display:flex;flex-wrap:wrap;gap:4px 14px;margin-bottom:6px;font-size:14px}
.rpt-timeline .rpt-tl-group{min-width:140px}

function ensureGroups(){
  if(!D.groups)D.groups=(defaults().groups||[]).slice();
  const usedGroups=[...new Set((D.people||[]).map(p=>p.group).filter(Boolean))];
  usedGroups.forEach(g=>{if(g&&!D.groups.includes(g))D.groups.push(g)});
  D.groups.sort((a,b)=>a.localeCompare(b));
}

function ensureWorkstreamsV3AndBusinessOutcomes(){
  if(!D.workstreams)D.workstreams=[];
  if(!D._wsV3){
    const newWs=defaults().workstreams;
    const oldIds=new Set(['standards','data-infra','ai-program','adr-council','superworker']);
    const hasOnlyOld=D.workstreams.every(w=>oldIds.has(w.id));
    const missingNew=!D.workstreams.find(w=>w.category);
    if(hasOnlyOld||missingNew){
      D.workstreams=newWs;
    }
    D._wsV3=true;
  }
  (D.workstreams||[]).forEach(w=>{
    const def=WS_DEFS.find(d=>d.id===w.id);
    if(!w.category&&def){
      w.category=def.category;
      if(!w.owner)w.owner=def.owner||'';
    }
    if(def&&def.businessOutcome&&!(w.businessOutcome||'').trim()){
      w.businessOutcome=def.businessOutcome;
    }
  });
}

function ensureReportNotesBusinessOutcomesDefaults(){
  if(!D.reportNotes){
    D.reportNotes={accomplishments:'',blockers:'',nextPeriod:'',asOf:'',executiveSummary:'',businessOutcomes:''};
  }
  if(D.reportNotes.businessOutcomes===undefined){
    D.reportNotes.businessOutcomes='• Time savings from automation across BUs\n• Reduced manual effort in key processes\n• Stronger governance and risk control';
  }
}

function loadLs(){
  try{D=JSON.parse(localStorage.getItem('ai-tracker'))}catch(e){}
  if(!D||!D.workstreams)D=defaults();
  if(!D.engagements)D.engagements=[];
  if(!D.milestones)D.milestones=[];
  if(!D.tasks)D.tasks=[];
  ensureGroups();
  if(D.milestones&&D.milestones.length&&!D._msMigrated){
    D.milestones.forEach(m=>{
      if(!D.tasks.find(t=>t.id===m.id)){
        D.tasks.push({id:m.id,title:m.title,owner:m.owner||'',due:m.date||'',
          status:m.status==='done'?'done':'not-started',priority:'high',
          workstream:m.workstream||'',notes:m.notes||'',
          isMilestone:true,addedBy:m.addedBy||'',created:m.date||today()});
      }
    });
    D._msMigrated=true;
  }
  if(!D.meetings)D.meetings=[];
  if(!D.inbox)D.inbox=[];
  if(!D.people)D.people=[];
  if(!D._pplSeeded){
    const seed=defaults().people||[];
    const existing=new Set((D.people||[]).map(p=>p.name.toLowerCase().trim()));
    let added=0;
    seed.forEach(p=>{
      if(!existing.has(p.name.toLowerCase().trim())){D.people.push(p);existing.add(p.name.toLowerCase().trim());added++}
    });
    D._pplSeeded=true;
    if(added)console.log('ATLAS: Seeded '+added+' people from directory');
  }
  const seedPpl=defaults().people||[];
  seedPpl.forEach(sp=>{
    if(!sp.username)return;
    const existing=(D.people||[]).find(p=>p.name.toLowerCase().trim()===sp.name.toLowerCase().trim());
    if(existing&&!existing.username)existing.username=sp.username;
  });
  if(!D.log)D.log=[];
  if(!D.reportNotes)D.reportNotes={accomplishments:'',blockers:'',nextPeriod:'',asOf:'',executiveSummary:'',businessOutcomes:''};
  if(D.reportNotes.businessOutcomes===undefined)D.reportNotes.businessOutcomes='• Time savings from automation across BUs\n• Reduced manual effort in key processes\n• Stronger governance and risk control';
  if(!D.links)D.links=[];
  if(!D.decisions)D.decisions=[];
  if(!D.risks)D.risks=[];
  if(!D.metrics)D.metrics=[];
  if(!D.usecases)D.usecases=[];
  if(!D.cadences)D.cadences=[];
  if(!D.lessons)D.lessons=[];
  if(!D._wsV3){
    const newWs=defaults().workstreams;
    const oldIds=new Set(['standards','data-infra','ai-program','adr-council','superworker']);
    const hasOnlyOld=D.workstreams.every(w=>oldIds.has(w.id));
    const missingNew=!D.workstreams.find(w=>w.category);
    if(hasOnlyOld||missingNew){
      D.workstreams=newWs;
    }
    D._wsV3=true;
  }
  (D.workstreams||[]).forEach(w=>{
    const def=WS_DEFS.find(d=>d.id===w.id);
    if(!w.category&&def){w.category=def.category;if(!w.owner)w.owner=def.owner||''}
    if(def&&def.businessOutcome&&!(w.businessOutcome||'').trim())w.businessOutcome=def.businessOutcome;
  });
}

  D.log.unshift({id:uid(),ts:new Date().toISOString(),text:t+who});
  if(D.log.length>200)D.log.length=200;
  save();
}

const SESSION_TTL=24*60*60*1000;
let SESSION_VERIFIED=false;
function loadMe(){ME=localStorage.getItem('ai-tracker-name')||'';updateUserBadge()}
function saveMe(n){ME=n;try{localStorage.setItem('ai-tracker-name',n)}catch(e){}updateUserBadge()}
function saveSession(){try{localStorage.setItem('atlas-session-ts',Date.now().toString())}catch(e){}}
function isSessionValid(){
  const ts=parseInt(localStorage.getItem('atlas-session-ts')||'0',10);
  return ts>0&&(Date.now()-ts)<SESSION_TTL;
}
function clearSession(){try{localStorage.removeItem('atlas-session-ts')}catch(e){}}
function updateUserBadge(){
  const el=document.getElementById('userName'),av=document.getElementById('userAvatar');
  if(el)el.textContent=ME||'Sign in';
  if(av)av.textContent=ME?ME.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2):'?';
}

async function hashPin(pin){
  const enc=new TextEncoder().encode('atlas-pin-'+pin.trim());
  const buf=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,24);
}
function findByUsername(u){return(D.people||[]).find(p=>p.username&&p.username.toLowerCase()===u.toLowerCase())}

}

async function submitLogin(){
  const u=(document.getElementById('signUsername').value||'').trim();
  const pin=(document.getElementById('signPin').value||'').trim();
  const msg=document.getElementById('signMsg');
  if(!u){toast('Enter your username');return}
  if(!pin||pin.length<4){toast('Enter your PIN (at least 4 digits)');return}
  const person=findByUsername(u);
  if(!person){
    msg.style.display='';msg.style.background='var(--red-lt)';msg.style.color='var(--red)';
    msg.innerHTML='Username not found. <a href="#" onclick="event.preventDefault();showRegister()" style="color:var(--red);text-decoration:underline;font-weight:600">Create an account</a> or check with your admin.';return;
  }
  const pinH=await hashPin(pin);
  if(person.pinHash!==pinH){
    msg.style.display='';msg.style.background='var(--red-lt)';msg.style.color='var(--red)';
    msg.textContent='Incorrect PIN. Try again.';return;
  }
  SESSION_VERIFIED=true;saveSession();
  person.lastSignIn=new Date().toISOString();save();
  saveMe(person.name);closeModal();log(esc(person.name)+' signed in');startPresence();render();toast('Welcome, '+person.name.split(' ')[0]+'!');
  setTimeout(checkReleaseNotes,500);
}

async function submitRegister(){
  const name=(document.getElementById('regName').value||'').trim();
  const uname=(document.getElementById('regUsername').value||'').trim().replace(/\s/g,'');
  const pin=(document.getElementById('regPin').value||'').trim();
  const pin2=(document.getElementById('regPin2').value||'').trim();
  const msg=document.getElementById('regMsg');
  msg.style.display='none';
  if(!name){toast('Enter your full name');return}
  if(!uname||uname.length<2){toast('Enter a username (at least 2 characters)');return}
  if(/\s/.test(uname)){toast('Username cannot contain spaces');return}
  if(!pin||pin.length<4){toast('PIN must be at least 4 digits');return}
  if(pin!==pin2){msg.style.display='';msg.style.background='var(--red-lt)';msg.style.color='var(--red)';msg.textContent='PINs do not match.';return}
  const preAssigned=(D.people||[]).find(p=>p.username&&p.username.toLowerCase()===uname.toLowerCase());
  if(!preAssigned){msg.style.display='';msg.style.background='var(--red-lt)';msg.style.color='var(--red)';msg.textContent='Username "'+uname+'" has not been authorized. Contact your admin to get access.';return}
  if(preAssigned.pinHash){msg.style.display='';msg.style.background='var(--red-lt)';msg.style.color='var(--red)';msg.textContent='This account is already registered. Use Sign In instead.';return}
  const pinH=await hashPin(pin);
  preAssigned.pinHash=pinH;preAssigned.updatedBy=name;
  preAssigned.lastSignIn=new Date().toISOString();
  save();log(esc(preAssigned.name)+' created account ('+esc(uname)+')');
  SESSION_VERIFIED=true;saveSession();
  saveMe(preAssigned.name);closeModal();startPresence();render();toast('Account created! Welcome, '+preAssigned.name.split(' ')[0]+'!');
  setTimeout(checkReleaseNotes,500);
}

MILESTONES: ${ms||'None'}

function getAskContext(){
  const lines=[];
  const allWs=(D.workstreams||[]).filter(w=>w.category==='BU'||w.category==='Cross-cutting');
  allWs.forEach(w=>{
    const rec=(w.recentAccomplishments||'').trim()||recentAccomplishmentsFromApp(w.id);
    const nxt=(w.whatsNext||'').trim()||whatsNextFromApp(w.id);
    const openTasks=(D.tasks||[]).filter(t=>t.workstream===w.id&&t.status!=='done').map(t=>t.title+(t.due?' (due '+t.due+')':'')+(t.owner?' — '+t.owner:''));
    const doneTasks=(D.tasks||[]).filter(t=>t.workstream===w.id&&t.status==='done').slice(-5).map(t=>t.title+(t.due?' completed '+t.due:''));
    lines.push(`WORKSTREAM: ${w.name} (ID: ${w.id}) | Status: ${wsStatusLabel(w.status)} | Owner: ${w.owner||'TBD'}`);
    if(rec)lines.push('  Recent accomplishments: '+rec.replace(/\n/g,' '));
    if(nxt)lines.push('  What\'s next: '+nxt.replace(/\n/g,' '));
    if(openTasks.length)lines.push('  Open action items: '+openTasks.join('; '));
    if(doneTasks.length)lines.push('  Recently completed: '+doneTasks.join('; '));
    lines.push('');
  });
  const rn=D.reportNotes||{};
  if(rn.accomplishments||rn.blockers||rn.nextPeriod){
    lines.push('REPORT NOTES (program-level):');
    if(rn.accomplishments)lines.push('  Accomplishments: '+rn.accomplishments.replace(/\n/g,' '));
    if(rn.blockers)lines.push('  Blockers: '+rn.blockers.replace(/\n/g,' '));
    if(rn.nextPeriod)lines.push('  Next period: '+rn.nextPeriod.replace(/\n/g,' '));
    lines.push('');
  }
  const dec=(D.decisions||[]).slice(-15).map(d=>d.title+' ('+d.status+', '+fmtDate(d.date)+')').join('; ');
  if(dec)lines.push('RECENT DECISIONS: '+dec+'\n');
  const risks=(D.risks||[]).filter(r=>r.status!=='closed').map(r=>r.title+' — '+r.status).join('; ');
  if(risks)lines.push('OPEN RISKS: '+risks+'\n');
  lines.push('TODAY: '+today());
  return lines.join('\n');
}

async function hashPassword(pw){
  const enc=new TextEncoder().encode(pw.trim().toLowerCase());
  const buf=await crypto.subtle.digest('SHA-256',enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,16);
}

function isLocalOrOffline(){
  try{
    const loc=window.location;
    if(loc.protocol==='file:')return true;
    const h=(loc.hostname||'').toLowerCase();
    if(h==='localhost'||h==='127.0.0.1'||h==='')return true;
  }catch(e){}
  return false;
}
let _connectingBooted=false;
function bootIfStillConnecting(){
  if(_connectingBooted)return;
  const el=document.getElementById('connecting');
  if(el&&el.classList.contains('hide')){ _connectingBooted=true; return; }
  _connectingBooted=true;
  console.warn('ATLAS: forcing boot (local/offline or timeout)');
  hideConnectingAndBoot();
}
async function initFirebase(){
  setTimeout(bootIfStillConnecting,2000);
  setTimeout(bootIfStillConnecting,5000);
  try{ loadTheme();loadAIKey(); }catch(e){ bootIfStillConnecting(); return; }
  if(typeof firebaseConfig==='undefined'||(firebaseConfig&&firebaseConfig.apiKey==='REPLACE_ME')){
    console.warn('Firebase not configured — running in local-only mode');
    bootIfStillConnecting();
    return;
  }
  if(isLocalOrOffline()){
    console.warn('Local/offline — running in local-only mode (no Firebase)');
    bootIfStillConnecting();
    return;
  }
  let connectingHidden=false;
  const fallback=()=>{
    if(connectingHidden)return;
    connectingHidden=true;
    console.warn('Firebase timeout or error — falling back to local data');
    bootIfStillConnecting();
  };
  const timeoutId=setTimeout(fallback,6000);
  try{
    if(typeof firebase==='undefined'){fallback();return}
    firebase.initializeApp(firebaseConfig);
    TEAM_KEY=await hashPassword('Powering Digital with AI');
    saveTeamKey(TEAM_KEY);
    connectFirebase(()=>{clearTimeout(timeoutId);connectingHidden=true});
  }catch(e){
    fallback();
  }
}
let presenceRef=null;
function connectFirebase(onReady){
  dbRef=firebase.database().ref('teams/'+TEAM_KEY);
  presenceRef=firebase.database().ref('teams/'+TEAM_KEY+'/_presence');
  firebase.auth().signInAnonymously().then(()=>{
    dbRef.once('value').then(snap=>{
      const val=snap.val();
      if(val&&val.workstreams){
        D=val;
        ensureGroups();
        ensureWorkstreamsV3AndBusinessOutcomes();
        ensureReportNotesBusinessOutcomesDefaults();
        saveLs()
      }
      else{loadLs();save()}
      firebaseReady=true;
      document.getElementById('connecting').classList.add('hide');
      loadMe();renderLinks();authGate();go(V);
      if(ME&&SESSION_VERIFIED)setTimeout(checkReleaseNotes,600);
      if(typeof onReady==='function')onReady();
      dbRef.on('value',snap=>{
        const val=snap.val();
        if(val&&val.workstreams){
          delete val._presence;
          D=val;
          ensureGroups();
          ensureWorkstreamsV3AndBusinessOutcomes();
          ensureReportNotesBusinessOutcomesDefaults();
          saveLs();
          renderLinks();
          render()
        }
      });
      startPresence();
    });
  }).catch(()=>{
    document.getElementById('connecting').classList.add('hide');
    loadLs();loadMe();renderLinks();authGate();go(V);
    if(ME&&SESSION_VERIFIED)setTimeout(checkReleaseNotes,600);
    if(typeof onReady==='function')onReady();
  });
}
function startPresence(){
  if(!presenceRef||!ME)return;
  const uid=firebase.auth().currentUser?.uid;if(!uid)return;
  const myRef=presenceRef.child(uid);
  const sendHeartbeat=()=>{if(ME)myRef.set({name:ME,ts:firebase.database.ServerValue.TIMESTAMP})};
  sendHeartbeat();
  setInterval(sendHeartbeat,30000);
  myRef.onDisconnect().remove();
  presenceRef.on('value',snap=>{
    const val=snap.val()||{};
    const now=Date.now();
    const active=Object.values(val).filter(u=>u.ts&&(now-u.ts)<90000);
    renderPresence(active);
  });
}

let toastTimeout=null,toastUndoFn=null;

function getDailyUpdateStats(){
  const todayStr=today();
  const allItems=[...(D.workstreams||[]),...(D.tasks||[])];
  
  // Get all people who are assigned to items (leads, co-leads, owners)
  // Filter out slash-separated names (those are co-lead pairs, not individuals)
  const assignedPeople=new Set();
  (D.workstreams||[]).forEach(w=>{
    const lead=w.primaryOwner||w.owner;
    if(lead&&!lead.includes('/'))assignedPeople.add(lead);
    if(w.secondaryOwner&&!w.secondaryOwner.includes('/'))assignedPeople.add(w.secondaryOwner);
  });
  (D.tasks||[]).forEach(t=>{
    if(t.owner&&!t.owner.includes('/'))assignedPeople.add(t.owner);
  });
  
  // Calculate who updated today
  const updatedToday=new Set();
  allItems.forEach(item=>{
    if(item.updatedBy && item.updatedAt && item.updatedAt.slice(0,10)===todayStr){
      updatedToday.add(item.updatedBy);
    }
  });
  
  // Calculate streaks for each person (weekdays only)
  function isWeekday(dateStr){
    const d=new Date(dateStr);
    const day=d.getDay();
    return day!==0&&day!==6;
  }
  function getPrevWeekday(dateStr){
    let d=new Date(dateStr);
    do{d.setDate(d.getDate()-1)}while(!isWeekday(d.toISOString().slice(0,10)));
    return d.toISOString().slice(0,10);
  }
  
  const personStats={};
  assignedPeople.forEach(name=>{
    if(!name)return;
    const myItems=allItems.filter(i=>i.updatedBy===name);
    const updateDates=[...new Set(myItems.map(i=>i.updatedAt?.slice(0,10)).filter(Boolean))].sort().reverse();
    
    let streak=0;
    let checkDate=todayStr;
    
    // Only count streak if today is a weekday or check from last weekday
    if(!isWeekday(todayStr))checkDate=getPrevWeekday(todayStr);
    
    while(updateDates.includes(checkDate)){
      streak++;
      checkDate=getPrevWeekday(checkDate);
    }
    
    personStats[name]={
      updatedToday:updatedToday.has(name),
      streak:streak
    };
  });
  
  // Sort by streak descending
  const sorted=Object.entries(personStats)
    .filter(([name])=>assignedPeople.has(name))
    .sort((a,b)=>b[1].streak-a[1].streak);
  
  const updated=sorted.filter(([,s])=>s.updatedToday);
  const waiting=sorted.filter(([,s])=>!s.updatedToday);
  const total=sorted.length;
  const updatedCount=updated.length;
  const topStreak=sorted.length?sorted[0]:null;
  
  return {updated,waiting,total,updatedCount,topStreak,personStats};
}

function renderDailyUpdatesWidget(){
  const stats=getDailyUpdateStats();
  if(stats.total===0)return '';
  
  const pct=stats.total?Math.round(stats.updatedCount/stats.total*100):0;
  const barColor=pct>=80?'#10b981':pct>=50?'#f59e0b':'#ef4444';
  
  // Top 3 streaks
  const topStreaks=stats.updated.slice(0,3).map(([name,s])=>`${name.split(' ')[0]} (${s.streak})`).join(' · ');
  
  // Waiting names (first names only)
  const waitingNames=stats.waiting.slice(0,5).map(([name])=>name.split(' ')[0]).join(', ');
  const moreWaiting=stats.waiting.length>5?`, +${stats.waiting.length-5} more`:'';
  
  return `
  <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:16px 20px;margin-bottom:20px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">

      </div>

    </div>
    <div style="height:8px;background:var(--bg-subtle);border-radius:4px;overflow:hidden;margin-bottom:12px">
      <div style="height:100%;width:${pct}%;background:${barColor};border-radius:4px;transition:width .5s ease"></div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;font-size:12px">
      ${topStreaks?`<div style="display:flex;align-items:center;gap:6px"><span style="color:#f59e0b">🔥</span><span style="color:var(--fg);font-weight:500">Top:</span><span style="color:var(--muted)">${topStreaks}</span></div>`:''}
      ${stats.waiting.length?`<div style="display:flex;align-items:center;gap:6px;margin-left:auto"><span style="color:#ef4444">⚠️</span><span style="color:var(--muted)">Waiting: ${waitingNames}${moreWaiting}</span></div>`:`<div style="margin-left:auto;color:#10b981;font-weight:500">✓ Everyone updated!</div>`}
    </div>
  </div>`;
}

function toast(msg,undoFn=null,duration=3500){
  const t=document.getElementById('toast');
  if(toastTimeout)clearTimeout(toastTimeout);
  toastUndoFn=undoFn;
  if(undoFn){
    t.innerHTML=`<span class="toast-msg">${msg}</span><button class="toast-undo" onclick="event.stopPropagation();executeToastUndo()">Undo</button><div class="toast-progress" style="width:100%"></div>`;
    setTimeout(()=>{const p=t.querySelector('.toast-progress');if(p)p.style.width='0%';if(p)p.style.transitionDuration=duration+'ms'},10);
  }else{
    t.innerHTML=`<span class="toast-msg">${msg}</span>`;
  }
  t.classList.add('show');
  toastTimeout=setTimeout(()=>{t.classList.remove('show');toastUndoFn=null},duration);
}
function executeToastUndo(){

}

let inlineEditActive=false;
function inlineEditWsName(wsId,el,e){
  e.stopPropagation();
  if(inlineEditActive)return;
  inlineEditActive=true;
  const w=(D.workstreams||[]).find(x=>x.id===wsId);
  if(!w)return;
  const oldName=w.name;
  const span=el;
  const rect=span.getBoundingClientRect();
  const input=document.createElement('input');
  input.type='text';
  input.value=oldName;
  input.style.cssText=`font-size:inherit;font-weight:inherit;color:inherit;background:var(--bg-card);border:2px solid var(--accent);border-radius:4px;padding:2px 6px;width:${Math.max(200,rect.width+20)}px;outline:none`;
  input.onblur=()=>{finishInlineEdit(wsId,input.value,oldName,span,input)};
  input.onkeydown=(ev)=>{
    if(ev.key==='Enter'){ev.preventDefault();input.blur()}
    if(ev.key==='Escape'){input.value=oldName;input.blur()}
  };
  span.style.display='none';
  span.parentNode.insertBefore(input,span.nextSibling);
  input.focus();
  input.select();
}
function finishInlineEdit(wsId,newName,oldName,span,input){
  inlineEditActive=false;

  span.style.display='';

  const w=(D.workstreams||[]).find(x=>x.id===wsId);
  if(!w)return;
  w.name=newName;
  w.updatedAt=new Date().toISOString();
  w.updatedBy=ME||'Unknown';
  save();

}

function getImmediateFocus(){
  const t=()=>new Date().toISOString().slice(0,10);
  const now=t();
  const tasks=(D.tasks||[]).filter(x=>x.status!=='done');
  const overdueTasks=tasks.filter(x=>x.due&&x.due<now).sort((a,b)=>(a.due||'').localeCompare(b.due||''));
  const allMs=tasks.filter(x=>x.isMilestone);
  const overdueMilestones=allMs.filter(x=>x.due&&x.due<now).sort((a,b)=>(a.due||'').localeCompare(b.due||''));
  const wkEnd=new Date(now+'T00:00:00');wkEnd.setDate(wkEnd.getDate()+7);
  const wkEndStr=wkEnd.toISOString().slice(0,10);
  const twoWkEnd=new Date(now+'T00:00:00');twoWkEnd.setDate(twoWkEnd.getDate()+14);
  const twoWkEndStr=twoWkEnd.toISOString().slice(0,10);
  const dueThisWeek=tasks.filter(x=>x.due&&x.due>=now&&x.due<=wkEndStr).sort((a,b)=>(a.due||'').localeCompare(b.due||''));
  const dueNextTwoWeeks=tasks.filter(x=>x.due&&x.due>wkEndStr&&x.due<=twoWkEndStr).sort((a,b)=>(a.due||'').localeCompare(b.due||''));
  const openRisks=(D.risks||[]).filter(r=>r.status!=='closed').sort((a,b)=>{const o={critical:0,high:1,medium:2,low:3};return (o[a.impact]||2)-(o[b.impact]||2);});
  return{overdueTasks,overdueMilestones,dueThisWeek,dueNextTwoWeeks,openRisks};
}

function generateDailyUpdate(){
  const now=today();
  const yesterday=new Date(now+'T00:00:00');
  yesterday.setDate(yesterday.getDate()-1);
  const yesterdayStr=yesterday.toISOString().slice(0,10);
  
  const next3Days=new Date(now+'T00:00:00');
  next3Days.setDate(next3Days.getDate()+3);
  const next3DaysStr=next3Days.toISOString().slice(0,10);
  
  // Updates in last day (tasks updated, completed, or added)
  const recentUpdates=(D.tasks||[]).filter(t=>{
    const updated=t.updatedAt?t.updatedAt.slice(0,10):t.created;
    return updated>=yesterdayStr;
  }).sort((a,b)=>(b.updatedAt||b.created||'').localeCompare(a.updatedAt||a.created||''));
  
  // Due today
  const dueToday=(D.tasks||[]).filter(t=>t.status!=='done'&&t.due===now).sort((a,b)=>(a.title||'').localeCompare(b.title||''));
  
  // Due in next 3 days
  const dueNext3=(D.tasks||[]).filter(t=>t.status!=='done'&&t.due>now&&t.due<=next3DaysStr).sort((a,b)=>(a.due||'').localeCompare(b.due||''));
  
  // Issues and concerns (overdue, at-risk workstreams, open risks)
  const overdue=(D.tasks||[]).filter(t=>t.status!=='done'&&t.due&&t.due<now).sort((a,b)=>(a.due||'').localeCompare(b.due||''));
  const atRiskWs=(D.workstreams||[]).filter(w=>{
    const s=w.status;
    return s==='at-risk'||s==='blocked';
  });
  const openRisks=(D.risks||[]).filter(r=>r.status!=='closed'&&(r.impact==='critical'||r.impact==='high')).sort((a,b)=>{
    const o={critical:0,high:1};
    return (o[a.impact]||1)-(o[b.impact]||1);
  });
  
  let report=`DAILY UPDATE — ${new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'})}\n\n`;
  
  // Recent Updates
  if(recentUpdates.length){
    report+='📊 RECENT UPDATES (Last 24h)\n';
    recentUpdates.slice(0,8).forEach(t=>{
      const ws=wsNamePlain(t.workstream)||'No workstream';
      const status=t.status==='done'?'✓ Done':taskStatusLabel(t.status);
      report+=`  • ${t.isMilestone?'★ ':''}${t.title} — ${t.owner||'Unassigned'} (${status}, ${ws})\n`;
    });
    if(recentUpdates.length>8)report+=`  ... and ${recentUpdates.length-8} more\n`;
    report+='\n';
  }
  
  // Due Today
  if(dueToday.length){
    report+='📅 DUE TODAY\n';
    dueToday.forEach(t=>{
      const ws=wsNamePlain(t.workstream)||'No workstream';
      report+=`  • ${t.isMilestone?'★ ':''}${t.title} — ${t.owner||'Unassigned'} (${ws})\n`;
    });
    report+='\n';
  }
  
  // Due Next 3 Days
  if(dueNext3.length){
    report+='📅 DUE IN NEXT 3 DAYS\n';
    dueNext3.forEach(t=>{
      const ws=wsNamePlain(t.workstream)||'No workstream';
      report+=`  • ${fmtDate(t.due)}: ${t.isMilestone?'★ ':''}${t.title} — ${t.owner||'Unassigned'} (${ws})\n`;
    });
    report+='\n';
  }
  
  // Issues & Concerns
  if(overdue.length||atRiskWs.length||openRisks.length){
    report+='⚠️  ISSUES & CONCERNS\n';
    
    if(overdue.length){
      report+=`  Overdue (${overdue.length}):\n`;
      overdue.slice(0,6).forEach(t=>{
        report+=`    • ${fmtDate(t.due)}: ${t.isMilestone?'★ ':''}${t.title} — ${t.owner||'Unassigned'}\n`;
      });
      if(overdue.length>6)report+=`    ... and ${overdue.length-6} more\n`;
    }
    
    if(atRiskWs.length){
      if(overdue.length)report+='\n';
      report+=`  At-Risk Workstreams (${atRiskWs.length}):\n`;
      atRiskWs.forEach(w=>{
        report+=`    • ${w.name} — ${w.owner||'TBD'}\n`;
      });
    }
    
    if(openRisks.length){
      if(overdue.length||atRiskWs.length)report+='\n';
      report+=`  High/Critical Risks (${openRisks.length}):\n`;
      openRisks.slice(0,4).forEach(r=>{
        report+=`    • [${r.impact.toUpperCase()}] ${r.title}\n`;
      });
      if(openRisks.length>4)report+=`    ... and ${openRisks.length-4} more\n`;
    }
    report+='\n';
  }
  
  if(!recentUpdates.length&&!dueToday.length&&!dueNext3.length&&!overdue.length&&!atRiskWs.length&&!openRisks.length){
    report+='No updates, items due, or concerns to report.\n\n';
  }
  
  return report;
}

function wsOptsHierarchy(sel,excludeId){
  const all=(D.workstreams||[]).filter(w=>w.id!==excludeId).map(w=>({id:w.id,name:w.name,parentWs:w.parentWs,color:w.color}));
  const allMap=new Map(all.map(w=>[w.id,w]));
  function getLevel(w){
    let lvl=1,cur=w;
    while(cur&&cur.parentWs&&allMap.has(cur.parentWs)){cur=allMap.get(cur.parentWs);lvl++;}
    return lvl;
  }
  const l1s=all.filter(w=>!w.parentWs).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  let html='';
  l1s.forEach(l1=>{
    html+=`<option value="${l1.id}"${sel===l1.id?' selected':''}>${esc(l1.name)}</option>`;
    const l2s=all.filter(w=>w.parentWs===l1.id).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    l2s.forEach(l2=>{
      html+=`<option value="${l2.id}"${sel===l2.id?' selected':''}>....↳ ${esc(l2.name)}</option>`;
      const l3s=all.filter(w=>w.parentWs===l2.id).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
      l3s.forEach(l3=>{
        html+=`<option value="${l3.id}"${sel===l3.id?' selected':''}>.........↳ ${esc(l3.name)}</option>`;
      });
    });
  });
  return html;
}

function normalizeWsStatus(v){
  if(!v)return'intake';
  if(v==='not-started'||v==='reachout-kickoff')return'intake';
  if(v==='discovery-workshops'||v==='capability-mapping'||v==='prioritization-planning'||v==='resourcing'||v==='roadmap-integration')return'prioritized-funded';
  if(v==='on-track'||v==='at-risk'||v==='blocked'||v==='pilot-validate'||v==='deploy-scale'||v==='delivery')return'delivery';
  if(v==='complete')return'value-achieved';
  if(WS_STATUSES.find(s=>s.value===v))return v;
  return'intake';
}
function wsStatusLabel(v){const norm=normalizeWsStatus(v);const s=WS_STATUSES.find(x=>x.value===norm);return s?s.label:'Intake';}

  return `

    <div class="ws-section-hd" onclick="toggleWsSection('dashSec-timeline')" style="background:var(--bg-card);padding:14px 18px;border-radius:var(--r-sm) var(--r-sm) 0 0;border:1px solid var(--border)"><h4 style="font-size:16px;font-weight:800;color:var(--text)">Program Timeline</h4><span class="ws-section-arrow">&#9660;</span></div>
    <div class="ws-section-bd" style="padding:10px 14px;border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r-sm) var(--r-sm);background:var(--bg-card)">
      ${buildGantt()}
    </div>
  </div>

  <div class="ws-section collapsed" id="dashSec-log" style="margin-top:16px">
    <div class="ws-section-hd" onclick="toggleWsSection('dashSec-log')"><h4>Activity Log</h4><span class="ws-section-arrow">&#9660;</span></div>
    <div class="ws-section-bd" style="padding:10px 14px">
      <div style="max-height:180px;overflow-y:auto">${(D.log||[]).slice(0,20).map(l=>`<div style="padding:4px 0;font-size:11.5px;border-bottom:1px solid var(--border-lt);display:flex;gap:8px"><span style="color:var(--light);flex-shrink:0;font-size:10px;min-width:60px">${new Date(l.ts).toLocaleDateString()}</span><span>${l.text}</span></div>`).join('')}</div>

}

function renderMyWorkSection(){
  const myWs=(D.workstreams||[]).filter(w=>{
    const owner=w.owner||WS_DEFS.find(d=>d.id===w.id)?.owner||'';
    return owner===ME;
  }).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const myTasks=(D.tasks||[]).filter(t=>t.owner===ME).sort((a,b)=>{
    const so={'not-started':0,'open':1,'delayed':2,'blocked-dependency':3,'done':4,'blocked':3};
    if(normalizeTaskStatus(a.status)!==normalizeTaskStatus(b.status))return (so[normalizeTaskStatus(a.status)]??1)-(so[normalizeTaskStatus(b.status)]??1);
    if(a.status!=='done'&&a.due&&b.due)return (a.due||'9').localeCompare(b.due||'9');
    return (a.title||'').localeCompare(b.title||'');
  });
  const openTasks=myTasks.filter(t=>t.status!=='done');
  const doneTasks=myTasks.filter(t=>t.status==='done');

  if(!ME){
    return `<div class="card" style="padding:32px;text-align:center">
      <h3 style="margin-bottom:12px;font-size:18px">My Work Items</h3>
      <p style="color:var(--muted);margin-bottom:20px">Sign in to see workstreams and action items assigned to you.</p>
      <button class="mbtn mb-save" onclick="changeName()">Sign in</button>
    </div>`;
  }

  const wsTile=(w)=>{
    const wAll=(D.tasks||[]).filter(t=>t.workstream===w.id);
    const wDone=wAll.filter(t=>t.status==='done').length;
    const wOpen=wAll.filter(t=>t.status!=='done').length;
    const pct=wAll.length?Math.round(wDone/wAll.length*100):0;
    const wc=wsColor(w.id);
    return `<div style="border-radius:var(--r-lg);cursor:pointer;overflow:hidden;box-shadow:var(--shadow);background:${wc}" onclick="openWsDetail('${w.id}')">
      <div style="padding:12px 14px;color:#fff">
        <div style="font-size:13px;font-weight:700">${esc(w.name)}</div>
        <div style="font-size:11px;opacity:.9;margin-top:4px">${wsStatusLabel(w.status)} &middot; ${wOpen} open</div>
        <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
          <div style="flex:1;height:4px;border-radius:2px;background:rgba(255,255,255,.25);overflow:hidden"><div style="height:100%;border-radius:2px;background:#fff;width:${pct}%"></div></div>
          <span style="font-size:10px;opacity:.85;font-weight:600">${pct}%</span>
        </div>
      </div>
    </div>`;
  };
  const taskRow=(t)=>{
    const isOD=t.status!=='done'&&t.due&&t.due<today();
    const rowBg=isOD?'background:var(--red-lt)':'';
    return `<tr onclick="openTaskModal('${t.id}')" style="cursor:pointer;${rowBg}">
      <td style="vertical-align:middle;width:28px" onclick="event.stopPropagation()"><div class="task-chk${t.status==='done'?' done':''}" onclick="toggleTask('${t.id}')">&#10003;</div></td>
      <td style="${t.status==='done'?'text-decoration:line-through;color:var(--muted)':''}">${t.isMilestone?'<span style="color:#f59e0b">&#9733;</span> ':''}${t.isPriority?'<span style="color:#8b5cf6">&#9670;</span> ':''}${esc(t.title)}</td>
      <td style="font-size:12px;color:var(--muted)">${wsName(t.workstream)}</td>
      <td style="font-size:12px;color:var(--muted)">${t.due?fmtDate(t.due):'—'}</td>
      <td><span class="pill ${taskStatusPill(t.status)}" style="font-size:10px">${taskStatusLabel(t.status)}</span></td>
      <td style="font-size:10px;color:var(--light)" title="${t.updatedAt||''}">${timeAgo(t.updatedAt)}</td>
    </tr>`;
  };

  return `
  <div class="card" style="margin-bottom:20px;padding:18px 20px">
    <h3 style="font-size:15px;font-weight:700;margin:0 0 12px">Workstreams you own</h3>
    ${myWs.length
      ?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">${myWs.map(wsTile).join('')}</div>`
      :'<p style="color:var(--muted);font-size:13px;margin:0">No workstreams assigned to you.</p>'}
  </div>

  <div class="card" style="margin-bottom:20px;padding:18px 20px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div>
        <h3 style="font-size:15px;font-weight:700;margin:0">Your action items</h3>
        <p style="color:var(--muted);font-size:13px;margin:4px 0 0">${openTasks.length} open, ${doneTasks.length} done</p>
      </div>
      <div style="display:flex;align-items:center;gap:2px">
        <button type="button" title="List view" onclick="myWorkViewMode='list';render()" style="padding:5px 8px;border:1px solid ${myWorkViewMode==='list'?'var(--accent)':'var(--border)'};border-radius:var(--r-xs) 0 0 var(--r-xs);background:${myWorkViewMode==='list'?'var(--accent)':'var(--bg-subtle)'};color:${myWorkViewMode==='list'?'#fff':'var(--muted)'};cursor:pointer;display:flex;align-items:center">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
        </button>
        <button type="button" title="Kanban view" onclick="myWorkViewMode='kanban';render()" style="padding:5px 8px;border:1px solid ${myWorkViewMode==='kanban'?'var(--accent)':'var(--border)'};border-radius:0 var(--r-xs) var(--r-xs) 0;background:${myWorkViewMode==='kanban'?'var(--accent)':'var(--bg-subtle)'};color:${myWorkViewMode==='kanban'?'#fff':'var(--muted)'};cursor:pointer;display:flex;align-items:center">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="5" height="15" rx="1"/></svg>
        </button>
      </div>
    </div>
    ${myTasks.length
      ?(myWorkViewMode==='kanban'?renderMyWorkKanban(myTasks):`<table class="tbl" style="width:100%"><thead><tr><th style="width:28px"></th><th>Action Item</th><th style="width:18%">Workstream</th><th style="width:12%">Target</th><th style="width:80px">Status</th><th style="width:80px">Updated</th></tr></thead><tbody>${myTasks.map(taskRow).join('')}</tbody></table>`)
      :'<p style="color:var(--muted);font-size:13px;margin:0">No action items assigned to you.</p>'}
  </div>`;
}
