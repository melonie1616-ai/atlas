}

let myWorkTab='all',myWorkSort='due',myWorkSortDir=1;
function rMyWork(c){
  const me=ME||'';
  if(!me){
    c.innerHTML=`<div class="page-wrap"><div style="padding:40px;text-align:center;color:var(--muted)">
      <p style="font-size:16px;margin-bottom:12px">Please set your name to see your work items.</p>
      <button class="btn btn-p" onclick="changeName()">Set Your Name</button>
    </div></div>`;
    return;
  }
  
  const myWs=(D.workstreams||[]).filter(w=>
    (w.category==='BU'||w.category==='Cross-cutting')&&
    (w.primaryOwner===me||w.secondaryOwner===me||w.owner===me)
  );
  const myTasks=(D.tasks||[]).filter(t=>t.owner===me);
  const openTasks=myTasks.filter(t=>t.status!=='done');
  const doneTasks=myTasks.filter(t=>t.status==='done');
  const overdueTasks=openTasks.filter(t=>t.due&&t.due<today());
  
  let displayWs=myWs;
  let displayTasks=myTasks;
  
  if(myWorkTab==='workstreams'){displayTasks=[];}
  else if(myWorkTab==='actions'){displayWs=[];}
  else if(myWorkTab==='open'){displayTasks=openTasks;displayWs=myWs.filter(w=>w.status!=='closed');}
  else if(myWorkTab==='overdue'){displayTasks=overdueTasks;displayWs=myWs.filter(w=>w.targetDate&&w.targetDate<today()&&w.status!=='closed');}
  
  if(myWorkSort==='name'){
    displayWs.sort((a,b)=>myWorkSortDir*(a.name||'').localeCompare(b.name||''));
    displayTasks.sort((a,b)=>myWorkSortDir*(a.title||'').localeCompare(b.title||''));
  }else if(myWorkSort==='due'){
    displayWs.sort((a,b)=>myWorkSortDir*(a.targetDate||'9999').localeCompare(b.targetDate||'9999'));
    displayTasks.sort((a,b)=>myWorkSortDir*(a.due||'9999').localeCompare(b.due||'9999'));
  }else if(myWorkSort==='status'){
    displayWs.sort((a,b)=>myWorkSortDir*(a.status||'').localeCompare(b.status||''));
    displayTasks.sort((a,b)=>myWorkSortDir*(a.status||'').localeCompare(b.status||''));
  }
  
  const renderWsRow=(w)=>{
    const sc=statusColors[w.status]||'pill-m';
    const taskCount=(D.tasks||[]).filter(t=>t.workstream===w.id).length;
    const openCount=(D.tasks||[]).filter(t=>t.workstream===w.id&&t.status!=='done').length;
    const isLead=w.primaryOwner===me;
    const levelBg=w.level===1?'#6366f1':w.level===2?'#8b5cf6':'#a855f7';
    return `<tr onclick="openWsDetail('${w.id}')" style="cursor:pointer" onmouseenter="this.style.background='var(--bg-subtle)'" onmouseleave="this.style.background=''">
      <td><span style="font-size:9px;color:#fff;background:${levelBg};padding:1px 5px;border-radius:3px;margin-right:6px">L${w.level||2}</span><span style="font-weight:500">${esc(w.name)}</span></td>
      <td><span class="pill ${isLead?'pill-i':'pill-m'}" style="font-size:10px">${isLead?'Lead':'Co-Lead'}</span></td>
      <td><span class="pill ${sc}" style="font-size:10px">${wsStatusLabel(w.status)}</span></td>
      <td style="font-size:12px;color:${w.targetDate&&w.targetDate<today()?'var(--red)':'var(--muted)'}">${w.targetDate?fmtDate(w.targetDate):'—'}</td>
      <td style="font-size:12px;color:var(--muted)">${openCount} open / ${taskCount}</td>
    </tr>`;
  };
  
  const renderTaskRow=(t)=>{
    const isDone=t.status==='done';
    const isOD=!isDone&&t.due&&t.due<today();
    const ws=(D.workstreams||[]).find(w=>w.id===t.workstream);
    const statusPill=isDone?'pill-g':isOD?'pill-r':taskStatusPill(t.status);
    const msIcon=t.isMilestone?'<span style="color:#f59e0b;margin-right:4px">★</span>':'';
    const prIcon=t.isPriority?'<span style="color:#8b5cf6;margin-right:4px">◆</span>':'';
    return `<tr onclick="openTaskModal('${t.id}')" style="cursor:pointer" onmouseenter="this.style.background='var(--bg-subtle)'" onmouseleave="this.style.background=''">
      <td>${msIcon}${prIcon}<span style="${isDone?'text-decoration:line-through;color:var(--muted)':''}">${esc(t.title)}</span></td>
      <td style="font-size:12px;color:var(--muted)">${ws?esc(ws.name):'—'}</td>
      <td><span class="pill ${statusPill}" style="font-size:10px">${isDone?'Done':isOD?'Overdue':taskStatusLabel(t.status)}</span></td>
      <td style="font-size:12px;color:${isOD?'var(--red)':'var(--muted)'}">${t.due?fmtDate(t.due):'—'}</td>
    </tr>`;
  };
  
  const sIco=(col)=>myWorkSort===col?(myWorkSortDir===1?' ▲':' ▼'):'';
  
  c.innerHTML=`
  <div class="page-wrap">
    <div class="page-toolbar">
      <span class="page-title">My Work</span>
      <span style="font-size:13px;color:var(--muted)">${me}</span>
      <div class="pill-filters">
        <div class="pill${myWorkTab==='all'?' pill-i':' pill-m'}" onclick="myWorkTab='all';render()">All (${myWs.length+myTasks.length})</div>
        <div class="pill${myWorkTab==='open'?' pill-i':' pill-m'}" onclick="myWorkTab='open';render()">Open (${myWs.filter(w=>w.status!=='closed').length+openTasks.length})</div>
        <div class="pill${myWorkTab==='overdue'?' pill-r':' pill-m'}" onclick="myWorkTab='overdue';render()" style="${overdueTasks.length?'':'opacity:.6'}">Overdue (${overdueTasks.length})</div>
        <div class="pill${myWorkTab==='workstreams'?' pill-i':' pill-m'}" onclick="myWorkTab='workstreams';render()">Workstreams (${myWs.length})</div>
        <div class="pill${myWorkTab==='actions'?' pill-i':' pill-m'}" onclick="myWorkTab='actions';render()">Action Items (${myTasks.length})</div>
      </div>
      <div class="toolbar-right">
        <select onchange="myWorkSort=this.value;render()">
          <option value="due"${myWorkSort==='due'?' selected':''}>Sort by Due Date</option>
          <option value="name"${myWorkSort==='name'?' selected':''}>Sort by Name</option>
          <option value="status"${myWorkSort==='status'?' selected':''}>Sort by Status</option>
        </select>
        <button class="btn btn-s" onclick="myWorkSortDir=myWorkSortDir===1?-1:1;render()">${myWorkSortDir===1?'↑ Asc':'↓ Desc'}</button>
      </div>
    </div>
    
    ${displayWs.length?`<div style="margin-bottom:24px">
      <h3 style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text)">My Workstreams (${displayWs.length})</h3>
      <table class="tbl" style="width:100%">
        <thead><tr>
          <th style="cursor:pointer" onclick="myWorkSort='name';myWorkSortDir=myWorkSort==='name'?-myWorkSortDir:1;render()">Workstream${sIco('name')}</th>
          <th style="width:80px">Role</th>
          <th style="width:120px;cursor:pointer" onclick="myWorkSort='status';myWorkSortDir=myWorkSort==='status'?-myWorkSortDir:1;render()">Status${sIco('status')}</th>
          <th style="width:100px;cursor:pointer" onclick="myWorkSort='due';myWorkSortDir=myWorkSort==='due'?-myWorkSortDir:1;render()">Target${sIco('due')}</th>
          <th style="width:100px">Items</th>
        </tr></thead>
        <tbody>${displayWs.map(renderWsRow).join('')}</tbody>
      </table>
    </div>`:''}
    
    ${displayTasks.length?`<div>
      <h3 style="font-size:14px;font-weight:700;margin-bottom:10px;color:var(--text)">My Action Items (${displayTasks.length})</h3>
      <table class="tbl" style="width:100%">
        <thead><tr>
          <th style="cursor:pointer" onclick="myWorkSort='name';myWorkSortDir=myWorkSort==='name'?-myWorkSortDir:1;render()">Action Item${sIco('name')}</th>
          <th style="width:160px">Workstream</th>
          <th style="width:120px;cursor:pointer" onclick="myWorkSort='status';myWorkSortDir=myWorkSort==='status'?-myWorkSortDir:1;render()">Status${sIco('status')}</th>
          <th style="width:100px;cursor:pointer" onclick="myWorkSort='due';myWorkSortDir=myWorkSort==='due'?-myWorkSortDir:1;render()">Due${sIco('due')}</th>
        </tr></thead>
        <tbody>${displayTasks.map(renderTaskRow).join('')}</tbody>
      </table>
    </div>`:''}
    
    ${!displayWs.length&&!displayTasks.length?`<div style="padding:40px;text-align:center;color:var(--muted)">
      <p>No items match the current filter.</p>
    </div>`:''}
  </div>`;
}

function renderMyWorkKanban(myTasks){
  const grouped={};
  KB_COLS.forEach(col=>grouped[col.key]=[]);
  myTasks.forEach(t=>{
    const s=t.status||'not-started';
    if(grouped[s])grouped[s].push(t);

    return `<div class="${cardCls}" draggable="true" data-id="${t.id}" onclick="openTaskModal('${t.id}')"
      ondragover="event.preventDefault();event.stopPropagation();this.closest('.kb-col').classList.add('drag-over')"
      ondrop="event.preventDefault();event.stopPropagation();kbDrop(event,this.closest('.kb-col').dataset.status);this.closest('.kb-col').classList.remove('drag-over')"
      ondragstart="event.dataTransfer.setData('text/plain','${t.id}');this.classList.add('dragging')"
      ondragend="this.classList.remove('dragging')">
      <div class="kb-card-title">${t.isMilestone?'<span style="color:#f59e0b;margin-right:3px">&#9733;</span>':''}${t.isPriority?'<span style="color:#8b5cf6;margin-right:3px">&#9670;</span>':''}${esc(t.title)}</div>
      <div class="kb-card-meta" style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:6px">

        ${t.due?'<span style="font-size:11px;color:'+(isOD?'var(--red)':'var(--muted)')+';font-weight:'+(isOD||isDueToday?'600':'400')+'">'+(isOD?'&#9888; ':'')+(isDueToday?'&#9200; ':'')+fmtDate(t.due)+'</span>':''}
      </div>
      ${canAdvance?`<div style="margin-top:8px;display:flex;justify-content:flex-end"><button type="button" style="font-size:10.5px;border:1px solid var(--border);border-radius:var(--r-xs);padding:3px 8px;background:var(--bg-subtle);color:var(--muted);cursor:pointer" onclick="event.stopPropagation();advanceTaskStatus('${t.id}')">Next &#8594;</button></div>`:''}
    </div>`;
  };

  const renderCol=(col)=>{
    const colItems=grouped[col.key]||[];
    return `<div class="kb-col" data-status="${col.key}"
      ondragover="event.preventDefault();this.classList.add('drag-over')"
      ondragleave="this.classList.remove('drag-over')"
      ondrop="kbDrop(event,'${col.key}');this.classList.remove('drag-over')">
      <div class="kb-col-hdr" style="border-bottom-color:${col.accent}">
        <span>${col.label}</span>
        <span class="kb-count">${colItems.length}</span>
      </div>

        ondragover="event.preventDefault();event.stopPropagation();this.closest('.kb-col').classList.add('drag-over')"
        ondragleave="this.closest('.kb-col').classList.remove('drag-over')"
        ondrop="event.preventDefault();event.stopPropagation();kbDrop(event,'${col.key}');this.closest('.kb-col').classList.remove('drag-over')">

      </div>
    </div>`;
  };

  return `<div class="kb-board">${KB_COLS.map(renderCol).join('')}</div>`;
}

function setGanttZoom(z){ganttZoom=z;render()}
let ganttExpanded={};
function toggleGanttExpand(wsId){ganttExpanded[wsId]=!ganttExpanded[wsId];render()}

function getWsDateRange(wsId,depth=0){
  if(depth>10)return null;
  const w=(D.workstreams||[]).find(x=>x.id===wsId);
  if(!w)return null;
  
  // Check for manual dates (targetStart and targetDate)
  if(w.targetStart&&w.targetDate){
    return{start:w.targetStart,end:w.targetDate,isManual:true};
  }
  
  const children=(D.workstreams||[]).filter(c=>c.parentWs===wsId);
  const tasks=(D.tasks||[]).filter(t=>t.workstream===wsId);
  
  const allDates=[];
  
  children.forEach(c=>{
    const r=getWsDateRange(c.id,depth+1);
    if(r){allDates.push(r.start);allDates.push(r.end)}
  });
  
  tasks.forEach(t=>{
    if(t.startDate)allDates.push(t.startDate);
    if(t.due)allDates.push(t.due);
  });
  
  if(w.targetStart)allDates.push(w.targetStart);
  if(w.targetDate)allDates.push(w.targetDate);
  
  if(!allDates.length)return null;
  
  const sorted=allDates.filter(Boolean).sort();
  return{start:sorted[0],end:sorted[sorted.length-1],isManual:false};
}

function buildGantt(){
  const nowDate=new Date(today()+'T00:00:00');
  let tStart;
  if(ganttCustomStart){
    tStart=new Date(ganttCustomStart+'T00:00:00');
  }else{
    tStart=new Date(nowDate.getFullYear(),nowDate.getMonth(),nowDate.getDate());
  }
  let tEnd;
  const zoomMonths={'1m':1,'3m':3,'6m':6,'12m':12,'all':0}[ganttZoom]||6;
  if(ganttZoom==='all'){
    tEnd=new Date('2027-07-01');
  }else{
    tEnd=new Date(nowDate);tEnd.setMonth(tEnd.getMonth()+zoomMonths);
  }
  const totalDays=Math.max(1,(tEnd-tStart)/(864e5));

  function pct(d){return Math.max(0,Math.min(100,((new Date(d)-tStart)/(864e5))/totalDays*100))}

  const months=[];
  let cur=new Date(tStart.getFullYear(),tStart.getMonth(),1);
  while(cur<tEnd){months.push(new Date(cur));cur=new Date(cur.getFullYear(),cur.getMonth()+1,1)}
  const mNames=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  const todayPct=pct(today());
  let todayLblUsed=false;
  function todayMarker(){
    if(todayPct<0||todayPct>100)return '';
    const cls=todayLblUsed?'gantt-today':'gantt-today gantt-today-lbl';
    todayLblUsed=true;
    return `<div class="${cls}" style="left:${todayPct}%"></div>`;
  }

  const showYear=ganttZoom==='12m'||ganttZoom==='all';
  let monthHeaders=months.map(m=>{
    const lbl=mNames[m.getMonth()]+(showYear?' '+(m.getFullYear()%100):'');
    return `<div class="gantt-month">${lbl}</div>`;
  }).join('');
  let gridLines=months.map(m=>{const p=pct(m.toISOString().slice(0,10));return `<div class="gantt-grid-line" style="left:${p}%"></div>`}).join('');

  if(ganttZoom==='1m'){
    const weeks=[];
    let w=new Date(tStart);
    while(w<tEnd){weeks.push(new Date(w));w.setDate(w.getDate()+7)}
    monthHeaders=weeks.map(d=>`<div class="gantt-month">${mNames[d.getMonth()]} ${d.getDate()}</div>`).join('');
    gridLines=weeks.map(d=>{const p=pct(d.toISOString().slice(0,10));return `<div class="gantt-grid-line" style="left:${p}%"></div>`}).join('');
  }

  const zoomBtns=['1m','3m','6m','12m','all'].map(z=>
    `<div class="pill${ganttZoom===z?' pill-i':' pill-m'}" style="cursor:pointer;font-size:12px" onclick="setGanttZoom('${z}')">${z==='all'?'Full':z.toUpperCase()}</div>`
  ).join('');

  const l1Workstreams=(D.workstreams||[]).filter(w=>!w.parentWs).sort((a,b)=>(a.name||'').localeCompare(b.name||''));

  let rowsHtml='';
  let rowIdx=0;
  const rowH=28;

  function renderWsBar(w,level,yPos){
    const range=getWsDateRange(w.id);
    if(!range)return ''; // Safety check, but caller should have already verified
    
    const l=pct(range.start),r=pct(range.end);
    if(r<=0||l>=100)return '';
    
    const left=Math.max(0,l);
    const width=Math.max(0.5,Math.min(100,r)-left);
    const wc=level===0?'#2563eb':level===1?'#3b82f6':'#60a5fa';
    const indent=level*16;
    const barHeight=level===0?24:level===1?20:18;
    const fontSize=level===0?'12px':level===1?'11px':'10px';
    const fontWeight=level===0?'700':level===1?'600':'500';
    const opacity=range.isManual?'1':'.75';
    const borderStyle=range.isManual?'':'border:1px dashed rgba(255,255,255,.4);';
    
    const children=(D.workstreams||[]).filter(c=>c.parentWs===w.id);
    const hasChildren=children.length>0;
    const isExpanded=ganttExpanded[w.id];
    const expandIcon=hasChildren?`<span onclick="event.stopPropagation();toggleGanttExpand('${w.id}')" style="margin-right:4px;font-size:10px;cursor:pointer">${isExpanded?'▼':'▶'}</span>`:'';
    
    const levelBadge=`<span style="font-size:9px;background:rgba(255,255,255,.25);padding:1px 4px;border-radius:3px;margin-right:4px">L${w.level||1}</span>`;
    const statusDot=w.status==='at-risk'||w.status==='blocked'?`<span style="color:#fbbf24;margin-left:4px">⚠</span>`:'';
    
    const tooltip=`${w.name}: ${fmtDate(range.start)} — ${fmtDate(range.end)} (${wsStatusLabel(w.status)})${range.isManual?'':' [calculated]'}`;
    
    return `<div class="gantt-bar" style="left:${left}%;width:${width}%;top:${yPos}px;background:${wc};color:#fff;font-size:${fontSize};font-weight:${fontWeight};height:${barHeight}px;cursor:pointer;opacity:${opacity};border-radius:4px;margin-left:${indent}px;${borderStyle}display:flex;align-items:center;padding:0 6px;white-space:nowrap;overflow:hidden" title="${esc(tooltip)}" onclick="openWsDetail('${w.id}')">${expandIcon}${levelBadge}${esc(w.name)}${statusDot}</div>`;
  }

  function collectVisibleRows(wsList,level){
    let bars='';
    wsList.forEach(w=>{
      // Only render and count row if workstream has dates
      const range=getWsDateRange(w.id);
      if(range){
        bars+=renderWsBar(w,level,rowIdx*rowH+2);
        rowIdx++;
      }
      
      if(ganttExpanded[w.id]){
        const children=(D.workstreams||[]).filter(c=>c.parentWs===w.id).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
        bars+=collectVisibleRows(children,level+1);
      }
    });
    return bars;
  }

  const wsBars=collectVisibleRows(l1Workstreams,0);
  const totalRows=rowIdx;

  if(totalRows>0){
    rowsHtml=`<div class="gantt-row" style="margin-top:8px">
      <div class="gantt-row-bars" style="height:${Math.max(40,totalRows*rowH+12)}px;position:relative">
        ${gridLines}
        ${wsBars}
        ${todayMarker()}
      </div>
    </div>`;
  }else{
    rowsHtml=`<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">No workstreams with dates to display. Add target dates to workstreams or action items to see them here.</div>`;
  }

  const legendHtml=`<div style="display:flex;gap:12px;margin-top:10px;padding:8px 12px;background:var(--bg-subtle);border-radius:var(--r-sm);font-size:11px;color:var(--muted);align-items:center;flex-wrap:wrap">
    <span style="font-weight:600">Legend:</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:20px;height:12px;background:var(--accent);border-radius:3px;opacity:1"></span> Manual dates</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="width:20px;height:12px;background:var(--accent);border-radius:3px;opacity:.75;border:1px dashed rgba(0,0,0,.2)"></span> Calculated from children</span>
    <span style="display:flex;align-items:center;gap:4px"><span style="color:#fbbf24">⚠</span> At risk/Blocked</span>
    <span style="display:flex;align-items:center;gap:4px">▶ Click to expand</span>
  </div>`;

  return `<div class="gantt">
    <div style="display:flex;align-items:center;justify-content:flex-end;margin-bottom:10px;padding:0 4px;flex-wrap:wrap;gap:8px">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:12px;color:var(--muted)">Starting</span>
        <input type="date" value="${tStart.toISOString().slice(0,10)}" onchange="ganttCustomStart=this.value;render()" style="padding:4px 8px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:12px;font-family:inherit;background:var(--bg);color:var(--text);cursor:pointer">
        <span style="font-size:12px;color:var(--muted);margin-left:8px">Zoom:</span>
        <div style="display:flex;gap:4px">${zoomBtns}</div>
      </div>
    </div>
    <div style="display:flex">
      <div class="gantt-label-col"></div>
      <div class="gantt-chart-col"><div class="gantt-months">${monthHeaders}</div></div>
    </div>
    ${rowsHtml}
    ${legendHtml}
  </div>`;
}

async function runAIInsights(){
  if(!OPENAI_KEY){toast('Set your OpenAI API key first');return}
  const el=document.getElementById('ai-insights');
  if(el)el.innerHTML='<p style="font-size:12.5px;color:var(--muted)">Analyzing program data...</p>';
  const ctx=getProgramContext();
  const result=await callAI(
    `You are a senior program advisor for Digital Realty's AI Transformation Program. STRICT RULES: (1) Output raw HTML only — NO code fences, NO backticks, NO markdown. (2) Each section header uses <strong style="font-size:13.5px">. (3) Bullets use <ul style="margin:4px 0 12px 8px;padding-left:16px"> and <li style="margin-bottom:3px">. (4) Be concise — each bullet is ONE sentence max. (5) ALWAYS include specific dates, counts (X of Y complete, X overdue), and percentages where the data supports it. (6) Name specific workstreams, owners, and deadlines. (7) Three sections: "Key Updates" (progress, wins, status with numbers), "Watch List" (overdue items, at-risk workstreams, blockers with dates), "Next Steps" (owner + action + date). 2-4 bullets per section.`,
    'Executive briefing. Use ONLY the numbers from the COUNTS line. For people: each OPEN TASK and MILESTONE in the data includes "owner: Name" — in Next Steps and elsewhere, assign actions ONLY to that owner (the person actually assigned to that task). Do not substitute workstream leads or guess; use the owner field from the data.\n\n'+ctx
  );
  if(!el)return;
  if(result){
    let clean=result.replace(/```html\s*/gi,'').replace(/```\s*/g,'').trim();
    window._aiAnalysisResult=`<div style="font-size:13px;line-height:1.7">${clean}</div>`;
    el.innerHTML=window._aiAnalysisResult;
  }else{
    el.innerHTML='<p style="font-size:12.5px;color:var(--red)">Could not generate insights. Check your API key and try again.</p>';
    window._aiAnalysisResult='';
  }
}

let workItemsExpanded={},workItemsCatCollapsed={BU:false,'Cross-cutting':false};
function rWorkItems(c){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const allWs=(D.workstreams||[]).filter(w=>w.category==='BU'||w.category==='Cross-cutting');
  const allTasks=(D.tasks||[]);
  
  function buildTree(category){
    const catWs=allWs.filter(w=>w.category===category);
    const l1s=catWs.filter(w=>!w.parentWs).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    const tree=[];
    function addChildren(parentId,depth){
      const children=catWs.filter(w=>w.parentWs===parentId).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
      children.forEach(ch=>{
        tree.push({type:'ws',item:ch,depth});
        if(workItemsExpanded[ch.id]){
          const tasks=allTasks.filter(t=>t.workstream===ch.id);
          tasks.forEach(t=>tree.push({type:'task',item:t,depth:depth+1,parentWs:ch.id}));
          addChildren(ch.id,depth+1);
        }
      });
    }
    l1s.forEach(ws=>{
      tree.push({type:'ws',item:ws,depth:0});
      if(workItemsExpanded[ws.id]){
        const tasks=allTasks.filter(t=>t.workstream===ws.id);
        tasks.forEach(t=>tree.push({type:'task',item:t,depth:1,parentWs:ws.id}));
        addChildren(ws.id,1);
      }
    });
    const orphanTasks=allTasks.filter(t=>{
      const ws=allWs.find(w=>w.id===t.workstream);
      return ws&&ws.category===category&&!catWs.some(w=>w.id===t.workstream&&(workItemsExpanded[w.id]));
    });
    return tree;
  }
  
  const buTree=buildTree('BU');
  const ccTree=buildTree('Cross-cutting');
  const totalBU=allWs.filter(w=>w.category==='BU').length;
  const totalCC=allWs.filter(w=>w.category==='Cross-cutting').length;
  const totalTasks=allTasks.length;
  const openTasks=allTasks.filter(t=>t.status!=='done').length;
  
  function renderItem(node){
    if(node.type==='ws'){
      const w=node.item;
      const depth=node.depth;
      const isExpanded=workItemsExpanded[w.id];
      const childCount=(D.workstreams||[]).filter(c=>c.parentWs===w.id).length;
      const taskCount=(D.tasks||[]).filter(t=>t.workstream===w.id).length;
      const hasChildren=childCount>0||taskCount>0;
      const indent=depth*24;
      const level=w.parentWs?depth+1:1;
      const isLate=w.targetDate&&w.targetDate<today()&&w.status!=='closed';
      const isAtRisk=w.status==='at-risk'||w.status==='blocked';
      const rowStyle=isLate||isAtRisk?'background:rgba(239,68,68,.05)':'';
      const expandIcon=hasChildren?`<span onclick="event.stopPropagation();workItemsExpanded['${w.id}']=!workItemsExpanded['${w.id}'];render()" style="cursor:pointer;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;margin-right:4px;font-size:10px;color:var(--muted);background:var(--bg-subtle)" onmouseover="this.style.background='var(--border)'" onmouseout="this.style.background='var(--bg-subtle)'">${isExpanded?'▼':'▶'}</span>`:`<span style="width:22px;display:inline-block"></span>`;
      const levelBadge=`<span style="font-size:9px;color:var(--muted);background:var(--bg-subtle);border:1px solid var(--border);padding:1px 5px;border-radius:4px;margin-right:6px">L${level}</span>`;
      const countBadge=hasChildren?`<span style="font-size:10px;color:var(--muted);margin-left:6px">(${childCount} sub, ${taskCount} items)</span>`:'';
      const nameStyle=isLate||isAtRisk?'color:var(--red);font-weight:'+(depth===0?'600':'500'):'font-weight:'+(depth===0?'600':'500');
      return `<tr onclick="openWsDetail('${w.id}')" style="cursor:pointer;height:40px;${rowStyle}" onmouseenter="this.style.background='var(--bg-subtle)'" onmouseleave="this.style.background='${rowStyle?'rgba(239,68,68,.05)':''}'">
        <td style="padding-left:${12+indent}px;white-space:nowrap">${expandIcon}${levelBadge}${isLate?'<span style="color:var(--red);margin-right:4px">⚠</span>':''}<span style="${nameStyle}">${esc(w.name)}</span>${countBadge}</td>

      </tr>`;
    }else{
      const t=node.item;
      const depth=node.depth;
      const indent=depth*24;
      const isDone=t.status==='done';
      const isOD=!isDone&&t.due&&t.due<today();

        <td style="padding-left:${12+indent}px;white-space:nowrap"><span style="width:22px;display:inline-block"></span><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--muted);margin-right:8px"></span>${msIcon}${prIcon}<span style="font-size:12.5px;${isDone?'text-decoration:line-through;color:var(--muted)':''}">${esc(t.title)}</span></td>

      </tr>`;
    }
  }

    const isCollapsed=workItemsCatCollapsed[collapseKey];

      <div onclick="workItemsCatCollapsed['${collapseKey}']=!workItemsCatCollapsed['${collapseKey}'];render()" style="cursor:pointer;display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg-subtle);border-radius:var(--r-sm);margin-bottom:8px;border:1px solid var(--border)">
        <span style="font-size:12px;color:var(--muted)">${isCollapsed?'&#9654;':'&#9660;'}</span>
        <span style="font-weight:700;font-size:14px">${name}</span>
        <span style="font-size:12px;color:var(--muted)">(${total} workstreams)</span>
      </div>
      ${isCollapsed?'':`<table class="tbl" style="width:100%">
        <thead><tr><th style="text-align:left">Name</th><th style="width:140px">Owner</th><th style="width:100px">Status</th><th style="width:100px">Target</th></tr></thead>
        <tbody>${tree.map(renderItem).join('')}</tbody>
      </table>`}
    </div>`;
  }
  
  c.innerHTML=`
  <div class="page-wrap">
    <div class="page-toolbar">
      <span class="page-title">Work Items</span>
      <div class="pill-filters">
        <div class="pill pill-m" onclick="Object.keys(workItemsExpanded).forEach(k=>workItemsExpanded[k]=true);(D.workstreams||[]).forEach(w=>workItemsExpanded[w.id]=true);render()">&#9660; Expand All</div>
        <div class="pill pill-m" onclick="workItemsExpanded={};render()">&#9650; Collapse All</div>
      </div>

// NEW WORKSTREAMS VIEW (Hierarchy + Kanban toggle, My/All filter)
// ═══════════════════════════════════════════════════
function getL1AndDescendants(l1Id){
  const ids=[l1Id];
  function addChildren(parentId){
    (D.workstreams||[]).filter(w=>w.parentWs===parentId).forEach(ch=>{ids.push(ch.id);addChildren(ch.id);});
  }
  addChildren(l1Id);
  return ids;
}
// ═══════════════════════════════════════════════════
let wsViewMode='hierarchy',wsMyFilter=false,wsExpanded={},wsOwnerFilter='',wsCoLeadFilter='',wsL1Filter='',wsStatusFilter='',wsPriorityFilter='';
function rWorkstreamsNew(c){
  const me=ME||'';
  const q=(document.getElementById('search').value||'').toLowerCase();
  let allWs=(D.workstreams||[]).slice();
  let allTasks=(D.tasks||[]);
  
  // Only include people actually assigned as leads (have at least one item, no slashes - those are co-lead pairs)
  const leads=[...new Set((D.workstreams||[]).map(w=>w.primaryOwner||w.owner).filter(n=>n&&!n.includes('/')))].sort();
  // Only include people actually assigned as co-leads (have at least one item, no slashes)
  const coLeads=[...new Set((D.workstreams||[]).map(w=>w.secondaryOwner).filter(n=>n&&!n.includes('/')))].sort();
  const l1Workstreams=allWs.filter(w=>!w.parentWs).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  
  if(wsOwnerFilter){
    if(wsOwnerFilter==='__unassigned__'){
      allWs=allWs.filter(w=>!w.primaryOwner&&!w.owner);
      allTasks=allTasks.filter(t=>!t.owner);
    }else{
      allWs=allWs.filter(w=>w.primaryOwner===wsOwnerFilter||w.secondaryOwner===wsOwnerFilter||w.owner===wsOwnerFilter);
      allTasks=allTasks.filter(t=>t.owner===wsOwnerFilter);
    }
  }
  if(wsL1Filter){
    const l1Ids=getL1AndDescendants(wsL1Filter);
    allWs=allWs.filter(w=>l1Ids.includes(w.id));
    allTasks=allTasks.filter(t=>l1Ids.includes(t.workstream));
  }
  if(wsStatusFilter){
    if(wsStatusFilter==='__overdue__'){
      allWs=allWs.filter(w=>w.targetDate&&w.targetDate<today()&&w.status!=='closed');
    }else{
      allWs=allWs.filter(w=>normalizeWsStatus(w.status)===wsStatusFilter);
    }
  }
  if(wsPriorityFilter){
    allWs=allWs.filter(w=>w.priority===wsPriorityFilter);
  }
  if(wsCoLeadFilter){
    const matchingIds=new Set();
    const allWsMap=new Map((D.workstreams||[]).map(w=>[w.id,w]));
    function addWithAncestors(w){
      if(!w||matchingIds.has(w.id))return;
      matchingIds.add(w.id);
      if(w.parentWs)addWithAncestors(allWsMap.get(w.parentWs));
    }
    allWs.filter(w=>w.secondaryOwner===wsCoLeadFilter).forEach(addWithAncestors);
    allWs=allWs.filter(w=>matchingIds.has(w.id));
  }
  if(q){
    allWs=allWs.filter(w=>(w.name+' '+w.desc+' '+(w.primaryOwner||w.owner||'')).toLowerCase().includes(q));
    allTasks=allTasks.filter(t=>(t.title+' '+t.owner+' '+t.notes).toLowerCase().includes(q));
  }
  
  const totalWs=allWs.length;
  const totalTasks=allTasks.length;
  const openTasks=allTasks.filter(t=>t.status!=='done').length;
  
  if(wsViewMode==='kanban'){
    renderWsKanban(c,allWs,me,owners,l1Workstreams);
    return;
  }
  
  function buildTree(){
    const l1s=allWs.filter(w=>!w.parentWs).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    const tree=[];
    function addChildren(parentId,depth){
      const children=allWs.filter(w=>w.parentWs===parentId).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
      children.forEach(ch=>{
        tree.push({type:'ws',item:ch,depth});
        if(wsExpanded[ch.id]){
          const tasks=allTasks.filter(t=>t.workstream===ch.id);
          tasks.forEach(t=>tree.push({type:'task',item:t,depth:depth+1}));
          addChildren(ch.id,depth+1);
        }
      });
    }
    l1s.forEach(ws=>{
      tree.push({type:'ws',item:ws,depth:0});
      if(wsExpanded[ws.id]){
        const tasks=allTasks.filter(t=>t.workstream===ws.id);
        tasks.forEach(t=>tree.push({type:'task',item:t,depth:1}));
        addChildren(ws.id,1);
      }
    });
    return tree;
  }
  
  const wsTree=buildTree();
  
  function renderItem(node){
    if(node.type==='ws'){
      const w=node.item;
      const depth=node.depth;
      const isExpanded=wsExpanded[w.id];
      const childCount=(D.workstreams||[]).filter(ch=>ch.parentWs===w.id).length;
      const taskCount=(D.tasks||[]).filter(t=>t.workstream===w.id).length;
      const hasChildren=childCount>0||taskCount>0;
      const indent=depth*24;
      const level=w.parentWs?depth+1:1;
      const isL1=!w.parentWs;
      const isLate=w.targetDate&&w.targetDate<today()&&w.status!=='closed';
      const isAtRisk=w.status==='at-risk'||w.status==='blocked';
      const rowStyle=isLate||isAtRisk?'background:rgba(239,68,68,.05)':'';

      const levelBadge=`<span style="font-size:9px;color:var(--muted);background:var(--bg-subtle);border:1px solid var(--border);padding:1px 5px;border-radius:4px;margin-right:6px">L${level}</span>`;
      const countBadge=hasChildren?`<span style="font-size:10px;color:var(--muted);margin-left:6px">(${childCount} sub, ${taskCount} items)</span>`:'';
      const nameStyle=isLate||isAtRisk?'color:var(--red);font-weight:'+(depth===0?'600':'500'):'font-weight:'+(depth===0?'600':'500');
      const dragAttrs=isL1?'':`draggable="true" ondragstart="event.dataTransfer.setData('text/plain','ws:${w.id}');this.classList.add('dragging-row');createDragGhost('${esc(w.name).replace(/'/g,"\\'")}');document.addEventListener('dragover',moveDragGhost)" ondragend="this.classList.remove('dragging-row');removeDragGhost();document.removeEventListener('dragover',moveDragGhost)"`;
      const dropAttrs=`ondragover="wsHierarchyDragOver(event,'${w.id}')" ondragleave="wsHierarchyDragLeave(event)" ondrop="wsHierarchyDrop(event,'${w.id}')"`;
      const dragHandle=isL1?'':`<span style="cursor:grab;color:var(--light);margin-right:4px;font-size:10px" title="Drag to move">⋮⋮</span>`;

        <td style="padding:6px 14px;padding-left:${14+indent}px;white-space:nowrap">${dragHandle}${expandIcon}${levelBadge}${isLate?'<span style="color:var(--red);margin-right:4px">⚠</span>':''}<span style="${nameStyle}" ondblclick="inlineEditWsName('${w.id}',this,event)" title="Double-click to edit">${esc(w.name)}</span>${countBadge}</td>
        <td style="padding:6px 14px;font-size:12px;color:var(--muted);white-space:nowrap">${esc(w.primaryOwner||w.owner||'')}</td>
        <td style="padding:6px 14px;font-size:12px;color:var(--muted);white-space:nowrap">${esc(w.secondaryOwner||'')}</td>
        <td style="padding:6px 14px;width:120px"><span class="pill pill-m" style="font-size:10px">${wsStatusLabel(w.status)}</span></td>

      </tr>`;
    }else{
      const t=node.item;
      const depth=node.depth;
      const indent=depth*24;
      const isDone=t.status==='done';
      const isOD=!isDone&&t.due&&t.due<today();
      const statusPill=isDone?'pill-g':isOD?'pill-r':taskStatusPill(t.status);
      const msIcon=t.isMilestone?'<span style="color:#f59e0b;margin-right:4px">★</span>':'';
      const prIcon=t.isPriority?'<span style="color:#8b5cf6;margin-right:4px">◆</span>':'';
      const parentWsId=t.workstream||'';
      return `<tr draggable="true" ondragstart="event.dataTransfer.setData('text/plain','task:${t.id}');this.style.opacity='0.5'" ondragend="this.style.opacity='1'" onclick="openTaskModal('${t.id}')" style="cursor:pointer;height:32px;background:rgba(0,0,0,.015);border-bottom:1px solid var(--border-lt)" onmouseenter="this.style.background='var(--bg-subtle)'" onmouseleave="this.style.background='rgba(0,0,0,.015)'">

  function renderTable(tree){

function wsKanbanDrop(event,newStatus){
  const data=event.dataTransfer.getData('text/plain');
  if(!data.startsWith('ws:'))return;
  const wsId=data.replace('ws:','');
  const w=(D.workstreams||[]).find(x=>x.id===wsId);
  if(!w)return;
  const oldStatus=w.status;
  w.status=newStatus;
  w.updatedBy=ME;w.updatedAt=new Date().toISOString();
  save();render();
  toast('Moved "'+w.name+'" to '+wsStatusLabel(newStatus),()=>{w.status=oldStatus;save();render()});
}

function aiKanbanDrop(event,newStatus){
  const data=event.dataTransfer.getData('text/plain');
  if(!data.startsWith('task:'))return;
  const taskId=data.replace('task:','');
  const t=(D.tasks||[]).find(x=>x.id===taskId);
  if(!t)return;
  const oldStatus=t.status;
  t.status=newStatus;
  t.updatedBy=ME;t.updatedAt=new Date().toISOString();
  save();render();
  toast('Moved "'+t.title+'" to '+taskStatusLabel(newStatus),()=>{t.status=oldStatus;save();render()});
}

function wsHierarchyDrop(event,targetWsId){
  event.preventDefault();
  const data=event.dataTransfer.getData('text/plain');
  if(!data)return;
  
  const targetWs=(D.workstreams||[]).find(x=>x.id===targetWsId);
  if(!targetWs)return;
  const targetLevel=targetWs.parentWs?2:1;
  
  if(data.startsWith('task:')){
    const taskId=data.replace('task:','');
    const t=(D.tasks||[]).find(x=>x.id===taskId);
    if(!t)return;
    if(t.workstream===targetWsId)return;
    const oldWs=(D.workstreams||[]).find(w=>w.id===t.workstream);
    t.workstream=targetWsId;
    t.updatedBy=ME;t.updatedAt=new Date().toISOString();
    save();render();
    toast('Moved "'+t.title+'" to '+targetWs.name);
  }else if(data.startsWith('ws:')){
    const wsId=data.replace('ws:','');
    const w=(D.workstreams||[]).find(x=>x.id===wsId);
    if(!w||w.id===targetWsId)return;
    if(!w.parentWs)return;
    
    function isDescendant(parentId,childId){
      let current=(D.workstreams||[]).find(x=>x.id===childId);
      while(current&&current.parentWs){
        if(current.parentWs===parentId)return true;
        current=(D.workstreams||[]).find(x=>x.id===current.parentWs);
      }
      return false;
    }
    if(isDescendant(wsId,targetWsId)){
      toast('Cannot move a parent under its own child');
      return;
    }
    
    const oldParent=(D.workstreams||[]).find(p=>p.id===w.parentWs);
    w.parentWs=targetWsId;
    w.level=targetLevel+1;
    w.category=targetWs.category;
    w.updatedBy=ME;w.updatedAt=new Date().toISOString();
    
    function updateChildLevels(parentId,parentLevel){
      (D.workstreams||[]).filter(c=>c.parentWs===parentId).forEach(c=>{
        c.level=parentLevel+1;
        c.category=targetWs.category;
        updateChildLevels(c.id,c.level);
      });
    }
    updateChildLevels(w.id,w.level);
    
    save();render();
    toast('Moved "'+w.name+'" under '+targetWs.name);
  }
}

let wsDragOverId=null,dragGhost=null;
function wsHierarchyDragOver(event,wsId){
  event.preventDefault();
  event.dataTransfer.dropEffect='move';
  if(wsDragOverId!==wsId){
    document.querySelectorAll('.ws-drop-target').forEach(el=>el.classList.remove('ws-drop-target'));
    const row=event.currentTarget;
    row.classList.add('ws-drop-target');
    wsDragOverId=wsId;
  }
}
function wsHierarchyDragLeave(event){
  const row=event.currentTarget;
  if(!row.contains(event.relatedTarget)){
    row.classList.remove('ws-drop-target');
    wsDragOverId=null;
  }
}
function createDragGhost(text){
  if(dragGhost)dragGhost.remove();
  dragGhost=document.createElement('div');
  dragGhost.className='drag-ghost';
  dragGhost.textContent=text;
  document.body.appendChild(dragGhost);
  return dragGhost;
}
function moveDragGhost(e){
  if(dragGhost){dragGhost.style.left=(e.clientX+15)+'px';dragGhost.style.top=(e.clientY+15)+'px'}
}
function removeDragGhost(){
  if(dragGhost){dragGhost.remove();dragGhost=null}
  document.querySelectorAll('.ws-drop-target').forEach(el=>el.classList.remove('ws-drop-target'));
  wsDragOverId=null;
}

// ═══════════════════════════════════════════════════
let workKanbanFilter='all',workKanbanOwner='',workKanbanCategory='';
function rWorkKanban(c){
  const statuses=WS_STATUSES;
  const allWs=(D.workstreams||[]).filter(w=>w.category==='BU'||w.category==='Cross-cutting');
  const allTasks=(D.tasks||[]);
  
  let filteredWs=allWs;
  let filteredTasks=allTasks;
  
  if(workKanbanCategory){
    filteredWs=filteredWs.filter(w=>w.category===workKanbanCategory);
    const wsIds=filteredWs.map(w=>w.id);
    filteredTasks=filteredTasks.filter(t=>wsIds.includes(t.workstream));
  }
  if(workKanbanOwner){
    if(workKanbanOwner==='__unassigned__'){
      filteredWs=filteredWs.filter(w=>!w.primaryOwner&&!w.owner);
      filteredTasks=filteredTasks.filter(t=>!t.owner);
    }else{
      filteredWs=filteredWs.filter(w=>w.primaryOwner===workKanbanOwner||w.secondaryOwner===workKanbanOwner||w.owner===workKanbanOwner);
      filteredTasks=filteredTasks.filter(t=>t.owner===workKanbanOwner);
    }
  }
  if(workKanbanFilter==='workstreams'){filteredTasks=[];}
  else if(workKanbanFilter==='actions'){filteredWs=[];}
  
  const owners=[...new Set([...(D.workstreams||[]).map(w=>w.primaryOwner||w.owner),...(D.tasks||[]).map(t=>t.owner)].filter(Boolean))].sort();
  
  function getWsStatus(w){return normalizeWsStatus(w.status);}
  function getTaskStatus(t){
    const s=normalizeTaskStatus(t.status);
    if(s==='not-started')return 'intake';
    if(s==='open')return 'delivery';
    if(s==='delayed'||s==='blocked-dependency')return 'delivery';
    if(s==='done')return 'closed';
    return 'delivery';
  }
  
  function renderWsCard(w){
    const priorityColors={high:'#ef4444',medium:'#f59e0b',low:'#6b7280'};
    const pDot=w.priority?`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${priorityColors[w.priority]};margin-right:4px"></span>`:'';
    const levelBg=w.level===1?'#6366f1':w.level===2?'#8b5cf6':'#a855f7';
    const taskCount=(D.tasks||[]).filter(t=>t.workstream===w.id).length;
    const openCount=(D.tasks||[]).filter(t=>t.workstream===w.id&&t.status!=='done').length;
    return `<div class="kb-card" style="border-left:3px solid ${w.color||'#6366f1'};cursor:pointer" onclick="openWsDetail('${w.id}')">
      <div style="display:flex;align-items:center;gap:4px;margin-bottom:4px">
        <span style="font-size:9px;color:#fff;background:${levelBg};padding:1px 5px;border-radius:3px">L${w.level||2}</span>
        ${pDot}<span style="font-weight:600;font-size:12px;flex:1">${esc(w.name)}</span>
      </div>

    </div>`;
  }
  
  function renderTaskCard(t){
    const isDone=t.status==='done';
    const isOD=!isDone&&t.due&&t.due<today();
    const ws=(D.workstreams||[]).find(w=>w.id===t.workstream);
    const msIcon=t.isMilestone?'<span style="color:#f59e0b;margin-right:3px">★</span>':'';
    const prIcon=t.isPriority?'<span style="color:#8b5cf6;margin-right:3px">◆</span>':'';
    return `<div class="kb-card${isOD?' kb-overdue':''}" style="border-left:3px solid ${ws?.color||'var(--muted)'};cursor:pointer;background:rgba(0,0,0,.02)" onclick="openTaskModal('${t.id}')">
      <div style="font-size:12px;${isDone?'text-decoration:line-through;color:var(--muted)':''}">${msIcon}${prIcon}${esc(t.title)}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:4px">${esc(t.owner||'Unassigned')}</div>
      ${ws?`<div style="font-size:9px;color:var(--light);margin-top:2px">${esc(ws.name)}</div>`:''}
      ${t.due?`<div style="font-size:10px;color:${isOD?'var(--red)':'var(--light)'};margin-top:2px">${fmtDate(t.due)}</div>`:''}
    </div>`;
  }
  
  function renderColumn(status){
    const wsInCol=filteredWs.filter(w=>getWsStatus(w)===status.value);
    const tasksInCol=filteredTasks.filter(t=>getTaskStatus(t)===status.value);
    const total=wsInCol.length+tasksInCol.length;
    return `<div class="kb-col" data-status="${status.value}">
      <div class="kb-col-hd">
        <span class="kb-col-title">${status.label}</span>
        <span class="kb-col-count">${total}</span>
      </div>
      <div class="kb-col-body">
        ${wsInCol.map(renderWsCard).join('')}
        ${tasksInCol.map(renderTaskCard).join('')}
        ${!total?'<div style="padding:12px;font-size:11px;color:var(--light);text-align:center">No items</div>':''}
      </div>
    </div>`;
  }
  
  c.innerHTML=`
  <div class="page-wrap kb-page">
    <div class="page-toolbar">
      <span class="page-title">Kanban Board</span>
      <div class="pill-filters">
        <div class="pill${workKanbanFilter==='all'?' pill-i':' pill-m'}" onclick="workKanbanFilter='all';render()">All Items</div>
        <div class="pill${workKanbanFilter==='workstreams'?' pill-i':' pill-m'}" onclick="workKanbanFilter='workstreams';render()">Workstreams Only</div>
        <div class="pill${workKanbanFilter==='actions'?' pill-i':' pill-m'}" onclick="workKanbanFilter='actions';render()">Action Items Only</div>
      </div>
      <div class="toolbar-right">
        <select onchange="workKanbanCategory=this.value;render()">
          <option value="">All Categories</option>
          <option value="BU"${workKanbanCategory==='BU'?' selected':''}>Business Unit</option>
          <option value="Cross-cutting"${workKanbanCategory==='Cross-cutting'?' selected':''}>Cross-cutting</option>
        </select>
        <select onchange="workKanbanOwner=this.value;render()">
          <option value="">All Owners</option>
          <option value="__unassigned__"${workKanbanOwner==='__unassigned__'?' selected':''}>Unassigned</option>
          ${owners.map(o=>`<option value="${esc(o)}"${workKanbanOwner===o?' selected':''}>${esc(o)}</option>`).join('')}
        </select>
        <button class="btn btn-p" onclick="openWsEdit()">+ Workstream</button>
        <button class="btn btn-s" onclick="openTaskModal()">+ Action Item</button>

    <div class="kb-board" style="display:flex;gap:12px;overflow-x:auto;padding-bottom:16px">
      ${statuses.map(renderColumn).join('')}

}

let wsLeadFilter='',wsCatFilter='',wsGroupCollapsed={};
function wsStatusValue(w){const s=w.status;if(!s)return'not-started';if(['on-track','at-risk','blocked','pilot-validate','deploy-scale'].includes(s))return'delivery';return s;}
function rWork(c){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const leads=[...new Set((D.workstreams||[]).map(w=>w.owner).filter(Boolean))].sort();

  let allWs=(D.workstreams||[]).filter(w=>w.category==='BU'||w.category==='Cross-cutting');
  if(wsLeadFilter==='__unassigned__')allWs=allWs.filter(w=>!w.owner);
  else if(wsLeadFilter)allWs=allWs.filter(w=>w.owner===wsLeadFilter);
  if(wsCatFilter)allWs=allWs.filter(w=>w.category===wsCatFilter);
  if(q)allWs=allWs.filter(w=>(w.name+' '+w.desc+' '+w.owner+' '+(w.category||'')).toLowerCase().includes(q));

  const statusCounts={};
  WS_STATUSES.forEach(s=>{statusCounts[s.value]=allWs.filter(w=>wsStatusValue(w)===s.value).length;});
  if(wsStatusFilter)allWs=allWs.filter(w=>wsStatusValue(w)===wsStatusFilter);

  function hierarchicalSort(list){
    const parents=list.filter(w=>!w.parentWs).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    const childMap={};
    list.filter(w=>w.parentWs).forEach(w=>{if(!childMap[w.parentWs])childMap[w.parentWs]=[];childMap[w.parentWs].push(w)});
    Object.values(childMap).forEach(arr=>arr.sort((a,b)=>(a.name||'').localeCompare(b.name||'')));
    const out=[];
    parents.forEach(p=>{out.push(p);(childMap[p.id]||[]).forEach(ch=>out.push(ch))});
    list.filter(w=>w.parentWs&&!parents.find(p=>p.id===w.parentWs)).sort((a,b)=>(a.name||'').localeCompare(b.name||'')).forEach(o=>out.push(o));
    return out;
  }
  const buWs=hierarchicalSort(allWs.filter(w=>w.category==='BU'));
  const ccWs=hierarchicalSort(allWs.filter(w=>w.category==='Cross-cutting'));
  const totalBU=(D.workstreams||[]).filter(w=>w.category==='BU').length;
  const totalCC=(D.workstreams||[]).filter(w=>w.category==='Cross-cutting').length;

  const renderRow=(w)=>{
    const isChild=!!w.parentWs;
    const children=(D.workstreams||[]).filter(c=>c.parentWs===w.id);
    const isParent=children.length>0;
    const wsIds=isParent?[w.id,...children.map(c=>c.id)]:[w.id];
    const wAll=(D.tasks||[]).filter(t=>wsIds.includes(t.workstream));
    const wDone=wAll.filter(t=>t.status==='done').length;
    const wOpen=wAll.filter(t=>t.status!=='done').length;
    const pct=wAll.length?Math.round(wDone/wAll.length*100):0;
    const sc=statusColors[w.status]||'pill-m';
    const risks=(D.risks||[]).filter(r=>wsIds.includes(r.workstream)).length;
    const hasOverdue=wAll.some(t=>t.status!=='done'&&t.due&&t.due<today());
    const needsAttention=w.status==='at-risk'||w.status==='blocked'||hasOverdue;
    const attDot=needsAttention?'<span title="Needs attention'+(hasOverdue?' — has overdue items':'')+(w.status==='at-risk'?' — at risk':'')+(w.status==='blocked'?' — blocked':'')+'" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--red);margin-right:6px;vertical-align:middle;flex-shrink:0;box-shadow:0 0 0 2px rgba(239,68,68,.25)"></span>':'';
    const priorityColors={high:'#ef4444',medium:'#f59e0b',low:'#6b7280'};
    const priorityBadge=w.priority?`<span title="Priority: ${w.priority}" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${priorityColors[w.priority]||'#6b7280'};margin-right:4px;vertical-align:middle"></span>`:'';
    const levelBadge=w.level===3?'<span style="font-size:9px;color:var(--muted);margin-left:4px">L3</span>':'';
    const nameHtml=isChild
      ?`${attDot}${priorityBadge}<span style="color:var(--muted);margin-right:4px">└</span><span style="font-weight:500;font-size:12.5px;color:var(--text)">${esc(w.name)}</span>${levelBadge}`
      :`${attDot}${priorityBadge}<span style="font-weight:600;font-size:13.5px">${esc(w.name)}</span>${levelBadge}${isParent?'<span style="font-size:9px;font-weight:700;color:var(--accent);background:rgba(99,102,241,.1);padding:1px 6px;border-radius:8px;margin-left:6px;vertical-align:middle">'+children.length+' sub</span>':''}`;
    const ownerDisplay=w.primaryOwner?(w.secondaryOwner?`${esc(w.primaryOwner)} / ${esc(w.secondaryOwner)}`:esc(w.primaryOwner)):(esc(w.owner)||'<span style="color:var(--light)">Unassigned</span>');
    const targetDisplay=w.targetDate?`<span style="font-size:11px;color:${w.targetDate<today()?'var(--red)':'var(--muted)'}">${fmtDate(w.targetDate)}</span>`:'—';
    return `<tr onclick="openWsDetail('${w.id}')" style="cursor:pointer;height:44px${isChild?';background:rgba(99,102,241,.03)':''}" onmouseenter="this.style.background='var(--bg-subtle)'" onmouseleave="this.style.background='${isChild?'rgba(99,102,241,.03)':''}'">
      <td style="width:6px;padding:0"><div style="width:5px;height:28px;border-radius:3px;background:${wsColor(w.id)}"></div></td>
      <td style="${isChild?'padding-left:24px':''}">${nameHtml}</td>
      <td style="font-size:12.5px;color:var(--muted)">${ownerDisplay}</td>
      <td style="font-size:12px;color:var(--muted)">${targetDisplay}</td>
      <td style="width:10%"><span class="pill ${sc}" style="font-size:10px">${wsStatusLabel(w.status)}</span></td>
      <td style="width:10%;font-size:12px;color:var(--muted)">${wOpen} open / ${wAll.length} total</td>
      <td style="width:10%;font-size:12px;${risks?'color:var(--red);font-weight:600':'color:var(--muted)'}">${risks?risks+' risk'+(risks>1?'s':''):'—'}</td>
      <td style="width:120px">
        <div style="display:flex;align-items:center;gap:6px">
          <div style="flex:1;height:6px;border-radius:3px;background:var(--border-lt);overflow:hidden">
            <div style="height:100%;border-radius:3px;background:${wsColor(w.id)};width:${pct}%"></div>
          </div>
          <span style="font-size:11px;font-weight:600;color:var(--muted);width:30px;text-align:right">${pct}%</span>
        </div>
      </td>
    </tr>`;
  };

  const renderGroup=(items,label,gid,count)=>{
    if(!items.length&&!wsLeadFilter&&!q&&!wsStatusFilter)return'';
    const collapsed=wsGroupCollapsed[gid];
    const barColor=gid==='_bu'?'#2563eb':'#475569';
    return `<div class="page-section${collapsed?' collapsed':''}" data-gid="${gid}">
      <div class="section-header" onclick="wsGroupCollapsed['${gid}']=!wsGroupCollapsed['${gid}'];render()">
        <span class="section-chevron" style="transform:rotate(${collapsed?'0':'90'}deg)">&#9654;</span>
        <div class="section-bar" style="background:${barColor}"></div>
        <span class="section-label">${label}</span>
        <span class="section-meta">${items.length} workstream${items.length!==1?'s':''}</span>
      </div>
      ${collapsed?'':`<div class="section-body">${items.length?`<div class="card-inner"><table class="tbl" style="width:100%">
        <thead><tr>
          <th style="width:6px;padding:0"></th>
          <th>Workstream</th>
          <th style="width:14%">Lead</th>
          <th style="width:14%">Stakeholders</th>
          <th style="width:9%">Status</th>
          <th style="width:10%">Items</th>
          <th style="width:10%">Risks</th>
          <th style="width:120px">Progress</th>
        </tr></thead>
        <tbody>${items.map(renderRow).join('')}</tbody>
      </table></div>`:'<div class="card-inner" style="padding:20px 24px;font-size:13px;color:var(--muted)">No workstreams match the current filters</div>'}</div>`}
    </div>`;
  };

  const pipelineStages=WS_STATUSES.map((s,i)=>({...s,count:statusCounts[s.value]||0}));
  c.innerHTML=`
  <div class="page-wrap ws-page">
  <div class="ws-pipeline">
    <button type="button" class="ws-pipeline-stage ws-pipeline-stage-all${!wsStatusFilter?' on':''}" onclick="wsStatusFilter='';render()">
      <span class="ws-pipeline-label">All</span>
      <span class="ws-pipeline-count">${pipelineStages.reduce((a,x)=>a+x.count,0)}</span>
    </button>
    ${pipelineStages.map((s,i)=>`<span class="ws-pipeline-arrow" aria-hidden="true">→</span><button type="button" class="ws-pipeline-stage ws-pipeline-stage-${s.value}${wsStatusFilter===s.value?' on':''}" onclick="wsStatusFilter='${s.value}';render()">
      <span class="ws-pipeline-label">${s.label}</span>
      <span class="ws-pipeline-count">${s.count}</span>
    </button>`).join('')}
  </div>
  <div class="page-toolbar ws-page-toolbar">
    <span class="page-title">Workstreams</span>
    <span style="font-size:13px;color:var(--muted)">${allWs.length} total${wsStatusFilter?' in '+wsStatusLabel(wsStatusFilter):''}</span>
    <div class="toolbar-right">
      <select onchange="wsCatFilter=this.value;render()">
        <option value="">All Categories</option>
        <option value="BU"${wsCatFilter==='BU'?' selected':''}>Business Unit (${totalBU})</option>
        <option value="Cross-cutting"${wsCatFilter==='Cross-cutting'?' selected':''}>Crosscutting (${totalCC})</option>
      </select>
      <select onchange="wsLeadFilter=this.value;render()">
        <option value="">All Leads</option>
        <option value="__unassigned__"${wsLeadFilter==='__unassigned__'?' selected':''}>Unassigned</option>
        ${leads.map(l=>`<option value="${esc(l)}"${wsLeadFilter===l?' selected':''}>${esc(l)}</option>`).join('')}
      </select>
      <button class="tb-btn" onclick="aiPopulateAllWorkstreamBusinessOutcomes()" title="Uses AI to overwrite each workstream's Business outcome / impact field">AI Populate Outcomes</button>
      <button class="tb-btn" style="background:var(--accent);color:#fff" onclick="openWsEdit()">+ Add Workstream</button>
    </div>
  </div>
  ${renderGroup(buWs,'Business Unit Workstreams','_bu',totalBU)}
  ${renderGroup(ccWs,'Crosscutting Workstreams','_cc',totalCC)}
  </div>`;
}

function addWsLink(){

function wsTimelineRange(wsId){
  const w=(D.workstreams||[]).find(x=>x.id===wsId);
  if(!w)return null;
  const childIds=(D.workstreams||[]).filter(c=>c.parentWs===wsId).map(c=>c.id);
  const wsIds=[wsId,...childIds];
  const tasks=(D.tasks||[]).filter(t=>wsIds.includes(t.workstream));
  const allDates=[];
  tasks.forEach(t=>{if(t.startDate)allDates.push(t.startDate);if(t.due)allDates.push(t.due)});
  const derivedStart=allDates.length?allDates.sort()[0]:null;
  const derivedEnd=allDates.length?allDates.sort()[allDates.length-1]:null;
  const effectiveStart=w.targetStart||derivedStart||null;
  const effectiveEnd=w.targetEnd||derivedEnd||null;
  return{effectiveStart,effectiveEnd,derivedStart,derivedEnd,isManual:!!(w.targetStart||w.targetEnd)};
}
function wsTimeline(wsId){
  const w=(D.workstreams||[]).find(x=>x.id===wsId);
  if(!w)return '';
  const tasks=(D.tasks||[]).filter(t=>t.workstream===wsId);
  const dated=tasks.filter(t=>t.due||t.startDate).sort((a,b)=>(a.due||a.startDate||'9').localeCompare(b.due||b.startDate||'9'));
  const hasManualRange=w.targetStart||w.targetEnd;
  const range=wsTimelineRange(wsId);
  const hasEffectiveRange=range&&(range.effectiveStart||range.effectiveEnd);
  let html='<div style="margin-top:10px">';
  if(!hasEffectiveRange&&!dated.length){
    html+='<div style="padding:12px 14px;border:1px dashed var(--border);border-radius:var(--r-sm);color:var(--muted);font-size:12px">No timeline data yet. Add action items with due dates to auto-build a timeline.</div>';
  }
  if(hasEffectiveRange){
    const rangeLabel=(range.effectiveStart?fmtDate(range.effectiveStart):'?')+' — '+(range.effectiveEnd?fmtDate(range.effectiveEnd):'?');
    const now=today();
    let rangeStatus='';
    if(range.effectiveEnd&&range.effectiveEnd<now&&w.status!=='complete')rangeStatus='<span style="color:var(--red);font-weight:600;font-size:11px;margin-left:8px">Past target end</span>';
    else if(range.effectiveStart&&range.effectiveStart>now)rangeStatus='<span style="color:var(--muted);font-size:11px;margin-left:8px">Not started yet</span>';
    const sourceLabel=hasManualRange?'':'<span style="font-size:10px;color:var(--light);margin-left:8px">(from action items)</span>';
    html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:8px 12px;background:var(--bg-subtle);border:1px solid var(--border-lt);border-radius:var(--r-sm)">';
    html+='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;flex-shrink:0;color:var(--muted)"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>';
    html+='<span style="font-size:13px;font-weight:600">'+rangeLabel+'</span>'+rangeStatus+sourceLabel;
    html+='</div>';
  }
  if(hasEffectiveRange&&(range.effectiveStart||range.effectiveEnd)){
    const tS=range.effectiveStart?new Date(range.effectiveStart+'T00:00:00'):null;
    const tE=range.effectiveEnd?new Date(range.effectiveEnd+'T00:00:00'):null;
    const rangeStart=tS||(tE?new Date(tE.getTime()-30*864e5):new Date());
    const rangeEnd=tE||(tS?new Date(tS.getTime()+90*864e5):new Date(Date.now()+90*864e5));
    const pad=Math.max(7*864e5,(rangeEnd-rangeStart)*0.05);
    const visStart=new Date(rangeStart.getTime()-pad);
    const visEnd=new Date(rangeEnd.getTime()+pad);
    const totalMs=Math.max(1,visEnd-visStart);
    const pct=d=>{const dt=new Date(d+'T00:00:00');return Math.max(0,Math.min(100,(dt-visStart)/totalMs*100))};
    const nowPct=pct(today());
    const wc=w.color||'var(--accent)';
    const barL=pct(range.effectiveStart||(tE?tE.toISOString().slice(0,10):today()));
    const barR=pct(range.effectiveEnd||(tS?tS.toISOString().slice(0,10):today()));
    let barHtml='<div style="position:relative;height:28px;background:var(--border-lt);border-radius:6px;overflow:hidden;margin-bottom:8px">';
    barHtml+='<div style="position:absolute;left:'+barL+'%;top:0;height:100%;width:'+(barR-barL)+'%;background:'+wc+';opacity:.18;border-radius:6px"></div>';
    if(nowPct>=0&&nowPct<=100)barHtml+='<div style="position:absolute;left:'+nowPct+'%;top:0;bottom:0;width:2px;background:var(--red);z-index:2" title="Today"></div>';
    const milestones=dated.filter(t=>t.isMilestone&&t.due);
    milestones.forEach(m=>{
      const x=pct(m.due);
      const isDone=m.status==='done';const isOD=m.status!=='done'&&m.due&&m.due<today();
      const mc=isDone?'var(--green)':isOD?'var(--red)':wc;
      barHtml+='<div style="position:absolute;left:'+x+'%;top:50%;transform:translate(-8px,-50%);z-index:3;cursor:pointer" title="'+esc(m.title)+' — '+fmtDate(m.due)+'" onclick="closeModal();setTimeout(()=>openTaskModal(\''+m.id+'\'),150)"><div style="width:14px;height:14px;border-radius:50%;background:'+mc+';border:2px solid var(--bg-card);display:flex;align-items:center;justify-content:center"><span style="font-size:7px;color:#fff;font-weight:700">'+(isDone?'&#10003;':isOD?'!':'&#9670;')+'</span></div></div>';
    });
    barHtml+='</div>';
    html+=barHtml;
  }
  if(dated.length){
    html+='<div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px">Key dates ('+dated.length+')</div>';
    html+=dated.slice(0,15).map(t=>{
      const isDone=t.status==='done';const isOD=t.status!=='done'&&t.due&&t.due<today();
      const icon=t.isMilestone?'<span style="color:#f59e0b;margin-right:2px">&#9733;</span>':'';
      const pillCls=isDone?'pill-g':isOD?'pill-r':taskStatusPill(t.status);
      const dateStr=t.due?fmtDate(t.due):(t.startDate?fmtDate(t.startDate):'');
      return '<div style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;border-bottom:1px solid var(--border-lt);cursor:pointer" onclick="closeModal();setTimeout(()=>openTaskModal(\''+t.id+'\'),150)" onmouseover="this.style.background=\'var(--border-lt)\'" onmouseout="this.style.background=\'\'">'+icon+'<span style="min-width:60px;flex-shrink:0;color:var(--light);font-size:11px">'+dateStr+'</span><span class="pill '+pillCls+'" style="min-width:40px;text-align:center;font-size:10px">'+(isDone?'done':isOD?'overdue':taskStatusLabel(t.status))+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(t.title)+'</span></div>';
    }).join('');
    if(dated.length>15)html+='<div style="font-size:11px;color:var(--muted);padding:4px 0">... and '+(dated.length-15)+' more</div>';
  }
  html+='</div>';
  return html;
}

function rTasks(c){
  if(taskFilter==='inbox'){rTasksInbox(c);return}
  if(taskViewMode==='kanban'){rKanban(c);return}
  const q=(document.getElementById('search').value||'').toLowerCase();
  let items=D.tasks||[];
  
  if(taskStatusFilter==='open')items=items.filter(t=>t.status!=='done');
  else if(taskStatusFilter==='done')items=items.filter(t=>t.status==='done');
  
  if(taskFilter==='milestones')items=items.filter(t=>t.isMilestone);
  else if(taskFilter==='priorities')items=items.filter(t=>t.isPriority);
  else if(taskFilter==='overdue')items=items.filter(t=>t.status!=='done'&&t.due&&t.due<today());
  else if(taskFilter==='thisweek'){
    const todayD=new Date(today()+'T00:00:00');
    const dayOfWeek=todayD.getDay();
    const saturday=new Date(todayD);
    saturday.setDate(todayD.getDate()+(6-dayOfWeek));
    const saturdayStr=saturday.toISOString().slice(0,10);
    items=items.filter(t=>t.status!=='done'&&t.due&&t.due>=today()&&t.due<=saturdayStr);
  }
  
  if(taskOwnerFilter==='__unassigned__')items=items.filter(t=>!t.owner);
  else if(taskOwnerFilter)items=items.filter(t=>t.owner===taskOwnerFilter);
  if(q)items=items.filter(t=>(t.title+' '+t.owner+' '+t.notes+' '+(t.blockedBy||'')+' '+wsNamePlain(t.workstream)).toLowerCase().includes(q));
  const pv={high:0,medium:1,low:2};
  if(taskSort==='title')items.sort((a,b)=>taskSortDir*a.title.localeCompare(b.title));
  else if(taskSort==='owner')items.sort((a,b)=>taskSortDir*(a.owner||'').localeCompare(b.owner||''));
  else if(taskSort==='start')items.sort((a,b)=>taskSortDir*(a.startDate||'9').localeCompare(b.startDate||'9'));
  else if(taskSort==='due')items.sort((a,b)=>taskSortDir*(a.due||'9').localeCompare(b.due||'9'));
  else if(taskSort==='priority')items.sort((a,b)=>taskSortDir*((pv[a.priority]??1)-(pv[b.priority]??1)));
  else if(taskSort==='workstream')items.sort((a,b)=>taskSortDir*wsNamePlain(a.workstream).localeCompare(wsNamePlain(b.workstream)));
  else{const so={'not-started':0,'open':1,'delayed':2,'blocked-dependency':3,'done':4,'blocked':3};items.sort((a,b)=>{if(normalizeTaskStatus(a.status)!==normalizeTaskStatus(b.status))return(so[normalizeTaskStatus(a.status)]??1)-(so[normalizeTaskStatus(b.status)]??1);if((pv[a.priority]??1)!==(pv[b.priority]??1))return(pv[a.priority]??1)-(pv[b.priority]??1);return(a.due||'9').localeCompare(b.due||'9')})}
  const open=D.tasks.filter(t=>t.status!=='done').length,done=D.tasks.filter(t=>t.status==='done').length,msCount=D.tasks.filter(t=>t.isMilestone).length;
  const priorityCount=D.tasks.filter(t=>t.isPriority).length;
  const overdueCount=D.tasks.filter(t=>t.status!=='done'&&t.due&&t.due<today()).length;
  const thisWeekCount=(()=>{
    const todayD=new Date(today()+'T00:00:00');
    const dayOfWeek=todayD.getDay();
    const saturday=new Date(todayD);
    saturday.setDate(todayD.getDate()+(6-dayOfWeek));
    const saturdayStr=saturday.toISOString().slice(0,10);
    return D.tasks.filter(t=>t.status!=='done'&&t.due&&t.due>=today()&&t.due<=saturdayStr).length;
  })();
  const inboxCount=(D.inbox||[]).filter(x=>!x.processed).length;
  const owners=[...new Set((D.tasks||[]).map(t=>t.owner).filter(Boolean))].sort();
  const sIco=(col)=>taskSort===col?(taskSortDir===1?' &#9650;':' &#9660;'):'';
  c.innerHTML=`
  <div class="page-wrap tasks-page">
  <div class="page-toolbar">
    <span class="page-title">Action Items</span>
    <div class="pill-filters">
      <div class="pill${taskFilter==='all'?' pill-i':' pill-m'}" onclick="taskStatusFilter='open';taskFilter='all';render()">Open (${open})</div>
      <div class="pill${taskFilter==='overdue'?' pill-r':' pill-m'}" onclick="taskStatusFilter='open';taskFilter='overdue';render()" style="${overdueCount?'':'opacity:.6'}">&#9888; Overdue (${overdueCount})</div>
      <div class="pill${taskFilter==='thisweek'?' pill-i':' pill-m'}" onclick="taskStatusFilter='open';taskFilter='thisweek';render()" style="${thisWeekCount?'':'opacity:.6'}">&#128197; This Week (${thisWeekCount})</div>
      <div class="pill${taskFilter==='milestones'?' pill-i':' pill-m'}" onclick="taskStatusFilter='open';taskFilter='milestones';render()">&#9733; Milestones (${msCount})</div>
      <div class="pill${taskFilter==='priorities'?' pill-i':' pill-m'}" onclick="taskStatusFilter='open';taskFilter='priorities';render()">&#9670; Priorities (${priorityCount})</div>
      <div class="pill${taskFilter==='inbox'?' pill-i':' pill-m'}" onclick="taskStatusFilter='open';taskFilter='inbox';render()" style="margin-left:6px">Inbox${inboxCount?' <span class="badge warn" style="margin-left:4px;font-size:10px">'+inboxCount+'</span>':''}</div>
      <div class="pill${taskStatusFilter==='done'?' pill-i':' pill-m'}" onclick="taskStatusFilter='done';taskFilter='all';render()" style="margin-left:auto">Done (${done})</div>
    </div>
    <div class="pill-actions">
      <select onchange="taskOwnerFilter=this.value;render()">
        <option value="">All Owners</option>
        <option value="__unassigned__"${taskOwnerFilter==='__unassigned__'?' selected':''}>Unassigned</option>
        ${owners.map(o=>`<option value="${esc(o)}"${taskOwnerFilter===o?' selected':''}>${esc(o)}</option>`).join('')}
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:2px;margin-left:auto;padding-left:14px;border-left:1px solid var(--border-lt)">
      ${taskViewMode==='list'?'<button type="button" title="Expand all" onclick="expandAllTaskGroups()" style="padding:5px 10px;border:1px solid var(--border);border-radius:var(--r-xs);background:var(--bg-subtle);color:var(--muted);cursor:pointer;font-size:11px;font-weight:600">Expand All</button><button type="button" title="Collapse all" onclick="collapseAllTaskGroups()" style="padding:5px 10px;border:1px solid var(--border);border-radius:var(--r-xs);background:var(--bg-subtle);color:var(--muted);cursor:pointer;font-size:11px;font-weight:600;margin-right:10px">Collapse All</button>':''}
      <button type="button" title="List view" onclick="taskViewMode='list';render()" style="padding:5px 8px;border:1px solid ${taskViewMode==='list'?'var(--accent)':'var(--border)'};border-radius:var(--r-xs) 0 0 var(--r-xs);background:${taskViewMode==='list'?'var(--accent)':'var(--bg-subtle)'};color:${taskViewMode==='list'?'#fff':'var(--muted)'};cursor:pointer;display:flex;align-items:center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </button>
      <button type="button" title="Kanban view" onclick="taskViewMode='kanban';render()" style="padding:5px 8px;border:1px solid ${taskViewMode==='kanban'?'var(--accent)':'var(--border)'};border-radius:0 var(--r-xs) var(--r-xs) 0;background:${taskViewMode==='kanban'?'var(--accent)':'var(--bg-subtle)'};color:${taskViewMode==='kanban'?'#fff':'var(--muted)'};cursor:pointer;display:flex;align-items:center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="5" height="15" rx="1"/></svg>
      </button>
    </div>
  </div>
  ${(()=>{
    if(!items.length)return '<div class="empty"><h4>No action items match</h4><p>Try a different filter or <button class="mbtn mb-save" style="display:inline-flex;margin-left:4px" onclick="openTaskModal()">Add an action item</button></p></div></div>';
    const wsGroups={};const unlinked=[];
    items.forEach(t=>{
      if(t.workstream){if(!wsGroups[t.workstream])wsGroups[t.workstream]=[];wsGroups[t.workstream].push(t)}
      else unlinked.push(t);
    });
    const wsOrder=(D.workstreams||[]).filter(w=>wsGroups[w.id]).sort((a,b)=>(a.name||'').localeCompare(b.name||'')).map(w=>w.id);
    const renderRow=(t)=>{
      const isOD=t.status!=='done'&&t.due&&t.due<today();
      const isDueToday=t.status!=='done'&&t.due&&t.due===today();
      const rowBg=isOD&&!isDueToday?'background:var(--red-lt)':isDueToday?'background:var(--amber-lt)':'';
      const pp={high:'pill-r',medium:'pill-a',low:'pill-g'}[t.priority]||'pill-m';
      return `<tr onclick="openTaskModal('${t.id}')" style="height:36px;cursor:pointer;${rowBg}">
        <td style="width:28px" onclick="event.stopPropagation()"><div class="task-chk${t.status==='done'?' done':''}" onclick="toggleTask('${t.id}')">&#10003;</div></td>
        <td style="overflow:hidden;text-overflow:ellipsis;${t.status==='done'?'text-decoration:line-through;color:var(--muted)':''}">${t.isMilestone?'<span style="color:#f59e0b;margin-right:3px">&#9733;</span>':''}${t.isPriority?'<span style="color:#8b5cf6;margin-right:3px">&#9670;</span>':''}${esc(t.title)}${(t.comments||[]).length?'<span style="margin-left:6px;font-size:10px;color:var(--light)" title="'+t.comments.length+' comment'+(t.comments.length!==1?'s':'')+'">&#128172; '+t.comments.length+'</span>':''}</td>
        <td style="font-size:12px;color:var(--muted);width:14%">${esc(t.owner)||'—'}</td>
        <td style="font-size:11.5px;width:8%;color:var(--muted)">${t.startDate?fmtDate(t.startDate):'—'}</td>
        <td style="font-size:11.5px;width:8%;${isOD?'color:var(--red);font-weight:600':''}">${t.due?fmtDate(t.due):'—'}</td>
        <td style="width:7%"><span class="pill ${pp}" style="font-size:10px">${t.priority}</span></td>
        <td style="width:6%;font-size:10px;color:var(--light)" title="${t.updatedAt||''}">${timeAgo(t.updatedAt)}</td>
        <td style="width:28px" onclick="event.stopPropagation()"><button style="color:var(--red);font-size:11px;background:none;border:none;cursor:pointer" onclick="delTask('${t.id}')">&#10005;</button></td>
      </tr>`;
    };
    const renderGroup=(label,color,groupItems,gid)=>{
      const openCount=groupItems.filter(t=>t.status!=='done').length;
      const collapsed=taskGroupCollapsed[gid];
      return `<div class="page-section${collapsed?' collapsed':''}" data-gid="${gid}">
        <div class="section-header" style="background:${color};border-color:${color}" onclick="taskGroupCollapsed['${gid}']=!taskGroupCollapsed['${gid}'];render()">
          <span class="section-chevron" style="transform:rotate(${collapsed?'0':'90'}deg);color:#fff">&#9654;</span>
          <span class="section-label" style="color:#fff">${label}</span>
          <span class="section-meta" style="color:rgba(255,255,255,.8)">${openCount} open / ${groupItems.length} total</span>
        </div>
        ${collapsed?'':`<div class="section-body"><div class="card-inner"><table class="tbl" style="width:100%">
          <thead><tr>
            <th style="width:28px"></th>
            <th style="cursor:pointer" onclick="event.stopPropagation();sortTasks('title')">Action Item${sIco('title')}</th>
            <th style="cursor:pointer;width:14%" onclick="event.stopPropagation();sortTasks('owner')">Owner${sIco('owner')}</th>
            <th style="cursor:pointer;width:8%" onclick="event.stopPropagation();sortTasks('start')">Start${sIco('start')}</th>
            <th style="cursor:pointer;width:8%" onclick="event.stopPropagation();sortTasks('due')">Target${sIco('due')}</th>

            <th style="width:6%;font-size:10px">Updated</th>
            <th style="width:28px"></th>
          </tr></thead>
          <tbody>${groupItems.map(renderRow).join('')}</tbody>
        </table></div></div>`}
      </div>`;
    };
    let html='';
    wsOrder.forEach(wsId=>{
      const w=(D.workstreams||[]).find(x=>x.id===wsId);
      if(w)html+=renderGroup(w.name,wsColor(wsId),wsGroups[wsId],wsId);
    });
    if(unlinked.length)html+=renderGroup('Unassigned to Workstream','var(--muted)',unlinked,'_unlinked');
    return html+'</div>';
  })()}`;
}

function saveTask(id){
  const title=document.getElementById('t-title').value.trim();
  if(!title){toast('Title is required');return}
  let t=id?D.tasks.find(x=>x.id===id):null;
  const isNew=!t;
  if(!t){t={id:uid(),created:today(),source:'',addedBy:ME,priority:'medium',startDate:''};if(!D.tasks)D.tasks=[];D.tasks.push(t)}
  t.title=title;t.owner=document.getElementById('t-owner').value.trim();
  t.startDate=document.getElementById('t-start').value;
  t.due=document.getElementById('t-due').value;
  t.status=document.getElementById('t-status').value;
  t.blockedBy=document.getElementById('t-blocked-by').value.trim();
  t.isPriority=document.getElementById('t-priority-flag').checked;
  t.workstream=document.getElementById('t-ws').value;
  t.notes=document.getElementById('t-notes').value;
  t.updatedBy=ME;t.updatedAt=new Date().toISOString();
  save();log((isNew?'Added':'Updated')+' action item: '+esc(title));
  closeModal();render();toast(isNew?'Action item added':'Action item updated');
}
function addTaskComment(id){
  const el=document.getElementById('t-new-comment');
  const text=(el?.value||'').trim();
  if(!text){toast('Type a comment first');return}
  const t=D.tasks.find(x=>x.id===id);if(!t)return;
  if(!t.comments)t.comments=[];
  t.comments.push({id:uid(),author:ME||'Anonymous',text,ts:new Date().toISOString()});
  t.updatedBy=ME;t.updatedAt=new Date().toISOString();

function updateConvertParentOpts(){
  const level=document.getElementById('cvt-level').value;
  const parentSel=document.getElementById('cvt-parent');
  const allWs=(D.workstreams||[]).filter(w=>w.category==='BU'||w.category==='Cross-cutting');
  const l1Ws=allWs.filter(w=>!w.parentWs).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  const l2Ws=allWs.filter(w=>w.level===2).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
  
  let opts='<option value="">— Select Parent —</option>';
  if(level==='2'){
    opts+=l1Ws.map(w=>`<option value="${w.id}">${esc(w.name)} (L1)</option>`).join('');
  }else{
    opts+=l2Ws.map(w=>{
      const p=l1Ws.find(x=>x.id===w.parentWs);
      return `<option value="${w.id}">${p?esc(p.name)+' → ':''}${esc(w.name)}</option>`;
    }).join('');
    opts+=l1Ws.map(w=>`<option value="${w.id}">${esc(w.name)} (L1 - will create as L2)</option>`).join('');
  }
  parentSel.innerHTML=opts;
}

function doConvertToWorkstream(taskId){
  const t=D.tasks.find(x=>x.id===taskId);
  if(!t){toast('Action item not found');return}
  
  const name=document.getElementById('cvt-name').value.trim();
  if(!name){toast('Workstream name is required');return}
  
  const level=parseInt(document.getElementById('cvt-level').value);
  const parentId=document.getElementById('cvt-parent').value;
  if(!parentId){toast('Please select a parent workstream');return}
  
  const parentWs=(D.workstreams||[]).find(w=>w.id===parentId);
  if(!parentWs){toast('Parent workstream not found');return}
  
  const parentLevel=parentWs.level||1;
  const actualLevel=level===2&&parentLevel===1?2:level===3?3:2;
  
  const newWs={
    id:uid(),
    name:name,
    level:actualLevel,
    parentWs:parentId,
    category:parentWs.category||'BU',
    color:parentWs.color||'#6366f1',
    primaryOwner:document.getElementById('cvt-owner').value.trim(),
    targetStart:document.getElementById('cvt-start').value,
    targetEnd:document.getElementById('cvt-end').value,
    desc:document.getElementById('cvt-desc').value,
    status:'delivery',
    isPriority:t.isPriority||false,
    notes:t.notes||'',
    updatedBy:ME,
    updatedAt:new Date().toISOString()
  };
  
  if(!D.workstreams)D.workstreams=[];
  D.workstreams.push(newWs);
  
  const deleteOriginal=document.getElementById('cvt-delete').checked;
  if(deleteOriginal){
    const idx=D.tasks.findIndex(x=>x.id===taskId);
    if(idx>=0)D.tasks.splice(idx,1);
  }
  
  save();
  log('Converted action item to workstream: '+esc(name));
  closeModal();
  render();
  toast('Converted to workstream'+(deleteOriginal?' (action item deleted)':''));
}
function toggleTask(id){
  const t=D.tasks.find(x=>x.id===id);if(!t)return;
  const cycle=['not-started','open','delayed','blocked-dependency','done'];
  const ci=cycle.indexOf(normalizeTaskStatus(t.status));
  t.status=ci>=0&&ci<cycle.length-1?cycle[ci+1]:'done';
  t.updatedBy=ME;t.updatedAt=new Date().toISOString();
  save();render();
}

function parseMtgAIs(text){
  return text.split('\n').map(l=>l.trim()).filter(Boolean).map(l=>{
    const ownerMatch=l.match(/@(\S+(?:\s\S+)?)/);
    const owner=ownerMatch?ownerMatch[1]:'';
    const cleaned=l.replace(/@\S+(?:\s\S+)?/,'').replace(/^[-•*]\s*/,'').trim();
    return{id:uid(),text:cleaned,owner,done:false};
  });
}

function saveMtg(id){
  const title=document.getElementById('mg-title').value.trim();
  if(!title){toast('Title is required');return}
  let m=id?D.meetings.find(x=>x.id===id):null;
  const existingAIs=m?m.actionItems:[];const isNew=!m;
  if(!m){m={id:uid(),addedBy:ME};D.meetings.push(m)}
  m.title=title;m.date=document.getElementById('mg-date').value;
  m.attendees=document.getElementById('mg-att').value.trim();
  m.summary=document.getElementById('mg-summary').value;
  m.recording=document.getElementById('mg-rec').value.trim();
  const newAIs=parseMtgAIs(document.getElementById('mg-ais').value);
  newAIs.forEach(na=>{const ex=existingAIs.find(e=>e.text===na.text);if(ex){na.done=ex.done;na.id=ex.id}});
  m.actionItems=newAIs;
  m.updatedBy=ME;m.updatedAt=new Date().toISOString();
  save();log((isNew?'Added':'Updated')+' meeting: '+esc(title));
  closeModal();render();toast(isNew?'Meeting added':'Meeting updated');
}

function rKanban(c){

function kbDrop(event,newStatus){
  event.preventDefault();
  const id=event.dataTransfer.getData('text/plain');
  if(!id)return;
  const t=(D.tasks||[]).find(x=>x.id===id);
  if(!t||normalizeTaskStatus(t.status)===newStatus)return;
  t.status=newStatus;
  if(newStatus==='done'&&taskStatusFilter==='open')taskStatusFilter='';
  t.updatedBy=ME;t.updatedAt=new Date().toISOString();
  save();render();
  toast('Moved to '+taskStatusLabel(newStatus));
}
function advanceTaskStatus(id){
  const t=(D.tasks||[]).find(x=>x.id===id);
  if(!t)return;
  const flow=['not-started','open','delayed','blocked-dependency','done'];
  const current=normalizeTaskStatus(t.status);
  const idx=flow.indexOf(current);
  if(idx<0||idx>=flow.length-1)return;
  const nextStatus=flow[idx+1];
  t.status=nextStatus;
  if(nextStatus==='done'&&taskStatusFilter==='open')taskStatusFilter='';
  t.updatedBy=ME;t.updatedAt=new Date().toISOString();
  save();render();
  toast('Moved to '+taskStatusLabel(nextStatus));
}
