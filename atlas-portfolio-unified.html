  function renderHierarchy() {
    pruneOutlineBulkKeys();
    document.getElementById("pageTitle").textContent = "Portfolio outline";
    const initList = initiativesForTree();
    const initSet = new Set(initList.map((i) => i.id));

    function dragCell(kind) {
      const draggableKinds = new Set(["task", "milestone", "project", "initiative"]);
      if (!canManageInitiatives() || !draggableKinds.has(kind)) {
        return '<td class="tree-drag-cell" aria-hidden="true"></td>';
      }
      return `<td class="tree-drag-cell" title="Drag onto a valid parent row to move"><span class="tree-drag-handle" draggable="true" aria-label="Drag to reparent">⋮⋮</span></td>`;
    }

    function twistMarkup(key, hasKids, expanded) {
      if (!hasKids) return '<span class="tree-twist-spacer" aria-hidden="true"></span>';
      return `<button type="button" class="tree-twist" aria-expanded="${expanded}" data-tree-toggle="${esc(key)}" aria-label="${
        expanded ? "Collapse" : "Expand"
      }"><svg class="tree-chevron" viewBox="0 0 16 16" width="14" height="14" aria-hidden="true"><path d="M5 6l3 3 3-3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>`;
    }

    function selClass(kind, id) {
      const key = outlineBulkKey(kind, id);
      if ((kind === "task" || kind === "milestone") && outlineBulkKeys.has(key)) return " tree-sel";
      if (
        outlineBulkKeys.size === 0 &&
        treeSelection &&
        treeSelection.kind === kind &&
        treeSelection.id === id
      ) {
        return " tree-sel";
      }
      return "";
    }

    function milestoneAndTaskRows(depthMilestone, depthTask, p) {
      let frag = "";
      const ms = milestonesUnderProject(p.id).filter(outlineMilestoneVisible);
      ms.forEach((m) => {
        const tasks = state.tasks.filter((t) => t.milestoneId === m.id && outlineTaskVisible(t));
        const mKey = treeKey("milestone", m.id);
        const mExp = isNodeExpanded(mKey);
        const hasMkids = tasks.length > 0;
        const planned = m.plannedDate ? fmtDateShort(m.plannedDate) : "—";
        const stM = outlineStatusCell(milestoneDeliveryStatus(m), "milestone");

        frag += `<tr class="tree-row tree-row-summary${selClass("milestone", m.id)}" data-tree-kind="milestone" data-tree-id="${esc(m.id)}">`;
        frag += dragCell("milestone");
        frag += `<td class="tree-name-cell"><div class="tree-name-inner" style="--depth:${depthMilestone}">${twistMarkup(mKey, hasMkids, mExp)}${outlineTypeIconHtml("milestone", "Features/Milestones", "Features/Milestones")}<span class="tree-row-label">${esc(m.name)}</span></div></td>`;
        frag += `<td>${esc(m.owner)}</td><td>${esc(planned)}</td><td>${esc(planned)}</td><td>${stM}</td></tr>`;

        if (!mExp) return;

        tasks.forEach((t) => {
          const wit = t.workItemType || "Task";
          const typeShort = wit.length > 14 ? wit.slice(0, 12) + "…" : wit;
          frag += `<tr class="tree-row tree-row-leaf${selClass("task", t.id)}" data-tree-kind="task" data-tree-id="${esc(t.id)}" data-task-milestone="${esc(m.id)}">`;
          frag += dragCell("task");
          frag += `<td class="tree-name-cell"><div class="tree-name-inner" style="--depth:${depthTask}"><span class="tree-twist-spacer"></span>${outlineTypeIconHtml("task", typeShort, wit)}<span class="tree-row-label">${esc(t.title)}</span></div></td>`;
          frag += `<td>${esc(t.assignee)}</td><td>—</td><td>—</td><td>${outlineStatusCell(t.status, "task")}</td></tr>`;
        });
      });
      return frag;
    }

    let body = "";

    if (outlineTopLevel === "initiative") {
      const sorted = [...initList].sort((a, b) => {
        const da = domainName(a.domainId).localeCompare(domainName(b.domainId));
        if (da !== 0) return da;
        return a.name.localeCompare(b.name);
      });
      sorted.forEach((i) => {
        const iKey = treeKey("initiative", i.id);
        const iExp = isNodeExpanded(iKey);
        const projects = state.projects.filter((p) => p.initiativeId === i.id && outlineProjectVisible(p));
        const hasIkids = projects.length > 0;
        const mRollI = milestoneDatesRollup(visibleMilestonesUnderInitiative(i.id));
        const stI = outlineStatusCell(i.initiativeStatus, "initiative");

        body += `<tr class="tree-row tree-row-summary${selClass("initiative", i.id)}" data-tree-kind="initiative" data-tree-id="${esc(i.id)}">`;
        body += dragCell("initiative");
        body += `<td class="tree-name-cell"><div class="tree-name-inner" style="--depth:0">${twistMarkup(iKey, hasIkids, iExp)}${outlineTypeIconHtml("initiative", "Initiative", "Initiative")}<span class="tree-row-label">${esc(i.name)}</span>${scopeAiDataBadgesHtml(i)}<span class="tree-context">${serviceNameSpan(i.domainId)}</span></div></td>`;
        body += `<td>${esc(i.owner)}</td><td>${esc(mRollI.start)}</td><td>${esc(mRollI.end)}</td><td>${stI}</td></tr>`;

        if (!iExp) return;

        projects.forEach((p) => {
          const pKey = treeKey("project", p.id);
          const pExp = isNodeExpanded(pKey);
          const ms = milestonesUnderProject(p.id).filter(outlineMilestoneVisible);
          const hasPkids = ms.length > 0;
          const mRollP = milestoneDatesRollup(ms);

          body += `<tr class="tree-row tree-row-summary${selClass("project", p.id)}" data-tree-kind="project" data-tree-id="${esc(p.id)}">`;
          body += dragCell("project");
          body += `<td class="tree-name-cell"><div class="tree-name-inner" style="--depth:1">${twistMarkup(pKey, hasPkids, pExp)}${outlineTypeIconHtml("project", "Epics", "Epics")}<span class="tree-row-label">${esc(p.name)}</span>${scopeAiDataBadgesHtml(p)}</div></td>`;
          body += `<td>${esc(projectOwnerField(p))}</td><td>${esc(mRollP.start)}</td><td>${esc(mRollP.end)}</td><td>${outlineStatusCell(p.deliveryStatus || "Planned", "project")}</td></tr>`;

          if (!pExp) return;
          body += milestoneAndTaskRows(2, 3, p);
        });
      });
    } else if (outlineTopLevel === "project") {
      projectsForOutlineTop().forEach((p) => {
        const i = initiativeById(p.initiativeId);
        if (!i) return;
        const pKey = treeKey("project", p.id);
        const pExp = isNodeExpanded(pKey);
        const ms = milestonesUnderProject(p.id).filter(outlineMilestoneVisible);
        const hasPkids = ms.length > 0;
        const mRollP = milestoneDatesRollup(ms);
        const ctxLine = `<span class="tree-context">${serviceNameSpan(i.domainId)}<span class="kb-card-meta-sep"> › </span><span class="portfolio-initiative-name">${esc(i.name)}</span></span>`;

        body += `<tr class="tree-row tree-row-summary${selClass("project", p.id)}" data-tree-kind="project" data-tree-id="${esc(p.id)}">`;
        body += dragCell("project");
        body += `<td class="tree-name-cell"><div class="tree-name-inner" style="--depth:0">${twistMarkup(pKey, hasPkids, pExp)}${outlineTypeIconHtml("project", "Epics", "Epics")}<span class="tree-row-label">${esc(p.name)}</span>${scopeAiDataBadgesHtml(p)}${ctxLine}</div></td>`;
        body += `<td>${esc(projectOwnerField(p))}</td><td>${esc(mRollP.start)}</td><td>${esc(mRollP.end)}</td><td>${outlineStatusCell(p.deliveryStatus || "Planned", "project")}</td></tr>`;

        if (!pExp) return;
        body += milestoneAndTaskRows(1, 2, p);
      });
    } else {
      state.domains.forEach((d) => {
        const inits = state.initiatives.filter((i) => i.domainId === d.id && initSet.has(i.id));
        const hasDomainKids = inits.length > 0;
        if (
          !hasDomainKids &&
          (filterDomain || filterBU || searchQ || filterTreeOwner || filterTreeStatus || filterOutlineTrack)
        )
          return;

        const dKey = treeKey("domain", d.id);
        const dExp = isNodeExpanded(dKey);
        const mRollD = milestoneDatesRollup(visibleMilestonesUnderDomain(d.id));

        const domInactive = d.active === false ? ' <span class="tag" style="opacity:.8">Inactive</span>' : "";
        body += `<tr class="tree-row tree-row-summary${selClass("domain", d.id)}" data-tree-kind="domain" data-tree-id="${esc(d.id)}">`;
        body += dragCell("domain");
        body += `<td class="tree-name-cell"><div class="tree-name-inner" style="--depth:0">${twistMarkup(dKey, hasDomainKids, dExp)}${outlineTypeIconHtml("capability", "Service", "Service")}<span class="tree-row-label">${esc(d.name)}</span>${scopeAiDataBadgesHtml(d)}${domInactive}</div></td>`;
        body += `<td>${esc((d.capabilityOwner || "").trim() || "—")}</td><td>${esc(mRollD.start)}</td><td>${esc(mRollD.end)}</td><td>${outlineStatusCell("—", "none")}</td></tr>`;

        if (!dExp || !hasDomainKids) return;

        inits.forEach((i) => {
          const iKey = treeKey("initiative", i.id);
          const iExp = isNodeExpanded(iKey);
          const projects = state.projects.filter((p) => p.initiativeId === i.id && outlineProjectVisible(p));
          const hasIkids = projects.length > 0;
          const mRollI = milestoneDatesRollup(visibleMilestonesUnderInitiative(i.id));
          const stI = outlineStatusCell(i.initiativeStatus, "initiative");

          body += `<tr class="tree-row tree-row-summary${selClass("initiative", i.id)}" data-tree-kind="initiative" data-tree-id="${esc(i.id)}">`;
          body += dragCell("initiative");
          body += `<td class="tree-name-cell"><div class="tree-name-inner" style="--depth:1">${twistMarkup(iKey, hasIkids, iExp)}${outlineTypeIconHtml("initiative", "Initiative", "Initiative")}<span class="tree-row-label">${esc(i.name)}</span>${scopeAiDataBadgesHtml(i)}</div></td>`;
          body += `<td>${esc(i.owner)}</td><td>${esc(mRollI.start)}</td><td>${esc(mRollI.end)}</td><td>${stI}</td></tr>`;

          if (!iExp) return;

          projects.forEach((p) => {
            const pKey = treeKey("project", p.id);
            const pExp = isNodeExpanded(pKey);
            const ms = milestonesUnderProject(p.id).filter(outlineMilestoneVisible);
            const hasPkids = ms.length > 0;
            const mRollP = milestoneDatesRollup(ms);

            body += `<tr class="tree-row tree-row-summary${selClass("project", p.id)}" data-tree-kind="project" data-tree-id="${esc(p.id)}">`;
            body += dragCell("project");
            body += `<td class="tree-name-cell"><div class="tree-name-inner" style="--depth:2">${twistMarkup(pKey, hasPkids, pExp)}${outlineTypeIconHtml("project", "Epics", "Epics")}<span class="tree-row-label">${esc(p.name)}</span>${scopeAiDataBadgesHtml(p)}</div></td>`;
            body += `<td>${esc(projectOwnerField(p))}</td><td>${esc(mRollP.start)}</td><td>${esc(mRollP.end)}</td><td>${outlineStatusCell(p.deliveryStatus || "Planned", "project")}</td></tr>`;

            if (!pExp) return;
            body += milestoneAndTaskRows(3, 4, p);
          });
        });
      });
    }

    document.getElementById("content").innerHTML = `
      <div class="card tree-wrap outline-scroll">
        ${outlineIconLegendHtml()}
        <table class="data tree-grid">
          <thead>
            <tr>
              <th class="col-drag" aria-label="Reparent"></th>
              <th class="col-name">Name</th>
              <th class="col-owner">Owner / assignee</th>
              <th class="col-date">Start</th>
              <th class="col-date">Finish</th>
              <th class="col-st">Status</th>
            </tr>
          </thead>
          <tbody>${body || '<tr><td colspan="6" class="empty">Nothing matches the current filters.</td></tr>'}</tbody>
        </table>
      </div>
    `;

    document.querySelectorAll("[data-tree-toggle]").forEach((btn) => {
      btn.addEventListener("click", (ev) => {
        ev.stopPropagation();
        const k = btn.getAttribute("data-tree-toggle");
        if (!k) return;
        if (expandedKeys.has(k)) expandedKeys.delete(k);
        else expandedKeys.add(k);
        saveExpandedState();
        render();
      });
    });

    document.querySelectorAll("tr.tree-row[data-tree-kind]").forEach((row) => {
      row.addEventListener("click", (ev) => {
        const k = row.getAttribute("data-tree-kind");
        const id = row.getAttribute("data-tree-id");
        const bulkable = k === "task" || k === "milestone";
        const meta = ev.ctrlKey || ev.metaKey;
        if (bulkable && meta && canBulkSetOutlineWorkStatus()) {
          const key = outlineBulkKey(k, id);
          if (outlineBulkKeys.has(key)) {
            outlineBulkKeys.delete(key);
            if (treeSelection && treeSelection.kind === k && treeSelection.id === id) {
              const rest = [...outlineBulkKeys];
              if (rest.length === 0) treeSelection = { kind: k, id };
              else {
                const p = parseOutlineBulkKey(rest[rest.length - 1]);
                treeSelection = p ? { kind: p.kind, id: p.id } : { kind: k, id };
              }
            }
          } else {
            outlineBulkKeys.add(key);
            treeSelection = { kind: k, id };
          }
        } else {
          outlineBulkKeys.clear();
          treeSelection = { kind: k, id };
        }
        if (k === "milestone") drill.milestoneId = id;
        else if (k === "task") drill.milestoneId = row.getAttribute("data-task-milestone");
        else drill.milestoneId = null;
        syncNavBoard();
        render();
      });
    });

    document.querySelectorAll('tr.tree-row[data-tree-kind="domain"]').forEach((row) => {
      row.addEventListener("dblclick", (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        const id = row.getAttribute("data-tree-id");
        openDomainEditModal(state.domains.find((x) => x.id === id));
      });
    });
    document.querySelectorAll('tr.tree-row[data-tree-kind="initiative"]').forEach((row) => {
      row.addEventListener("dblclick", (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        const id = row.getAttribute("data-tree-id");
        openInitiativeEditModal(initiativeById(id));
      });
    });
    document.querySelectorAll('tr.tree-row[data-tree-kind="project"]').forEach((row) => {
      row.addEventListener("dblclick", (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        const id = row.getAttribute("data-tree-id");
        openProjectEditModal(projectById(id));
      });
    });
    document.querySelectorAll('tr.tree-row[data-tree-kind="milestone"]').forEach((row) => {
      row.addEventListener("dblclick", (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        const id = row.getAttribute("data-tree-id");
        openMilestoneEditModal(milestoneById(id));
      });
    });
    document.querySelectorAll('tr.tree-row[data-tree-kind="task"]').forEach((row) => {
      row.addEventListener("dblclick", (ev) => {
        ev.preventDefault();
        ev.stopPropagation();
        const id = row.getAttribute("data-tree-id");
        openTaskModal(state.tasks.find((x) => x.id === id));
      });
    });

    wireOutlineDragDrop();
  }

  function renderBoard() {
    document.getElementById("pageTitle").textContent = "Kanban Board";
    const scopeM = boardScopeMilestoneId ? milestoneById(boardScopeMilestoneId) : null;
    const isMs = boardKanbanMode === "milestones";
    const columns = isMs ? MILESTONE_DELIVERY_STATUS : TASK_COLUMNS;
    const wipLookup = isMs ? {} : COLUMN_WIP;
    const hintMode = isMs ? "milestones" : "tasks";

    const rollupTasks = (state.tasks || []).filter((t) => getTaskRollup(t) && isBoardTask(t));
    const rollupMilestones = (state.milestones || []).filter((m) => getMilestoneRollup(m));

    let boardInitiativeChoices = state.initiatives.slice();
    if (boardTaskFilterDomain) {
      boardInitiativeChoices = boardInitiativeChoices.filter((i) => i.domainId === boardTaskFilterDomain);
    }
    boardInitiativeChoices.sort((a, b) => a.name.localeCompare(b.name));
    if (boardTaskFilterInitiative && !boardInitiativeChoices.some((i) => i.id === boardTaskFilterInitiative)) {
      boardTaskFilterInitiative = "";
    }

    const scopedInitiativeIds = new Set(boardInitiativeChoices.map((i) => i.id));
    let boardProjectChoices = state.projects.filter((p) => scopedInitiativeIds.has(p.initiativeId));
    if (boardTaskFilterInitiative) {
      boardProjectChoices = boardProjectChoices.filter((p) => p.initiativeId === boardTaskFilterInitiative);
    }
    boardProjectChoices.sort((a, b) => a.name.localeCompare(b.name));
    if (boardTaskFilterProject && !boardProjectChoices.some((p) => p.id === boardTaskFilterProject)) {
      boardTaskFilterProject = "";
    }

    let assigneeChoices;
    if (isMs) {
      let msBase = rollupMilestones.filter((m) => milestonePassesBoardRollupFilters(m));
      if (boardScopeMilestoneId) msBase = msBase.filter((m) => m.id === boardScopeMilestoneId);
      assigneeChoices = [
        ...new Set(msBase.map((m) => (m.owner && m.owner !== "—" ? m.owner.trim() : "")).filter(Boolean)),
      ].sort((a, b) => a.localeCompare(b));
    } else {
      assigneeChoices = [
        ...new Set(
          rollupTasks.map((t) => (t.assignee && t.assignee !== "—" ? t.assignee.trim() : "")).filter(Boolean)
        ),
      ].sort((a, b) => a.localeCompare(b));
    }

    const domainOpts = state.domains
      .map(
        (d) =>
          `<option value="${esc(d.id)}" ${boardTaskFilterDomain === d.id ? "selected" : ""}>${esc(d.name)}</option>`
      )
      .join("");

    const buOpts = [
      ...new Set(state.initiatives.map((i) => i.primaryBU).filter(Boolean)),
    ]
      .sort()
      .map(
        (bu) =>
          `<option value="${esc(bu)}" ${boardTaskFilterBU === bu ? "selected" : ""}>${esc(bu)}</option>`
      )
      .join("");

    const initiativeOpts = boardInitiativeChoices
      .map(
        (ini) =>
          `<option value="${esc(ini.id)}" ${boardTaskFilterInitiative === ini.id ? "selected" : ""}>${esc(
            ini.name
          )}</option>`
      )
      .join("");

    const projectOpts = boardProjectChoices
      .map((p) => {
        const ini = initiativeById(p.initiativeId);
        const label = ini ? `${p.name} — ${ini.name}` : p.name;
        return `<option value="${esc(p.id)}" ${boardTaskFilterProject === p.id ? "selected" : ""}>${esc(label)}</option>`;
      })
      .join("");

    const byCol = {};
    columns.forEach((c) => (byCol[c] = []));

    if (isMs) {
      let pool = rollupMilestones;
      if (boardScopeMilestoneId) pool = pool.filter((m) => m.id === boardScopeMilestoneId);
      pool = pool.filter((m) => milestonePassesAssigneeFilter(m) && milestonePassesBoardRollupFilters(m));
      pool.forEach((m) => {
        const col = milestoneDeliveryStatus(m);
        const c = columns.includes(col) ? col : "Planned";
        byCol[c].push(m);
      });
    } else {
      let pool = rollupTasks;
      if (boardScopeMilestoneId) pool = pool.filter((t) => t.milestoneId === boardScopeMilestoneId);
      pool = pool.filter((t) => taskPassesAssigneeFilter(t) && taskPassesBoardRollupFilters(t));
      pool.forEach((t) => {
        const col = TASK_COLUMNS.includes(t.status) ? t.status : "Not Started";
        byCol[col].push(t);
      });

    const assigneeSelectOpts = [
      `<option value="__all__" ${boardAssigneeFilter === "__all__" ? "selected" : ""}>All ${isMs ? "owners" : "assignees"}</option>`,
      `<option value="__me__" ${boardAssigneeFilter === "__me__" ? "selected" : ""}>Me (${esc(profileDisplayName)})</option>`,
      `<option value="__unassigned__" ${boardAssigneeFilter === "__unassigned__" ? "selected" : ""}>Unassigned</option>`,
      ...assigneeChoices.map(
        (a) =>
          `<option value="${esc(a)}" ${boardAssigneeFilter === a ? "selected" : ""}>${esc(a)}</option>`
      ),
    ].join("");

    const scopeLine = scopeM
      ? `<div class="ado-scope-chip">Scoped to Features/Milestones: <strong>${esc(scopeM.name)}</strong> <button type="button" id="board-clear-scope">Show all Features/Milestones</button></div>`
      : isMs
        ? `<div class="ado-scope-chip">Showing <strong>Features/Milestones</strong> across the portfolio (use filters above).</div>`
        : `<div class="ado-scope-chip">Showing tasks across <strong>all</strong> Features/Milestones (use filters above).</div>`;

    const subHd = isMs
      ? "Features/Milestones · delivery pipeline · drag cards between states · double-click to edit"
      : "Tasks · filter by portfolio context · drag cards between columns · double-click to edit";

    const assigneeLbl = isMs ? "Owner" : "Assigned to";

    document.getElementById("content").innerHTML = `
      <div class="kb-root">
        <header class="kb-header">
          <div class="kb-header-row">
            <div>
              <h2 class="kb-header-title">Portfolio Kanban</h2>
              <p class="kb-header-sub">${subHd}</p>
            </div>
            <div class="kb-mode-toggle" role="group" aria-label="Board shows">
              <button type="button" class="kb-mode-btn ${
                boardKanbanMode === "tasks" ? "kb-mode-btn--on" : ""
              }" data-board-mode="tasks">Tasks</button>
              <button type="button" class="kb-mode-btn ${
                boardKanbanMode === "milestones" ? "kb-mode-btn--on" : ""
              }" data-board-mode="milestones">Features/Milestones</button>
            </div>
          </div>
        </header>
        <div class="kb-filters-shell">
          <div class="ado-board-toolbar ado-board-toolbar-filters">
            ${scopeLine}
            <div class="ado-filter-field">
              <label for="board-filter-domain">Service</label>
              <select id="board-filter-domain" aria-label="Service">
                <option value="">All services</option>
                ${domainOpts}
              </select>
            </div>
            <div class="ado-filter-field">
              <label for="board-filter-initiative">Initiative</label>
              <select id="board-filter-initiative" aria-label="Initiative">
                <option value="">All initiatives</option>
                ${initiativeOpts}
              </select>
            </div>
            <div class="ado-filter-field">
              <label for="board-filter-project">Epics</label>
              <select id="board-filter-project" aria-label="Epics">
                <option value="">All epics</option>
                ${projectOpts}
              </select>
            </div>
            <div class="ado-filter-field">
              <label for="board-filter-bu">Primary BU</label>
              <select id="board-filter-bu" aria-label="Primary BU">
                <option value="">All</option>
                ${buOpts}
              </select>
            </div>

        card.classList.add("ado-card-dragging");
      });

        card.classList.remove("ado-card-dragging");

      });

    document.querySelectorAll(".ado-col-body[data-drop-status]").forEach((zone) => {
      zone.addEventListener("dragover", (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        zone.classList.add("ado-col-drop-over");
      });
      zone.addEventListener("dragleave", (e) => {
        const rel = e.relatedTarget;
        if (rel && zone.contains(rel)) return;
        zone.classList.remove("ado-col-drop-over");
      });
      zone.addEventListener("drop", (e) => {
        e.preventDefault();
        zone.classList.remove("ado-col-drop-over");
        document.querySelectorAll(".ado-col-drop-over").forEach((z) => z.classList.remove("ado-col-drop-over"));
        const raw = e.dataTransfer.getData("text/plain") || "";
        const nextStatus = zone.getAttribute("data-drop-status");
        if (!nextStatus) return;

        let payloadKind = null;
        let entityId = raw;
        const mMatch = /^milestone:(.+)$/.exec(raw);
        const tMatch = /^task:(.+)$/.exec(raw);
        if (mMatch) {
          payloadKind = "milestone";
          entityId = mMatch[1];
        } else if (tMatch) {
          payloadKind = "task";
          entityId = tMatch[1];
        } else if (raw) {
          entityId = raw;
          payloadKind = isMs ? "milestone" : "task";
        } else {
          return;
        }

        if (payloadKind === "task") {
          if (!TASK_COLUMNS.includes(nextStatus)) return;
          const task = state.tasks.find((x) => x.id === entityId);
          if (!task) return;
          task.status = nextStatus;
          save();
          toast("Moved to " + nextStatus);
          render();
          return;
        }

        if (!MILESTONE_DELIVERY_STATUS.includes(nextStatus)) return;
        const ms = milestoneById(entityId);
        if (!ms) return;
        ms.deliveryStatus = nextStatus;
        touchUpdatedAt(ms);
        save();
        toast("Updated to " + nextStatus);
        render();
      });
    });
  }

  function normalizeCsvHeader(cell) {
    return String(cell || "")
      .trim()
      .replace(/^\uFEFF/, "")
      .toLowerCase()
      .replace(/\s+/g, "_");
  }

  function parseCsv(text) {
    const s = String(text || "")
      .replace(/\r\n/g, "\n")
      .replace(/\r/g, "\n");
    const rows = [];
    let row = [];
    let field = "";
    let i = 0;
    let inQ = false;
    while (i < s.length) {
      const c = s[i];
      if (inQ) {
        if (c === '"') {
          if (s[i + 1] === '"') {
            field += '"';
            i += 2;
            continue;
          }
          inQ = false;
          i++;
          continue;
        }
        field += c;
        i++;
        continue;
      }
      if (c === '"') {
        inQ = true;
        i++;
        continue;
      }
      if (c === ",") {
        row.push(field);
        field = "";
        i++;
        continue;
      }
      if (c === "\n") {
        row.push(field);
        if (row.some((x) => String(x).trim() !== "")) rows.push(row);
        row = [];
        field = "";
        i++;
        continue;
      }
      field += c;
      i++;
    }
    row.push(field);
    if (row.some((x) => String(x).trim() !== "")) rows.push(row);
    return rows;
  }

  function csvRowsToObjects(rows) {
    if (!rows.length) return [];
    const headers = rows[0].map(normalizeCsvHeader);
    const out = [];
    for (let r = 1; r < rows.length; r++) {
      const cells = rows[r];
      const o = {};
      let any = false;
      headers.forEach((h, idx) => {
        const v = cells[idx] != null ? String(cells[idx]).trim() : "";
        o[h] = v;
        if (v) any = true;
      });
      if (any) out.push(o);
    }
    return out;
  }

  function readFileText(file) {
    return new Promise((resolve, reject) => {
      const fr = new FileReader();
      fr.onload = () => resolve(String(fr.result || ""));
      fr.onerror = () => reject(fr.error || new Error("read failed"));
      fr.readAsText(file);
    });
  }

  function labelIdsFromNamesCell(cell) {
    if (!cell || !String(cell).trim()) return [];
    const byLo = new Map((state.labelCatalog || []).map((l) => [String(l.name).trim().toLowerCase(), l.id]));
    const out = [];
    String(cell)
      .split(",")
      .map((x) => x.trim())
      .filter(Boolean)
      .forEach((name) => {
        const id = byLo.get(name.toLowerCase());
        if (id) out.push(id);
      });
    return [...new Set(out)];
  }

  function parseBoolLoose(v, defaultTrue) {
    const s = String(v || "")
      .trim()
      .toLowerCase();
    if (!s) return defaultTrue;
    if (["false", "0", "no", "n"].includes(s)) return false;
    if (["true", "1", "yes", "y"].includes(s)) return true;
    return defaultTrue;
  }

  /** CSV / optional fields: tag_ai, tag_data (also accepts scope_ai, scope_data). Empty → false. */
  function parseScopeTagsFromRow(row) {
    const aiRaw =
      row.tag_ai != null && String(row.tag_ai).trim() !== ""
        ? row.tag_ai
        : row.scope_ai != null && String(row.scope_ai).trim() !== ""
          ? row.scope_ai
          : "";
    const dataRaw =
      row.tag_data != null && String(row.tag_data).trim() !== ""
        ? row.tag_data
        : row.scope_data != null && String(row.scope_data).trim() !== ""
          ? row.scope_data
          : "";
    return {
      scopeAi: aiRaw !== "" ? parseBoolLoose(aiRaw, false) : false,
      scopeData: dataRaw !== "" ? parseBoolLoose(dataRaw, false) : false,
    };
  }

  function parseSubtasksImport(cell) {
    if (!cell || !String(cell).trim()) return [];
    return String(cell)
      .split(";")
      .map((x) => x.trim())
      .filter(Boolean)
      .map((chunk) => {
        const pipe = chunk.lastIndexOf("|");
        let title = chunk;
        let done = false;
        if (pipe >= 0) {
          title = chunk.slice(0, pipe).trim();
          const flag = chunk.slice(pipe + 1).trim().toLowerCase();
          done = ["1", "true", "yes", "y", "done", "x"].includes(flag);
        }
        return { id: uid(), title: title || "Subtask", done };
      })
      .filter((st) => st.title);
  }

  }

  function resolveInitiativeForRow(row, warnings, rowLabel) {
    const iniName = row.initiative_name || row.initiative || "";
    const domHint = row.capability_area_name || row.capability_area || row.domain || "";
    if (!iniName || !String(iniName).trim()) {
      warnings.push(`${rowLabel}: missing initiative_name`);
      return null;
    }
    let cand = state.initiatives.filter(
      (i) => i.name.trim().toLowerCase() === String(iniName).trim().toLowerCase()
    );
    if (domHint && String(domHint).trim()) {
      const d = findDomainLo(domHint);
      if (!d) {
        warnings.push(`${rowLabel}: unknown service (capability_area_name) "${domHint}"`);
        return null;
      }
      cand = cand.filter((i) => i.domainId === d.id);
    }
    if (cand.length === 0) {
      warnings.push(`${rowLabel}: initiative "${iniName}" not found`);
      return null;
    }
    if (cand.length > 1) {
      warnings.push(`${rowLabel}: multiple initiatives named "${iniName}" — add capability_area_name`);
      return null;
    }
    return cand[0];
  }

  function findProjectLo(initiativeId, projectName) {
    if (!initiativeId || !projectName || !String(projectName).trim()) return null;
    const q = String(projectName).trim().toLowerCase();
    return (
      state.projects.find((p) => p.initiativeId === initiativeId && p.name.trim().toLowerCase() === q) || null
    );
  }

  function findMilestoneLo(projectId, msName) {
    if (!projectId || !msName || !String(msName).trim()) return null;
    const q = String(msName).trim().toLowerCase();
    return (
      state.milestones.find((m) => m.projectId === projectId && m.name.trim().toLowerCase() === q) || null
    );
  }

  /** CSV export uses the same header names as import (see portfolio-import/README.md). */
  function csvEscapeField(raw) {
    const s = raw == null ? "" : String(raw);
    if (/[",\r\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  }

  function labelNamesCellFromIds(ids) {
    if (!Array.isArray(ids) || !ids.length) return "";
    const byId = new Map((state.labelCatalog || []).map((l) => [l.id, l.name]));
    return ids.map((id) => byId.get(id)).filter(Boolean).join(", ");
  }

  function serializeSubtasksForCsv(subtasks) {
    const arr = Array.isArray(subtasks) ? subtasks : [];
    return arr
      .map((s) => {
        const title = String(s.title || "")
          .replace(/\|/g, " ")
          .trim();
        if (!title) return "";
        return `${title}|${s.done ? "1" : "0"}`;
      })
      .filter(Boolean)
      .join(";");
  }

  function downloadCsvUtf8(filename, csvBody) {
    const bom = "\uFEFF";
    const blob = new Blob([bom + csvBody], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.rel = "noopener";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function downloadJsonUtf8(filename, jsonBody) {
    const blob = new Blob([jsonBody], { type: "application/json;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    a.rel = "noopener";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  /** Deep clone of portfolio state (serializable snapshot). */
  function clonePortfolioState() {
    return JSON.parse(JSON.stringify(state));
  }

  function isPortfolioStateRoot(obj) {
    if (!obj || typeof obj !== "object") return false;
    return (
      Array.isArray(obj.domains) &&
      Array.isArray(obj.initiatives) &&
      Array.isArray(obj.projects) &&
      Array.isArray(obj.milestones) &&
      Array.isArray(obj.tasks)
    );
  }

  /**
   * Export envelope matches what “Replace portfolio from JSON” accepts.
   * Raw `state`-only JSON (same shape as localStorage) is also accepted on import.
   */
  function exportFullPortfolioJson() {
    if (!canManageInitiatives()) {
      toast("Only admins can export the full portfolio.");
      return;
    }
    hydratePortfolioNotes();
    const payload = {
      portfolioExportVersion: 1,
      exportedAt: new Date().toISOString(),
      app: "atlas-portfolio-unified",
      state: clonePortfolioState(),
    };
    const stamp = new Date().toISOString().slice(0, 19).replace(/[:T]/g, "-");
    downloadJsonUtf8(`portfolio-full-export-${stamp}.json`, JSON.stringify(payload, null, 2));
    toast("Downloaded full portfolio JSON");
  }

  /**
   * Replace in-memory portfolio from parsed JSON. Caller must confirm and save UI reset.
   * @returns {{ ok: boolean, message: string }}
   */
  function applyFullPortfolioImportState(nextState) {
    if (!isPortfolioStateRoot(nextState)) {
      return { ok: false, message: "Invalid file: expected domains, initiatives, projects, milestones, and tasks arrays." };
    }
    state = nextState;
    hydratePortfolioNotes();
    hydrateAllTasks();
    boardScopeMilestoneId = null;
    boardAssigneeFilter = "__all__";
    boardTaskFilterDomain = "";
    boardTaskFilterBU = "";
    boardTaskFilterInitiative = "";
    boardTaskFilterProject = "";
    drill = { domainId: null, initiativeId: null, projectId: null, milestoneId: null };
    treeSelection = null;
    outlineBulkKeys.clear();
    pruneExpandedKeysAfterMutation();
    save();
    return { ok: true, message: "Portfolio replaced from JSON." };
  }

  function parseFullPortfolioJsonText(text) {
    const parsed = JSON.parse(text);
    if (parsed && typeof parsed === "object" && parsed.state && isPortfolioStateRoot(parsed.state)) {
      return { envelope: true, state: parsed.state };
    }
    if (isPortfolioStateRoot(parsed)) {
      return { envelope: false, state: parsed };
    }
    return { envelope: false, state: null };
  }

  /**
   * @param {"all"|"domains"|"initiatives"|"projects"|"milestones"|"tasks"} scope
   */
  function buildPortfolioExportCsvBundles(scope) {
    const tiers =
      scope === "all"
        ? ["domains", "initiatives", "projects", "milestones", "tasks"]
        : [scope];
    const bundles = [];

    if (tiers.includes("domains")) {
      const header = "capability_area_name,description,capability_owner,active,tag_ai,tag_data,notes";
      const lines = [header];
      [...(state.domains || [])]
        .sort((a, b) => a.name.localeCompare(b.name))
        .forEach((d) => {
          lines.push(
            [
              csvEscapeField(d.name),
              csvEscapeField(d.description || ""),
              csvEscapeField(d.capabilityOwner || ""),
              csvEscapeField(d.active !== false ? "true" : "false"),
              csvEscapeField(d.scopeAi ? "true" : "false"),
              csvEscapeField(d.scopeData ? "true" : "false"),
              csvEscapeField(d.notes || ""),
            ].join(",")
          );
        });
      bundles.push({ filename: "portfolio-export-01-services.csv", csv: lines.join("\n") });
    }

    if (tiers.includes("initiatives")) {
      const header =
        "capability_area_name,initiative_name,owner,sponsor,outcome_description,initiative_status,funding_status,primary_bu,tag_ai,tag_data,labels,notes";
      const lines = [header];
      [...(state.initiatives || [])]
        .sort((a, b) => {
          const da = domainName(a.domainId).localeCompare(domainName(b.domainId));
          if (da !== 0) return da;
          return a.name.localeCompare(b.name);
        })
        .forEach((i) => {
          lines.push(
            [
              csvEscapeField(domainName(i.domainId)),
              csvEscapeField(i.name),
              csvEscapeField(i.owner || ""),
              csvEscapeField(i.sponsor || ""),
              csvEscapeField(i.outcomeDescription || ""),
              csvEscapeField(i.initiativeStatus || ""),
              csvEscapeField(i.fundingStatus || ""),
              csvEscapeField(i.primaryBU || ""),
              csvEscapeField(i.scopeAi ? "true" : "false"),
              csvEscapeField(i.scopeData ? "true" : "false"),
              csvEscapeField(labelNamesCellFromIds(i.labelIds)),
              csvEscapeField(i.notes || ""),
            ].join(",")
          );
        });
      bundles.push({ filename: "portfolio-export-02-initiatives.csv", csv: lines.join("\n") });
    }

    if (tiers.includes("projects")) {
      const header =
        "capability_area_name,initiative_name,project_name,execution_owner,project_manager,primary_bu,start_date,target_end_date,delivery_status,tag_ai,tag_data,labels,notes";
      const lines = [header];
      const sorted = [...(state.projects || [])].sort((a, b) => {
        const ia = initiativeById(a.initiativeId);
        const ib = initiativeById(b.initiativeId);
        const da = domainName((ia || {}).domainId).localeCompare(domainName((ib || {}).domainId));
        if (da !== 0) return da;
        const na = (ia || {}).name || "";
        const nb = (ib || {}).name || "";
        if (na.localeCompare(nb) !== 0) return na.localeCompare(nb);
        return a.name.localeCompare(b.name);
      });
      sorted.forEach((p) => {
        const ini = initiativeById(p.initiativeId);
        lines.push(
          [
            csvEscapeField(ini ? domainName(ini.domainId) : ""),
            csvEscapeField((ini || {}).name || ""),
            csvEscapeField(p.name),
            csvEscapeField(p.executionOwner || ""),
            csvEscapeField(p.projectManager || ""),
            csvEscapeField(p.primaryBU || ""),
            csvEscapeField(p.startDate || ""),
            csvEscapeField(p.targetEndDate || ""),
            csvEscapeField(p.deliveryStatus || ""),
            csvEscapeField(p.scopeAi ? "true" : "false"),
            csvEscapeField(p.scopeData ? "true" : "false"),
            csvEscapeField(labelNamesCellFromIds(p.labelIds)),
            csvEscapeField(p.notes || ""),
          ].join(",")
        );
      });
      bundles.push({ filename: "portfolio-export-03-epics.csv", csv: lines.join("\n") });
    }

    if (tiers.includes("milestones")) {
      const header =
        "capability_area_name,initiative_name,project_name,milestone_name,description,owner,committed_date,planned_date,delivery_status,deliverable_link,labels,notes";
      const lines = [header];
      const sorted = [...(state.milestones || [])].sort((a, b) => {
        const pa = projectById(a.projectId);
        const pb = projectById(b.projectId);
        const ia = pa ? initiativeById(pa.initiativeId) : null;
        const ib = pb ? initiativeById(pb.initiativeId) : null;
        const da = domainName((ia || {}).domainId).localeCompare(domainName((ib || {}).domainId));
        if (da !== 0) return da;
        const na = (ia || {}).name || "";
        const nb = (ib || {}).name || "";
        if (na.localeCompare(nb) !== 0) return na.localeCompare(nb);
        const pna = (pa || {}).name || "";
        const pnb = (pb || {}).name || "";
        if (pna.localeCompare(pnb) !== 0) return pna.localeCompare(pnb);
        return a.name.localeCompare(b.name);
      });
      sorted.forEach((m) => {
        const pr = projectById(m.projectId);
        const ini = pr ? initiativeById(pr.initiativeId) : null;
        lines.push(
          [
            csvEscapeField(ini ? domainName(ini.domainId) : ""),
            csvEscapeField((ini || {}).name || ""),
            csvEscapeField((pr || {}).name || ""),
            csvEscapeField(m.name),
            csvEscapeField(m.description || ""),
            csvEscapeField(m.owner || ""),
            csvEscapeField(m.committedDate || ""),
            csvEscapeField(m.plannedDate || ""),
            csvEscapeField(m.deliveryStatus || ""),
            csvEscapeField(m.deliverableLink || ""),
            csvEscapeField(labelNamesCellFromIds(m.labelIds)),
            csvEscapeField(m.notes || ""),
          ].join(",")
        );
      });
      bundles.push({ filename: "portfolio-export-04-features-milestones.csv", csv: lines.join("\n") });
    }

    if (tiers.includes("tasks")) {
      const header =
        "capability_area_name,initiative_name,project_name,milestone_name,task_title,assignee,task_status,work_item_type,target_date,labels,acceptance_criteria,subtasks";
      const lines = [header];
      const sorted = [...(state.tasks || [])].sort((a, b) => {
        const ma = milestoneById(a.milestoneId);
        const mb = milestoneById(b.milestoneId);
        const pa = ma ? projectById(ma.projectId) : null;
        const pb = mb ? projectById(mb.projectId) : null;
        const ia = pa ? initiativeById(pa.initiativeId) : null;
        const ib = pb ? initiativeById(pb.initiativeId) : null;
        const da = domainName((ia || {}).domainId).localeCompare(domainName((ib || {}).domainId));
        if (da !== 0) return da;
        const chain = (ini, pr, ms, t) =>
          `${(ini || {}).name || ""}\t${(pr || {}).name || ""}\t${(ms || {}).name || ""}\t${(t || {}).title || ""}`;
        const ca = chain(ia, pa, ma, a);
        const cb = chain(ib, pb, mb, b);
        return ca.localeCompare(cb);
      });
      sorted.forEach((t) => {
        const ms = milestoneById(t.milestoneId);
        const pr = ms ? projectById(ms.projectId) : null;
        const ini = pr ? initiativeById(pr.initiativeId) : null;
        const tc = {
          ...t,
          subtasks: Array.isArray(t.subtasks) ? t.subtasks.map((s) => ({ ...s })) : [],
          discussion: Array.isArray(t.discussion) ? t.discussion.map((c) => ({ ...c })) : [],
        };
        normalizeTaskRecord(tc);
        lines.push(
          [
            csvEscapeField(ini ? domainName(ini.domainId) : ""),
            csvEscapeField((ini || {}).name || ""),
            csvEscapeField((pr || {}).name || ""),
            csvEscapeField((ms || {}).name || ""),
            csvEscapeField(tc.title || ""),
            csvEscapeField(tc.assignee || ""),
            csvEscapeField(tc.status || ""),
            csvEscapeField(tc.workItemType || "Task"),
            csvEscapeField(tc.targetDate || ""),
            csvEscapeField(labelNamesCellFromIds(tc.labelIds)),
            csvEscapeField(tc.acceptanceCriteria || ""),
            csvEscapeField(serializeSubtasksForCsv(tc.subtasks)),
          ].join(",")
        );
      });
      bundles.push({ filename: "portfolio-export-05-tasks.csv", csv: lines.join("\n") });
    }

    return bundles;
  }

  function exportPortfolioCsvScope(scope) {
    if (!canManageInitiatives()) {
      toast("Only admins can export portfolio CSV files.");
      return;
    }
    hydratePortfolioNotes();
    const bundles = buildPortfolioExportCsvBundles(scope);
    if (!bundles.length) return;
    bundles.forEach((b, i) => {
      setTimeout(() => downloadCsvUtf8(b.filename, b.csv), i * 280);
    });
    toast(
      bundles.length > 1
        ? `Downloading ${bundles.length} CSV files…`
        : `Downloaded ${bundles[0].filename}`
    );
  }

  async function runPortfolioCsvImport() {
    if (!canManageInitiatives()) {
      toast("Only admins can import portfolio CSV files.");
      return;
    }
    hydratePortfolioNotes();
    const warnings = [];
    const counts = { domains: 0, initiatives: 0, projects: 0, milestones: 0, tasks: 0 };

    const fd = document.getElementById("importCsvDomains")?.files?.[0];
    const fi = document.getElementById("importCsvInitiatives")?.files?.[0];
    const fp = document.getElementById("importCsvProjects")?.files?.[0];
    const fm = document.getElementById("importCsvMilestones")?.files?.[0];
    const ft = document.getElementById("importCsvTasks")?.files?.[0];

    if (!fd && !fi && !fp && !fm && !ft) {
      toast("Select at least one CSV file.");
      const el = document.getElementById("importResult");
      if (el) {
        el.style.display = "block";
        el.className = "import-result err";
        el.textContent = "No files selected.";
      }
      return;
    }

    try {
      if (fd) {
        const rows = csvRowsToObjects(parseCsv(await readFileText(fd)));
        rows.forEach((row, idx) => {
          const name =
            row.capability_area_name || row.capability_area || row.name || row.domain_name || "";
          if (!name || !String(name).trim()) return;
          if (findDomainLo(name)) {
            warnings.push(`services row ${idx + 2}: skipped (exists): ${name}`);
            return;
          }
          const sc = parseScopeTagsFromRow(row);
          state.domains.push({
            id: uid(),
            name: String(name).trim(),
            description: row.description || "",
            capabilityOwner: row.capability_owner || "",
            active: parseBoolLoose(row.active, true),
            notes: row.notes || "",
            scopeAi: sc.scopeAi,
            scopeData: sc.scopeData,
          });
          counts.domains++;
        });
      }

      if (fi) {
        const rows = csvRowsToObjects(parseCsv(await readFileText(fi)));
        rows.forEach((row, idx) => {
          const rlab = `initiatives row ${idx + 2}`;
          const domName = row.capability_area_name || row.capability_area || row.domain || "";
          const iniName = row.initiative_name || row.initiative || "";
          if (!domName || !String(domName).trim() || !iniName || !String(iniName).trim()) {
            warnings.push(`${rlab}: missing capability_area_name or initiative_name`);
            return;
          }
          const d = findDomainLo(domName);
          if (!d) {
            warnings.push(`${rlab}: unknown service "${domName}"`);
            return;
          }
          if (findInitiativeLo(d.id, iniName)) {
            warnings.push(`${rlab}: skipped initiative (exists): ${iniName}`);
            return;
          }
          let ist = row.initiative_status || INITIATIVE_STATUS[0];
          if (!INITIATIVE_STATUS.includes(ist)) ist = INITIATIVE_STATUS[0];
          let fst = row.funding_status || "Funded";
          if (!FUNDING_STATUS.includes(fst)) fst = "Funded";
          const scI = parseScopeTagsFromRow(row);
          const ni = {
            id: uid(),
            domainId: d.id,
            name: String(iniName).trim(),
            owner: row.owner || "—",
            sponsor: row.sponsor || "",
            outcomeDescription: row.outcome_description || "",
            initiativeStatus: ist,
            fundingStatus: fst,
            primaryBU: row.primary_bu || "Corporate",
            scopeAi: scI.scopeAi,
            scopeData: scI.scopeData,
            labelIds: labelIdsFromNamesCell(row.labels),
            notes: row.notes || "",
          };
          touchUpdatedAt(ni);
          state.initiatives.push(ni);
          counts.initiatives++;
        });
      }

      if (fp) {
        const rows = csvRowsToObjects(parseCsv(await readFileText(fp)));
        rows.forEach((row, idx) => {
          const rlab = `Epics CSV row ${idx + 2}`;
          const ini = resolveInitiativeForRow(row, warnings, rlab);
          if (!ini) return;
          const prName = row.project_name || row.project || "";
          if (!prName || !String(prName).trim()) {
            warnings.push(`${rlab}: missing project_name`);
            return;
          }
          if (findProjectLo(ini.id, prName)) {
            warnings.push(`${rlab}: skipped epic (exists): ${prName}`);
            return;
          }
          let ds = row.delivery_status || "Planned";
          if (!DELIVERY_STATUS.includes(ds)) ds = "Planned";
          const scP = parseScopeTagsFromRow(row);
          const np = {
            id: uid(),
            initiativeId: ini.id,
            name: String(prName).trim(),
            executionOwner: row.execution_owner || "—",
            projectManager: row.project_manager || "",
            primaryBU: row.primary_bu || "Corporate",
            startDate: row.start_date || "",
            targetEndDate: row.target_end_date || "",
            deliveryStatus: ds,
            scopeAi: scP.scopeAi,
            scopeData: scP.scopeData,
            labelIds: labelIdsFromNamesCell(row.labels),
            notes: row.notes || "",
          };
          touchUpdatedAt(np);
          state.projects.push(np);
          counts.projects++;
        });
      }

      if (fm) {
        const rows = csvRowsToObjects(parseCsv(await readFileText(fm)));
        rows.forEach((row, idx) => {
          const rlab = `Features/Milestones CSV row ${idx + 2}`;
          const ini = resolveInitiativeForRow(row, warnings, rlab);
          if (!ini) return;
          const prName = row.project_name || row.project || "";
          const msName = row.milestone_name || row.milestone || "";
          if (!prName || !String(prName).trim() || !msName || !String(msName).trim()) {
            warnings.push(`${rlab}: missing project_name or milestone_name`);
            return;
          }
          const proj = findProjectLo(ini.id, prName);
          if (!proj) {
            warnings.push(`${rlab}: epic "${prName}" not found under initiative`);
            return;
          }
          if (findMilestoneLo(proj.id, msName)) {
            warnings.push(`${rlab}: skipped Features/Milestones row (exists): ${msName}`);
            return;
          }
          let mds = row.delivery_status || "Planned";
          if (mds === "Requested") mds = "Planned";
          if (!MILESTONE_DELIVERY_STATUS.includes(mds)) mds = "Planned";
          const nm = {
            id: uid(),
            projectId: proj.id,
            name: String(msName).trim(),
            description: row.description || "",
            owner: row.owner || "—",
            committedDate: row.committed_date || "",
            plannedDate: row.planned_date || "",
            deliveryStatus: mds,
            deliverableLink: row.deliverable_link || "",
            labelIds: labelIdsFromNamesCell(row.labels),
            notes: row.notes || "",
          };
          touchUpdatedAt(nm);
          state.milestones.push(nm);
          counts.milestones++;
        });
      }

      if (ft) {
        const rows = csvRowsToObjects(parseCsv(await readFileText(ft)));
        rows.forEach((row, idx) => {
          const rlab = `Tasks CSV row ${idx + 2}`;
          const domName = row.capability_area_name || row.capability_area || "";
          const iniName = row.initiative_name || row.initiative || "";
          const prName = row.project_name || row.project || "";
          const msName = row.milestone_name || row.milestone || "";
          const title = row.task_title || row.title || "";
          if (
            !domName ||
            !String(domName).trim() ||
            !iniName ||
            !String(iniName).trim() ||
            !prName ||
            !String(prName).trim() ||
            !msName ||
            !String(msName).trim() ||
            !title ||
            !String(title).trim()
          ) {
            warnings.push(
              `${rlab}: missing capability_area_name, initiative_name, project_name, milestone_name, or task_title`
            );
            return;
          }
          const d = findDomainLo(domName);
          if (!d) {
            warnings.push(`${rlab}: unknown service "${domName}"`);
            return;
          }
          const ini = findInitiativeLo(d.id, iniName);
          if (!ini) {
            warnings.push(`${rlab}: initiative "${iniName}" not found under "${domName}"`);
            return;
          }
          const proj = findProjectLo(ini.id, prName);
          if (!proj) {
            warnings.push(`${rlab}: epic "${prName}" not found`);
            return;
          }
          const ms = findMilestoneLo(proj.id, msName);
          if (!ms) {
            warnings.push(`${rlab}: Features/Milestones row "${msName}" not found`);
            return;
          }
          const dup = (state.tasks || []).some(
            (t) =>
              t.milestoneId === ms.id &&
              t.title.trim().toLowerCase() === String(title).trim().toLowerCase()
          );
          if (dup) {
            warnings.push(`${rlab}: skipped task (exists): ${title}`);
            return;
          }
          let tst = row.task_status || "Not Started";
          if (!TASK_COLUMNS.includes(tst)) tst = "Not Started";
          let wit = row.work_item_type || "Task";
          if (!WORK_ITEM_TYPES.includes(wit)) wit = "Task";
          const nt = {
            id: uid(),
            milestoneId: ms.id,
            title: String(title).trim(),
            assignee: row.assignee || "—",
            status: tst,
            workItemType: wit,
            targetDate: row.target_date || "",
            acceptanceCriteria: row.acceptance_criteria || "",
            discussion: [],
            labelIds: labelIdsFromNamesCell(row.labels),
            subtasks: parseSubtasksImport(row.subtasks),
          };
          normalizeTaskRecord(nt);
          touchUpdatedAt(nt);
          state.tasks.push(nt);
          counts.tasks++;
        });
      }

      migratePortfolioState();
      hydrateAllTasks();
      save();
      render();

      const sum = `Imported: ${counts.domains} domain(s), ${counts.initiatives} initiative(s), ${counts.projects} epic(s), ${counts.milestones} Features/Milestones row(s), ${counts.tasks} task(s).`;
      const warnTxt = warnings.length
        ? `\n\nWarnings (${warnings.length}):\n${warnings.slice(0, 40).join("\n")}${warnings.length > 40 ? "\n…" : ""}`
        : "";
      const el = document.getElementById("importResult");
      if (el) {
        el.style.display = "block";
        el.className = "import-result " + (warnings.length ? "err" : "ok");
        el.textContent = sum + warnTxt;
      }
      toast("Import finished");
    } catch (e) {
      const el = document.getElementById("importResult");
      if (el) {
        el.style.display = "block";
        el.className = "import-result err";
        el.textContent = "Import failed: " + (e && e.message ? e.message : String(e));
      }
      toast("Import failed");
    }

        if (gid && permissionGroupHasAssignments(gid)) {
          toast("Reassign users before removing this group.");
          return;
        }
        tr.remove();
      });

      document.getElementById("adminAddPermUser").addEventListener("click", () => {
        const nid = "uga_" + Math.random().toString(36).slice(2, 11);
        const opts =
          (state.permissionGroups || []).length > 0
            ? (state.permissionGroups || [])
                .map((g) => `<option value="${esc(g.id)}">${esc(g.name)}</option>`)
                .join("")
            : `<option value="">— add a group first —</option>`;
        puRows.insertAdjacentHTML(
          "beforeend",
          `<tr data-assign-id="${esc(nid)}">
          <td><input type="text" class="perm-u-name" value="" placeholder="Display name" aria-label="Person name" /></td>
          <td><select class="perm-u-group" aria-label="Permission group">${opts}</select></td>
          <td><button type="button" class="btn btn-ghost perm-u-remove">Remove</button></td>
        </tr>`
        );
      });
      puRows.addEventListener("click", (e) => {
        const btn = e.target.closest(".perm-u-remove");
        if (!btn || !puRows.contains(btn)) return;
        const tr = btn.closest("tr");
        if (tr) tr.remove();
      });

      document.getElementById("adminPermSave").addEventListener("click", () => {
        const nextGroups = [];
        pgRows.querySelectorAll("tr[data-perm-group-id]").forEach((tr) => {
          const id = tr.getAttribute("data-perm-group-id");
          const name = (tr.querySelector(".perm-g-name") && tr.querySelector(".perm-g-name").value.trim()) || "";
          const desc =
            (tr.querySelector(".perm-g-desc") && tr.querySelector(".perm-g-desc").value.trim()) || "";
          const roleSel = tr.querySelector(".perm-g-role");
          let dr = roleSel ? roleSel.value : "member";
          if (!["admin", "leadership", "lead", "pm", "member"].includes(dr)) dr = "member";
          if (!id || !name) return;
          nextGroups.push({ id, name, description: desc, defaultRole: dr });
        });
        const gidSet = new Set(nextGroups.map((g) => g.id));
        for (const prev of state.permissionGroups || []) {
          if (!gidSet.has(prev.id) && permissionGroupHasAssignments(prev.id)) {
            toast("Cannot remove a group that still has users assigned.");
            return;
          }
        }
        const nextAssign = [];
        puRows.querySelectorAll("tr[data-assign-id]").forEach((tr) => {
          const id = tr.getAttribute("data-assign-id");
          const displayName =
            (tr.querySelector(".perm-u-name") && tr.querySelector(".perm-u-name").value.trim()) || "";
          const groupEl = tr.querySelector(".perm-u-group");
          const groupId = groupEl ? groupEl.value : "";
          if (!id || !displayName) return;
          nextAssign.push({ id, displayName, groupId });
        });
        state.permissionGroups = nextGroups;
        state.userGroupAssignments = nextAssign;
        save();
        render();
        toast("Saved permission groups and assignments");
      });
    }
  }

  function render() {
    if (view !== "hierarchy") outlineBulkKeys.clear();
    const contentEl = document.getElementById("content");
    if (contentEl) contentEl.className = view === "board" ? "content content--kb" : "content";
    setBreadcrumb();
    renderFilters();
    syncTopBarForView();
    syncIntakeNavVisibility();
    syncAdminNavVisibility();
    searchQ = document.getElementById("globalSearch").value.trim();
    if (view === "dashboard") renderDashboard();
    else if (view === "hierarchy") renderHierarchy();
    else if (view === "admin") renderAdmin();
    else if (view === "intake") renderIntake();
    else if (view === "intakeQueue") renderIntakeQueue();
    else if (view === "import") renderImport();
    else renderBoard();
  }

    if (!parts || !parts.length) return "—";
    return parts
      .filter((p) => p != null && String(p).trim() !== "")
      .map((p) => esc(String(p).trim()))
      .join('<span class="modal-crumb-sep" aria-hidden="true"> › </span>');

    const path = formatModalBreadcrumb(pathParts);

      itemName != null && String(itemName).trim()

  function milestoneContextPathParts(mid) {
    const m = milestoneById(mid);
    if (!m) return [];
    const p = projectById(m.projectId);
    if (!p) return [m.name];
    const i = initiativeById(p.initiativeId);
    if (!i) return [p.name, m.name];
    return [domainName(i.domainId), i.name, p.name, m.name];

  function touchUpdatedAt(entity) {
    if (!entity || typeof entity !== "object") return;
    try {
      entity.updatedAt = new Date().toISOString();
    } catch (e) {}
  }

  function formatWitId(id) {
    if (!id) return "—";
    const tail = String(id)
      .replace(/-/g, "")
      .slice(-6)
      .toUpperCase();
    return tail || "—";
  }

  function formatUpdatedLabel(iso) {
    if (!iso || typeof iso !== "string") return "—";
    const d = new Date(iso);
    if (Number.isNaN(d.getTime())) return "—";
    const nowY = new Date().getFullYear();
    /** @type {Intl.DateTimeFormatOptions} */
    const opts = { month: "short", day: "numeric" };
    if (d.getFullYear() !== nowY) opts.year = "numeric";
    return d.toLocaleDateString("en-US", opts);
  }

  function formatDiscussionTimestamp(iso) {
    if (!iso || typeof iso !== "string") return "—";
    try {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "—";
      return d.toLocaleString(undefined, {
        month: "numeric",
        day: "numeric",
        year: "numeric",
        hour: "numeric",
        minute: "2-digit",
      });
    } catch (e) {
      return "—";
    }
  }

  function renderDiscussionEntriesHtml(entries) {
    const sorted = [...(entries || [])]
      .filter((e) => e && typeof e === "object" && String(e.body || "").trim())
      .sort((a, b) => String(a.createdAt || "").localeCompare(String(b.createdAt || "")));
    if (!sorted.length) {
      return '<p class="task-discussion-empty">No comments yet. Add one below.</p>';
    }
    return sorted
      .map((e) => {
        const when = formatDiscussionTimestamp(e.createdAt);
        const au = String(e.author || "—").trim() || "—";
        const ini = initialsFromName(au);
        const bodySafe = esc(String(e.body || "")).replace(/\r\n|\r|\n/g, "<br />");
        return `<div class="task-discussion-entry">
          <div class="task-discussion-avatar" title="${esc(au)}">${esc(ini)}</div>
          <div class="task-discussion-entry-main">
            <div class="task-discussion-meta"><strong>${esc(au)}</strong><span class="task-discussion-sep">·</span><span class="task-discussion-time">${esc(
              when
            )}</span></div>
            <div class="task-discussion-text">${bodySafe}</div>
          </div>
        </div>`;
      })
      .join("");
  }

  function initiativeStatusDotClass(st) {
    if (st === "Delivered") return "rw-dot-done";
    if (st === "On Hold") return "rw-dot-warn";
    if (st === "In Progress") return "rw-dot-active";
    if (st === "Approved" || st === "Committed") return "rw-dot-planned";
    if (st === "Requested") return "rw-dot-newish";
    return "rw-dot-neutral";
  }

  function milestoneStatusDotClass(st) {
    return deliveryStatusDotClass(st);
  }

  function taskStatusDotClass(st) {
    if (st === "Completed") return "rw-dot-done";
    if (st === "In Progress") return "rw-dot-active";
    if (st === "Blocked") return "rw-dot-warn";
    if (st === "Not Started") return "rw-dot-newish";
    return "rw-dot-neutral";
  }

      .map(
        (l) =>
          `<label class="label-chk"><input type="checkbox" data-label-cb="${esc(dataPrefix)}" value="${esc(l.id)}" ${
            sel.includes(l.id) ? "checked" : ""
          } /> ${esc(l.name)}</label>`
      )

  }

  /** Default portfolio role preset for permission groups (sidebar role names). */
  function portfolioPresetRoleSelectHtml(currentValue, extraClass, disabled) {
    const pairs = [
      ["admin", "Admin"],
      ["leadership", "Leadership"],
      ["lead", "Lead"],
      ["pm", "PM"],
      ["member", "Member"],
    ];
    const cur = (currentValue || "member").trim();
    const d = disabled ? " disabled" : "";
    const cls = extraClass ? ` class="${esc(extraClass)}"` : "";
    return `<select${cls} aria-label="Default role preset"${d}>${pairs
      .map(([v, lab]) => `<option value="${esc(v)}" ${cur === v ? "selected" : ""}>${esc(lab)}</option>`)
      .join("")}</select>`;
  }

  function primaryBUSelectHtml(currentValue, fieldId, requiredBool) {
    const opts = [...(state.primaryBUOptions || [])].filter(Boolean).sort((a, b) => a.localeCompare(b));
    const cur = (currentValue || "").trim();
    const req = requiredBool ? " required" : "";
    let html = `<select id="${fieldId}"${req}>`;
    if (!cur && opts.length) html += `<option value="">Select…</option>`;
    if (cur && !opts.includes(cur)) {
      html += `<option value="${esc(cur)}" selected>${esc(cur)}</option>`;
    }
    opts.forEach((o) => {
      html += `<option value="${esc(o)}" ${cur === o ? "selected" : ""}>${esc(o)}</option>`;
    });
    html += "</select>";
    return html;
  }

  /** @param {"domain"|"initiative"|"project"|"milestone"|"task"|"subtask"} kind */
  function witIconSvg(kind) {
    const c = 'class="rw-wit-icon" width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"';
    switch (kind) {
      case "domain":
        return `<svg ${c}><rect x="1" y="3" width="9" height="9" rx="1.5" fill="#5c2d91"/><rect x="6" y="6" width="9" height="9" rx="1.5" fill="#8764b8"/></svg>`;
      case "initiative":
        /* Target / outcome — distinct from milestone star */
        return `<svg ${c}><circle cx="8" cy="8" r="5.6" fill="none" stroke="#107c10" stroke-width="1.35"/><circle cx="8" cy="8" r="2.85" fill="none" stroke="#107c10" stroke-width="1.1"/><circle cx="8" cy="8" r="1.15" fill="#107c10"/></svg>`;
      case "project":
        /* Lightning — big slice of delivery; distinct from milestone star & initiative target */
        return `<svg ${c}><path d="M9.35 1.25L4.4 9.35h3.05L5.65 14.9l6.55-8.55H9.15l.2-5.1z" fill="#0078d4"/></svg>`;
      case "milestone":
        return `<svg ${c}><path d="M8 2l2 3h3l-2 2.5 0.8 3.2L8 9.2 4.2 10.7 5 7.5 3 5h3L8 2z" fill="#881798"/></svg>`;
      case "task":
        return `<svg ${c}><rect x="3" y="2" width="10" height="12" rx="1" fill="#0078d4"/><rect x="5" y="4" width="6" height="1.5" fill="#fff" opacity="0.9"/><rect x="5" y="7" width="6" height="1.5" fill="#fff" opacity="0.7"/><rect x="5" y="10" width="4" height="1.5" fill="#fff" opacity="0.5"/></svg>`;
      case "subtask":
      default:
        return `<svg ${c}><rect x="3" y="3" width="10" height="10" rx="2" fill="none" stroke="#605e5c" stroke-width="1.3"/><path d="M5.5 8l2 2 3.5-4" fill="none" stroke="#605e5c" stroke-width="1.3" stroke-linecap="round"/></svg>`;
    }
  }

  /**
   * @param {{
   *   witKind: "domain"|"initiative"|"project"|"milestone"|"task"|"subtask",
   *   title: string,
   *   ownerLabel: string,
   *   statusLabel: string,
   *   dotClass: string,
   *   navigable?: boolean,
   *   navKind?: string,
   *   navId?: string
   * }} opts
   */
  function relatedWorkRowHtml(opts) {
    const navigable = !!opts.navigable && opts.navKind && opts.navId;
    const navClass = navigable ? "related-work-row related-work-row--nav" : "related-work-row";
    const dataNav = navigable
      ? ` data-rw-kind="${esc(opts.navKind)}" data-rw-id="${esc(opts.navId)}"`
      : "";
    const role = navigable ? ' role="button"' : "";
    const tabIdx = navigable ? ' tabindex="0"' : "";
    const own = opts.ownerLabel != null && String(opts.ownerLabel).trim() !== "" ? String(opts.ownerLabel) : "—";
    const dst = opts.statusLabel != null && String(opts.statusLabel).trim() !== "" ? String(opts.statusLabel) : "—";
    const dc = opts.dotClass || "rw-dot-neutral";
    return `<div class="${navClass}"${dataNav}${role}${tabIdx}>
      <span class="related-work-icon">${witIconSvg(opts.witKind)}</span>
      <div class="related-work-body">
        <div class="related-work-line1"><span class="related-work-item-title">${esc(opts.title)}</span></div>
        <div class="related-work-line2"><span class="related-work-owner">${esc(own)}</span><span class="related-work-status"><span class="related-work-dot ${esc(
      dc
    )}" aria-hidden="true"></span><span>${esc(dst)}</span></span></div>
      </div>
    </div>`;

  function ensureOutlineShowsKind(kind) {
    if (kind === "domain") {
      outlineTopLevel = "domain";
      return;
    }
    if (kind === "initiative" && outlineTopLevel === "project") outlineTopLevel = "initiative";
  }

  function navigateRelatedWorkItem(kind, id) {
    closeModal();
    ensureOutlineShowsKind(kind);
    if (kind === "domain") {
      expandedKeys.add(treeKey("domain", id));
      saveExpandedState();
    } else if (kind === "initiative") {
      expandPathToInitiative(id);
    } else if (kind === "project") {
      expandPathToProject(id);
    } else if (kind === "milestone") {
      expandPathToMilestone(id);
    } else if (kind === "task") {
      expandPathToTask(id);
    }
    treeSelection = { kind, id };
    if (kind === "milestone") drill.milestoneId = id;
    else if (kind === "task") {
      const t = (state.tasks || []).find((x) => x.id === id);
      drill.milestoneId = t ? t.milestoneId : null;
    } else drill.milestoneId = null;
    view = "hierarchy";
    document.querySelectorAll(".nav-btn[data-view]").forEach((b) =>
      b.classList.toggle("on", b.dataset.view === "hierarchy")
    );
    syncNavBoard();
    render();
  }

  function wireRelatedWorkNav() {
    document.querySelectorAll(".related-work-row--nav").forEach((row) => {
      const go = () => {
        const k = row.getAttribute("data-rw-kind");
        const id = row.getAttribute("data-rw-id");
        if (!k || !id) return;
        navigateRelatedWorkItem(k, id);
      };
      row.addEventListener("click", go);
      row.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          go();
        }
      });
    });
  }

  function buildRelatedWorkInitiative(i) {
    const dom = state.domains.find((d) => d.id === i.domainId);
    const parentRow = dom
      ? relatedWorkRowHtml({
          witKind: "domain",
          title: dom.name,
          ownerLabel: dom.capabilityOwner || "—",
          statusLabel: dom.active === false ? "Inactive" : "Active",
          dotClass: dom.active === false ? "rw-dot-neutral" : "rw-dot-done",
          navigable: true,
          navKind: "domain",
          navId: dom.id,
        })
      : `<p class="related-work-empty">No parent Service.</p>`;
    const projects = state.projects
      .filter((p) => p.initiativeId === i.id)
      .slice()
      .sort((a, b) => a.name.localeCompare(b.name));
    const childBody =
      projects.length === 0
        ? `<p class="related-work-empty">No child epics yet.</p>`
        : projects
            .map((p) =>
              relatedWorkRowHtml({
                witKind: "project",
                title: p.name,
                ownerLabel: projectOwnerField(p),
                statusLabel: p.deliveryStatus || "Planned",
                dotClass: deliveryStatusDotClass(p.deliveryStatus || "Planned"),
                navigable: true,
                navKind: "project",
                navId: p.id,
              })
            )
            .join("");
    return buildRelatedWorkPanel(relatedWorkGroup("Parent", parentRow) + relatedWorkGroup("Child", childBody));
  }

      ? relatedWorkRowHtml({
          witKind: "initiative",
          title: ini.name,
          ownerLabel: ini.owner || "—",

          dotClass: initiativeStatusDotClass(ini.initiativeStatus),
          navigable: true,
          navKind: "initiative",

      .slice()
      .sort((a, b) => a.name.localeCompare(b.name));
    const childBody =
      ms.length === 0
        ? `<p class="related-work-empty">No child Features/Milestones yet.</p>`
        : ms
            .map((m) =>
              relatedWorkRowHtml({
                witKind: "milestone",
                title: m.name,
                ownerLabel: m.owner || "—",
                statusLabel: milestoneDeliveryStatus(m),
                dotClass: milestoneStatusDotClass(milestoneDeliveryStatus(m)),
                navigable: true,
                navKind: "milestone",
                navId: m.id,
              })
            )
            .join("");
    return buildRelatedWorkPanel(relatedWorkGroup("Parent", parentRow) + relatedWorkGroup("Child", childBody));
  }

  function buildRelatedWorkMilestone(m) {
    const p = projectById(m.projectId);
    const parentRow = p
      ? relatedWorkRowHtml({
          witKind: "project",
          title: p.name,
          ownerLabel: projectOwnerField(p),
          statusLabel: p.deliveryStatus || "Planned",
          dotClass: deliveryStatusDotClass(p.deliveryStatus || "Planned"),
          navigable: true,
          navKind: "project",
          navId: p.id,
        })
      : `<p class="related-work-empty">No parent epic.</p>`;
    const tasks = (state.tasks || [])
      .filter((t) => t.milestoneId === m.id)
      .slice()
      .sort((a, b) => a.title.localeCompare(b.title));
    const childBody =
      tasks.length === 0
        ? `<p class="related-work-empty">No child tasks yet.</p>`
        : tasks
            .map((t) =>
              relatedWorkRowHtml({
                witKind: "task",
                title: t.title,
                ownerLabel: t.assignee || "—",
                statusLabel: t.status || "—",
                dotClass: taskStatusDotClass(t.status),
                navigable: true,
                navKind: "task",
                navId: t.id,
              })
            )
            .join("");
    return buildRelatedWorkPanel(relatedWorkGroup("Parent", parentRow) + relatedWorkGroup("Child", childBody));
  }

  function buildRelatedWorkTask(t) {
    const m = milestoneById(t.milestoneId);
    const parentRow = m
      ? relatedWorkRowHtml({
          witKind: "milestone",
          title: m.name,
          ownerLabel: m.owner || "—",
          statusLabel: milestoneDeliveryStatus(m),
          dotClass: milestoneStatusDotClass(milestoneDeliveryStatus(m)),
          navigable: true,
          navKind: "milestone",
          navId: m.id,
        })
      : `<p class="related-work-empty">No parent Features/Milestones row.</p>`;
    const subs = Array.isArray(t.subtasks) ? t.subtasks : [];
    const childBody =
      subs.length === 0
        ? `<p class="related-work-empty">No subtasks yet.</p>`
        : subs
            .map((s) =>
              relatedWorkRowHtml({
                witKind: "subtask",
                title: s.title || "Subtask",
                ownerLabel: "—",
                statusLabel: s.done ? "Done" : "Open",
                dotClass: s.done ? "rw-dot-done" : "rw-dot-active",
              })
            )
            .join("");
    return buildRelatedWorkPanel(relatedWorkGroup("Parent", parentRow) + relatedWorkGroup("Child", childBody));
  }

  function focusModalAutofocus() {
    requestAnimationFrame(() => {
      const root = document.getElementById("modalBody");
      const el = root && root.querySelector("[data-modal-autofocus]");
      if (el && typeof el.focus === "function") el.focus();
    });
  }

  function openModal(title, html, onSave) {
    document.getElementById("modalTitle").textContent = title;
    document.getElementById("modalBody").innerHTML = html;
    document.getElementById("overlay").classList.add("open");
    const saveBtn = document.getElementById("modalSave");
    saveBtn.onclick = () => {
      onSave();
      closeModal();
      save();
      render();
      toast("Saved");
    };
    focusModalAutofocus();
    wireRelatedWorkNav();
