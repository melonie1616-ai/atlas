<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ATLAS — CDO Portfolio (5-level preview)</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #eef0f4;
      --card: #fff;
      --text: #1a1a2e;
      --muted: #5a5e72;
      --border: #ecedf2;
      --accent: #6366f1;
      --accent-soft: rgba(99, 102, 241, 0.08);
      --sidebar: linear-gradient(180deg, #0a0f0f 0%, #050808 100%);
      --sidebar-fg: #e0f2f1;
      --risk: #dc2626;
      --ok: #16a34a;
      --r: 10px;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.06);
      --outline-sel-bg: #deecf9;
      --outline-sel-bar: #0078d4;
      --outline-hover: rgba(0, 120, 212, 0.07);
      --outline-zebra: rgba(0, 0, 0, 0.02);
    }
    [data-theme="dark"] {
      --bg: #0c0c14;
      --card: #16161e;
      --text: #e8e8f0;
      --muted: #9a9ab0;
      --border: #2a2a38;
      --accent-soft: rgba(129, 140, 248, 0.12);
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
      --outline-sel-bg: rgba(0, 120, 212, 0.22);
      --outline-sel-bar: #58a6ff;
      --outline-hover: rgba(88, 166, 255, 0.12);
      --outline-zebra: rgba(255, 255, 255, 0.03);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit;
    }

    .side {
      width: 228px;
      flex-shrink: 0;
      background: var(--sidebar);
      color: var(--sidebar-fg);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 18px 12px;
    }
    .side-hd h1 {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }
    .side-hd .sub { font-size: 11px; opacity: 0.75; margin-bottom: 16px; }
    .side-hd .pill {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      background: rgba(99, 102, 241, 0.25);
      color: #c7d2fe;
      padding: 3px 8px;
      border-radius: 999px;
      margin-bottom: 14px;
    }
    .nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      text-align: left;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      color: #d0d0e4;
      margin-bottom: 2px;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: rgba(255, 255, 255, 0.07); color: #fff; }
    .nav-btn.on {
      background: rgba(99, 102, 241, 0.18);
      color: #f0f0ff;
      font-weight: 600;
      border-left: 2px solid #818cf8;
      margin-left: -2px;
      padding-left: 10px;
    }
    .nav-btn svg { width: 18px; height: 18px; opacity: 0.55; flex-shrink: 0; }
    .nav-btn.on svg { opacity: 0.95; }
    .side-ft {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 12px;
    }
    .side-ft a {
      display: block;
      color: #a8a8c8;
      padding: 8px 12px;
      border-radius: 8px;
    }
    .side-ft a:hover { background: rgba(255, 255, 255, 0.06); color: #e8e8f0; text-decoration: none; }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 100vh;
    }
    .topbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 28px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 20px;
      box-shadow: var(--shadow);
    }
    .topbar h2 { font-size: 20px; font-weight: 800; flex: 1; min-width: 140px; }
    .bc {
      width: 100%;
      font-size: 13px;
      color: var(--muted);
      order: -1;
    }
    .bc a { font-weight: 500; }
    .bc span.sep { margin: 0 6px; opacity: 0.5; }
    .tb-actions { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .btn {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid transparent;
    }
    .btn:hover { background: var(--accent); color: #fff; }
    .btn-ghost {
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }
    .search {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      width: 200px;
      max-width: 100%;
      background: var(--bg);
      color: var(--text);
    }

    .filters {
      padding: 12px 28px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: var(--card);
    }
    .filters label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .filters select {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }
    .filters--outline {
      padding: 8px 20px 10px;
      gap: 8px 12px;
      row-gap: 8px;
    }
    .filters--outline label { font-size: 11px; gap: 4px; }
    .filters--outline select {
      padding: 5px 8px;
      font-size: 12px;
      border-radius: 6px;
      min-height: 30px;
    }
    .filters-outline-stack {
      display: flex;
      flex-direction: column;
      width: 100%;
      gap: 8px;
    }
    .filters-outline-filters {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      row-gap: 8px;
    }
    .filters--outline .filters-outline-stack > .outline-quick-tools {
      margin-right: 0;
      width: 100%;
    }
    .outline-icon-legend {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 16px;
      padding: 8px 14px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.3;
    }
    .outline-icon-legend-hd {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-right: 4px;
    }
    .outline-icon-legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
    }
    .outline-icon-legend-ic {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 18px;
      height: 16px;
    }
    .outline-icon-legend-ic svg {
      display: block;
    }
    .outline-quick-tools {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: 8px;
      flex-wrap: wrap;
    }
    .outline-tool-btn {
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      line-height: 1.2;
    }
    .outline-tool-btn:hover {
      border-color: #0078d4;
      color: #0078d4;
      background: var(--outline-hover);
    }
    [data-theme="dark"] .outline-tool-btn:hover {
      border-color: var(--outline-sel-bar);
      color: var(--outline-sel-bar);
    }
    .outline-tool-sep {
      display: inline-block;
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 4px;
      vertical-align: middle;
    }

    .content { padding: 20px 28px 48px; flex: 1; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    table.data {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    table.data th {
      text-align: left;
      padding: 10px 14px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    table.data td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    table.data tr:last-child td { border-bottom: none; }
    table.data tr:hover td { background: var(--accent-soft); }
    table.data .row-title { font-weight: 600; color: var(--text); cursor: pointer; }
    table.data .row-title:hover { color: var(--accent); }
    .tag {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      margin: 2px 4px 2px 0;
      font-weight: 500;
    }
    .st-planned { color: var(--muted); }
    .st-committed { color: #2563eb; }
    .st-delivered { color: var(--ok); }
    .st-atrisk { color: var(--risk); font-weight: 600; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* Portfolio hierarchy visual (Leadership dashboard) */
    .portfolio-model-wrap {
      margin-bottom: 16px;
      padding: 14px 16px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow);
    }
    .portfolio-model-wrap .pmv-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin: 0 0 12px;
    }
    .pmv-flow {
      display: flex;
      flex-wrap: wrap;
      align-items: stretch;
      justify-content: center;
      gap: 8px 6px;
    }
    .pmv-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 10px 12px;
      min-height: 76px;
      min-width: 96px;
      flex: 1 1 96px;
      max-width: 140px;
      border-radius: 12px;
      border: 2px solid var(--accent);
      background: var(--accent-soft);
      text-align: center;
    }
    .pmv-step.is-work {
      border-color: var(--border);
      background: var(--bg);
    }
    .pmv-badge {
      font-size: 10px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.06em;
    }
    .pmv-step.is-work .pmv-badge {
      color: var(--muted);
    }
    .pmv-name {
      font-size: 11px;
      font-weight: 700;
      line-height: 1.25;
      color: var(--text);
    }
    .pmv-chev {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 20px;
      font-weight: 400;
      line-height: 1;
      flex-shrink: 0;
      padding: 0 2px;
      align-self: center;
      opacity: 0.85;
    }
    @media (max-width: 720px) {
      .pmv-flow {
        flex-direction: column;
        align-items: stretch;
      }
      .pmv-step {
        max-width: none;
        flex: none;
        width: 100%;
        min-height: 0;
      }
      .pmv-chev {
        transform: rotate(90deg);
        padding: 4px 0;
      }
    }

    @media (max-width: 960px) {
      .grid-2 { grid-template-columns: 1fr; }
      body { flex-direction: column; }
      .side { width: 100%; min-height: 0; flex-direction: row; flex-wrap: wrap; align-items: center; gap: 8px; }
      .side-ft { margin-top: 0; border: none; padding-top: 0; }
    }

    /* Azure DevOps–style Kanban */
    .ado-board-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 20px;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow);
    }
    .ado-board-toolbar .ado-milestone-pill {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ado-board-toolbar .ado-milestone-pill svg {
      color: #0078d4;
      flex-shrink: 0;
    }
    .ado-board-toolbar label {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }
    .ado-board-toolbar select {
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      min-width: 200px;
    }
    .ado-board-wrap {
      overflow-x: auto;
      margin-top: 4px;
      padding-bottom: 8px;
    }
    .ado-board {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      min-height: 420px;
    }
    .ado-col {
      flex: 1 1 220px;
      min-width: 220px;
      max-width: 320px;
      background: #f2f2f2;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      border: 1px solid #e1e1e1;
    }
    [data-theme="dark"] .ado-col {
      background: #1e1e24;
      border-color: var(--border);
    }
    .ado-col-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      border-bottom: 1px solid #e1e1e1;
    }
    [data-theme="dark"] .ado-col-hd {
      border-bottom-color: var(--border);
    }
    .ado-wip {
      font-size: 13px;
      font-weight: 600;
      color: #107c10;
    }
    .ado-wip.ado-wip-over {
      color: #d13438;
    }
    .ado-col-body {
      flex: 1;
      padding: 8px;
      min-height: 120px;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .ado-col-body.ado-col-drop-over {
      background: rgba(0, 120, 212, 0.08);
      box-shadow: inset 0 0 0 2px #0078d4;
      border-radius: 4px;
    }
    .ado-card {
      margin-bottom: 8px;
      cursor: grab;
      border-radius: 2px;
      border: 1px solid #e1e1e1;
      background: #fff;
      box-shadow: 0 0.5px 2px rgba(0, 0, 0, 0.08);
      user-select: none;
    }
    [data-theme="dark"] .ado-card {
      background: var(--card);
      border-color: var(--border);
    }
    .ado-card:active { cursor: grabbing; }
    .ado-card.ado-card-dragging {
      opacity: 0.55;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }
    .ado-card.ado-card-highlight {
      background: #fff9e6;
    }
    [data-theme="dark"] .ado-card.ado-card-highlight {
      background: #2a2618;
    }
    .ado-card-inner {
      display: flex;
      min-height: 72px;
    }
    .ado-card-accent {
      width: 4px;
      flex-shrink: 0;
      background: #0078d4;
      border-radius: 2px 0 0 2px;
    }
    .ado-card-body {
      flex: 1;
      padding: 10px 12px 10px 10px;
      min-width: 0;
    }
    .ado-card-hd {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
    }
    .ado-card-title-row {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
    }
    .ado-subtask-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
      background: #e8f4fd;
      color: #0078d4;
      border: 1px solid #b3daf2;
      flex-shrink: 0;
      line-height: 1.3;
    }
    [data-theme="dark"] .ado-subtask-badge {
      background: rgba(0, 120, 212, 0.2);
      color: #7ec4ff;
      border-color: rgba(77, 163, 232, 0.45);
    }
    .ado-wi-icon {
      flex-shrink: 0;
      color: #0078d4;
      margin-top: 1px;
    }
    .ado-wi-icon svg {
      width: 16px;
      height: 16px;
      display: block;
    }
    .ado-card-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.35;
      color: var(--text);
    }
    .ado-card-assignee {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .ado-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #deecf9;
      color: #0078d4;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    [data-theme="dark"] .ado-avatar {
      background: rgba(0, 120, 212, 0.2);
      color: #4da3e8;
    }
    .ado-assignee-name {
      font-size: 12px;
      color: var(--text);
    }
    .ado-meta {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
      line-height: 1.4;
    }
    .ado-meta-lbl {
      font-weight: 600;
      color: var(--muted);
      margin-right: 6px;
    }
    .ado-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .ado-tag {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      background: #fff4ce;
      color: #8a6116;
      border: 1px solid #f0d060;
    }
    [data-theme="dark"] .ado-tag {
      background: #3a3020;
      color: #e8c96b;
      border-color: #5c4a28;
    }
    .ado-card.ado-card-late {
      background: #fde8e8;
      border-color: #f5c2c2;
    }
    [data-theme="dark"] .ado-card.ado-card-late {
      background: #3a2224;
      border-color: #6b3a3e;
    }
    .ado-board-toolbar.ado-board-toolbar-filters {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px 20px;
      align-items: end;
    }
    .ado-board-toolbar .ado-filter-field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .ado-board-toolbar .ado-filter-field select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
    }
    .ado-scope-chip {
      grid-column: 1 / -1;
      font-size: 12px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .ado-scope-chip button {
      font-size: 12px;
      color: var(--accent);
      text-decoration: underline;
      padding: 0;
    }

    /* Kanban Board — Global Portal–inspired layout */
    .content.content--kb {
      padding-top: 12px;
    }
    .kb-root {
      margin: -8px -28px 0 -28px;
      padding: 0 0 32px;
    }
    @media (max-width: 960px) {
      .kb-root {
        margin-left: -16px;
        margin-right: -16px;
      }
    }
    .kb-header {
      background: linear-gradient(180deg, #5d4e92 0%, #4a3d78 100%);
      color: #fff;
      padding: 16px 28px 18px;
      border-radius: 0;
      box-shadow: 0 2px 8px rgba(45, 35, 85, 0.25);
    }
    [data-theme="dark"] .kb-header {
      background: linear-gradient(180deg, #4a3f72 0%, #383058 100%);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.35);
    }
    .kb-header-title {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #fff;
    }
    .kb-header-sub {
      margin: 6px 0 0;
      font-size: 12px;
      font-weight: 500;
      opacity: 0.88;
      color: #e8e4f5;
    }
    .kb-header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .kb-header-row > div:first-child {

    }
    .kb-card-lead {

    .kb-card-body {

      font-weight: 700;

    .kb-card-meta {

    .kb-card-avatar {

    .note {

    /* Portfolio outline — compact tree grid */
    /* Scroll on the card so thead sticky uses this scrollport (card overflow:hidden would break sticky) */
    .card.tree-wrap.outline-scroll {
      overflow: auto;
      max-height: min(72vh, 840px);
    }
    table.tree-grid {
      table-layout: fixed;
      font-size: 12px;
    }
    table.tree-grid thead th {
      position: sticky;
      top: 0;
      z-index: 3;
      padding: 7px 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      background: linear-gradient(180deg, var(--card) 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04);
    }
    [data-theme="dark"] table.tree-grid thead th {
      background: linear-gradient(180deg, #1e1e28 0%, #16161e 100%);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.35);
    }
    table.tree-grid tbody td {
      padding: 5px 8px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      line-height: 1.35;
    }
    table.tree-grid tbody tr.tree-row.tree-row-summary td {
      padding-top: 8px;
      padding-bottom: 8px;
    }
    table.tree-grid tbody tr:last-child td { border-bottom: none; }
    table.tree-grid tbody tr.tree-row:hover td {
      background: var(--outline-hover) !important;
    }
    /* Level bands replace zebra — easier to see forest (Service) vs trees (lower tiers) */
    table.tree-grid tbody tr.tree-row:not(.tree-sel):not(:hover) td {
      background: transparent;
    }
    table.tree-grid tbody tr.tree-row[data-tree-kind="domain"]:not(.tree-sel):not(:hover) td {
      background: rgba(92, 45, 145, 0.09);
    }
    table.tree-grid tbody tr.tree-row[data-tree-kind="initiative"]:not(.tree-sel):not(:hover) td {
      background: rgba(16, 124, 16, 0.07);
    }
    table.tree-grid tbody tr.tree-row[data-tree-kind="project"]:not(.tree-sel):not(:hover) td {
      background: rgba(0, 120, 212, 0.06);
    }
    table.tree-grid tbody tr.tree-row[data-tree-kind="milestone"]:not(.tree-sel):not(:hover) td {
      background: rgba(136, 23, 152, 0.07);
    }
    table.tree-grid tbody tr.tree-row[data-tree-kind="task"].tree-row-leaf:not(.tree-sel):not(:hover) td {
      background: rgba(90, 94, 114, 0.045);
    }
    [data-theme="dark"] table.tree-grid tbody tr.tree-row[data-tree-kind="domain"]:not(.tree-sel):not(:hover) td {
      background: rgba(135, 100, 184, 0.14);
    }
    [data-theme="dark"] table.tree-grid tbody tr.tree-row[data-tree-kind="initiative"]:not(.tree-sel):not(:hover) td {
      background: rgba(34, 197, 94, 0.1);
    }
    [data-theme="dark"] table.tree-grid tbody tr.tree-row[data-tree-kind="project"]:not(.tree-sel):not(:hover) td {
      background: rgba(88, 166, 255, 0.1);
    }
    [data-theme="dark"] table.tree-grid tbody tr.tree-row[data-tree-kind="milestone"]:not(.tree-sel):not(:hover) td {
      background: rgba(192, 132, 252, 0.11);
    }
    [data-theme="dark"] table.tree-grid tbody tr.tree-row[data-tree-kind="task"].tree-row-leaf:not(.tree-sel):not(:hover) td {
      background: rgba(180, 180, 210, 0.06);
    }
    table.tree-grid tbody tr.tree-row[data-tree-kind="domain"] td:first-child {
      box-shadow: inset 3px 0 0 #5c2d91;
    }
    table.tree-grid tbody tr.tree-row[data-tree-kind="initiative"] td:first-child {
      box-shadow: inset 3px 0 0 #107c10;
    }
    table.tree-grid tbody tr.tree-row[data-tree-kind="project"] td:first-child {
      box-shadow: inset 3px 0 0 #0078d4;
    }
    table.tree-grid tbody tr.tree-row[data-tree-kind="milestone"] td:first-child {
      box-shadow: inset 3px 0 0 #881798;
    }
    table.tree-grid tbody tr.tree-row[data-tree-kind="task"].tree-row-leaf td:first-child {
      box-shadow: inset 3px 0 0 rgba(90, 94, 114, 0.55);
    }
    [data-theme="dark"] table.tree-grid tbody tr.tree-row[data-tree-kind="task"].tree-row-leaf td:first-child {
      box-shadow: inset 3px 0 0 rgba(180, 180, 210, 0.45);
    }
    table.tree-grid tbody tr.tree-row.tree-sel td {
      background: var(--outline-sel-bg) !important;
    }
    table.tree-grid tbody tr.tree-row.tree-sel td:first-child {
      box-shadow: inset 3px 0 0 var(--outline-sel-bar);
    }
    table.tree-grid .col-drag {
      width: 28px;
      min-width: 28px;
      max-width: 32px;
      padding: 4px 2px !important;
      text-align: center;
      vertical-align: middle;
    }
    table.tree-grid .tree-drag-cell {
      padding: 4px 2px !important;
      vertical-align: middle;
      text-align: center;
    }
    .tree-drag-handle {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 4px;
      cursor: grab;
      user-select: none;
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
      letter-spacing: -2px;
    }
    .tree-drag-handle:active {
      cursor: grabbing;
    }
    .tree-drag-handle:hover {
      background: rgba(0, 120, 212, 0.1);
      color: #0078d4;
    }
    [data-theme="dark"] .tree-drag-handle:hover {
      background: rgba(88, 166, 255, 0.15);
      color: var(--outline-sel-bar);
    }
    tr.tree-row.tree-row-dragging td {
      opacity: 0.55;
    }
    tr.tree-row.tree-drop-hover td {
      box-shadow: inset 0 0 0 2px #0078d4;
      background: rgba(0, 120, 212, 0.08) !important;
    }
    [data-theme="dark"] tr.tree-row.tree-drop-hover td {
      box-shadow: inset 0 0 0 2px var(--outline-sel-bar);
      background: rgba(88, 166, 255, 0.12) !important;
    }
    table.tree-grid .col-name { width: 48%; min-width: 220px; }
    table.tree-grid .col-owner { width: 15%; }
    table.tree-grid .col-date { width: 10%; }
    table.tree-grid .col-st { width: 14%; }

    .tree-name-inner {
      display: flex;
      align-items: flex-start;
      gap: 5px;
      min-height: 26px;
      padding: 2px 0 2px calc(4px + var(--depth, 0) * 18px);
      border-radius: 4px;
    }
    .tree-twist {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      color: #605e5c;
      padding: 0;
      margin-top: 1px;
      border: none;
      background: transparent;
    }
    [data-theme="dark"] .tree-twist { color: #a0a0b8; }
    .tree-twist:hover {
      background: rgba(0, 120, 212, 0.12);
      color: #0078d4;
    }
    [data-theme="dark"] .tree-twist:hover {
      color: var(--outline-sel-bar);
      background: rgba(88, 166, 255, 0.15);
    }
    .tree-chevron {
      display: block;
      transition: transform 0.15s ease;
    }
    .tree-twist[aria-expanded="false"] .tree-chevron {
      transform: rotate(-90deg);
    }
    .tree-twist-spacer {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: inline-block;
    }
    .tree-row-label {
      flex: 1;
      min-width: 0;
      cursor: default;
      font-size: 12px;
      color: var(--text);
    }
    .tree-row-summary .tree-row-label { font-weight: 650; letter-spacing: -0.01em; }
    .tree-row-leaf .tree-row-label {
      font-weight: 450;
      color: var(--text);
      padding-top: 1px;
    }
    .tree-row-leaf td { color: var(--muted); }
    .tree-row-leaf td.tree-name-cell,
    .tree-row-leaf .tree-row-label { color: var(--text); }
    .tree-row { cursor: pointer; }
    tr.tree-row[data-tree-kind="project"] .tree-row-label {
      cursor: default;
      font-size: 12.65px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    tr.tree-row[data-tree-kind="initiative"] .tree-row-label {
      cursor: default;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.012em;
    }
    .tree-context {
      display: block;
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      margin-top: 1px;
      line-height: 1.25;
    }
    .tree-context .portfolio-service-name {
      font-size: 14px;
      line-height: 1.3;
    }
    /** Service (domain) name — emphasized on all main views */
    .portfolio-service-name {
      font-size: 15px;
      font-weight: 650;
      letter-spacing: -0.02em;
      color: #0a3369;
    }
    [data-theme="dark"] .portfolio-service-name {
      color: #8ab4ff;
    }
    table.data td .portfolio-service-name,
    table.admin-cap-table td .portfolio-service-name {
      font-size: 15px;
    }
    tr.tree-row[data-tree-kind="domain"] .tree-row-label {
      font-size: 15px;
      font-weight: 650;
      letter-spacing: -0.02em;
      color: #0a3369;
    }
    [data-theme="dark"] tr.tree-row[data-tree-kind="domain"] .tree-row-label {
      color: #8ab4ff;
    }
    /** Initiative name — larger than epics/tasks, smaller than service (15px) */
    .portfolio-initiative-name {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.012em;
      color: var(--text);
    }
    table.data td .portfolio-initiative-name {
      font-size: 13px;
    }
    .kb-card-meta .portfolio-initiative-name {
      font-size: 12px;
    }
    .ado-meta .portfolio-initiative-name {
      font-size: 12px;
      color: var(--text);
    }
    .tree-context .portfolio-initiative-name {
      font-size: 12px;
      line-height: 1.3;
    }
    .kb-card-meta-sep {
      font-weight: 500;
      color: var(--muted);
      font-size: 12px;
    }
    .svc-inline-split {
      color: var(--muted);
      font-weight: 500;
      font-size: 12px;
    }

    .tree-type-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      max-width: 100%;
    }
    .tree-type-chip-ic {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      opacity: 0.95;
    }
    .tree-type-chip-ic .rw-wit-icon { width: 14px; height: 14px; }
    .tree-type-chip-txt {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tree-type-chip.tree-type-chip--icononly {
      flex-shrink: 0;
      margin-right: 4px;

    .tree-type-chip.tree-type-chip--icononly .tree-type-chip-ic .rw-wit-icon {
      width: 15px;
      height: 15px;
      display: block;
    }

    .tree-st-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 8px 2px 6px;
      border-radius: 999px;

    .tree-st-chip--muted { opacity: 0.75; }
    .tree-st-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;

    .tree-st-txt {
      font-size: 11px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);

      padding: 0 0 14px;

      font-weight: 700;
      color: var(--text);

    }

    .related-work-line1 {

    if (!state.labelCatalog) state.labelCatalog = [];

        m.deliveryStatus = LEGACY_MILESTONE_STATUS[raw] || "Planned";

      if (typeof m.notes !== "string") m.notes = "";

    const i = String(key).indexOf(":");
    if (i < 0) return null;
    return { kind: String(key).slice(0, i), id: String(key).slice(i + 1) };
  }

  function pruneOutlineBulkKeys() {
    const next = new Set();
    outlineBulkKeys.forEach((key) => {
      const p = parseOutlineBulkKey(key);
      if (!p) return;
      if (p.kind === "task" && state.tasks.some((t) => t.id === p.id)) next.add(key);
      else if (p.kind === "milestone" && state.milestones.some((m) => m.id === p.id)) next.add(key);
    });
    outlineBulkKeys = next;
  }

    if (!canBulkSetOutlineWorkStatus()) return;

      const p = parseOutlineBulkKey(key);
      if (!p) return;
      if (p.kind === "task") {

        if (t) tasks.push(t);
      } else if (p.kind === "milestone") {
        const m = milestoneById(p.id);
        if (m) milestones.push(m);
      }
    });
    if (tasks.length === 0 && milestones.length === 0) {
      toast("Select tasks or Features/Milestones rows, then use Ctrl+click (Windows) or ⌘+click (Mac) to add more.");
      return;
    }
    if (tasks.length > 0 && milestones.length > 0) {
      toast("Bulk status: select only tasks, or only Features/Milestones — not both.");
      return;
    }
    if (tasks.length > 0) {
      openModal(
        `Bulk task status (${tasks.length})`,
        `<p class="muted" style="margin:0 0 12px;font-size:13px">Every selected task moves to the status below.</p>
        <div class="field"><label for="bulk_task_st">Task status</label>
          <select id="bulk_task_st" data-modal-autofocus>${TASK_COLUMNS.map(
            (c) => `<option value="${esc(c)}">${esc(c)}</option>`
          ).join("")}</select>
        </div>`,
        () => {
          const st = document.getElementById("bulk_task_st").value;
          if (!TASK_COLUMNS.includes(st)) return;
          tasks.forEach((t) => {
            t.status = st;
            touchUpdatedAt(t);
          });
          outlineBulkKeys.clear();
        }
      );
      return;
    }
    openModal(
      `Bulk Features/Milestones status (${milestones.length})`,
      `<p class="muted" style="margin:0 0 12px;font-size:13px">Every selected row moves to the delivery status below.</p>
      <div class="field"><label for="bulk_ms_st">Delivery status</label>
        <select id="bulk_ms_st" data-modal-autofocus>${MILESTONE_DELIVERY_STATUS.map(
          (c) => `<option value="${esc(c)}">${esc(c)}</option>`
        ).join("")}</select>
      </div>`,
      () => {
        const st = document.getElementById("bulk_ms_st").value;
        if (!MILESTONE_DELIVERY_STATUS.includes(st)) return;
        milestones.forEach((m) => {
          m.deliveryStatus = st;
          touchUpdatedAt(m);
        });
        outlineBulkKeys.clear();
      }
    );
  }

  function seedAllExpanded() {
    expandedKeys = new Set();
    state.domains.forEach((d) => expandedKeys.add(treeKey("domain", d.id)));
    state.initiatives.forEach((i) => expandedKeys.add(treeKey("initiative", i.id)));
    state.projects.forEach((p) => expandedKeys.add(treeKey("project", p.id)));
    state.milestones.forEach((m) => expandedKeys.add(treeKey("milestone", m.id)));
  }

  function loadExpandedState() {
    try {
      const raw = localStorage.getItem(EXPANDED_KEY);
      if (raw) {
        const arr = JSON.parse(raw);
        if (Array.isArray(arr) && arr.length) {
          expandedKeys = new Set(arr);
          return;
        }
      }
    } catch (e) {}
    seedAllExpanded();
    saveExpandedState();
  }

  function saveExpandedState() {
    try {
      localStorage.setItem(EXPANDED_KEY, JSON.stringify([...expandedKeys]));
    } catch (e) {}
  }

  function isNodeExpanded(key) {
    if (searchQ) return true;
    return expandedKeys.has(key);
  }

  function fmtDateShort(iso) {
    if (!iso || iso === "—") return "—";
    try {
      const d = new Date(iso + "T12:00:00");
      return d.toLocaleDateString(undefined, { weekday: "short", month: "numeric", day: "numeric", year: "2-digit" });
    } catch (e) {
      return iso;
    }
  }

  function milestoneDatesRollup(milestones) {
    const dates = milestones.map((m) => m.plannedDate).filter(Boolean).sort();
    if (!dates.length) return { start: "—", end: "—" };
    return { start: fmtDateShort(dates[0]), end: fmtDateShort(dates[dates.length - 1]) };
  }

  function milestonesUnderProject(pid) {
    return state.milestones.filter((m) => m.projectId === pid);
  }

  function milestonesUnderInitiative(iid) {
    const pids = state.projects.filter((p) => p.initiativeId === iid).map((p) => p.id);
    return state.milestones.filter((m) => pids.includes(m.projectId));
  }

  function milestonesUnderDomain(did) {
    const iids = state.initiatives.filter((i) => i.domainId === did).map((i) => i.id);
    const pids = state.projects.filter((p) => iids.includes(p.initiativeId)).map((p) => p.id);
    return state.milestones.filter((m) => pids.includes(m.projectId));
  }

  function initiativeMatchesTreeSearch(i) {
    if (!searchQ) return true;
    const dom = state.domains.find((x) => x.id === i.domainId);
    const blob = [
      i.name,
      i.owner,
      i.sponsor,
      i.initiativeStatus,
      i.primaryBU,
      i.outcomeDescription,
      i.fundingStatus,
      i.scopeAi ? "AI" : "",
      i.scopeData ? "Data" : "",
      domainName(i.domainId),
      dom && dom.scopeAi ? "AI" : "",
      dom && dom.scopeData ? "Data" : "",
    ].join(" ");
    if (matchesSearch(blob)) return true;
    const projects = state.projects.filter((p) => p.initiativeId === i.id);
    for (const p of projects) {
      if (
        matchesSearch(
          p.name +
            " " +
            projectOwnerField(p) +
            " " +
            (p.scopeAi ? "AI" : "") +
            " " +
            (p.scopeData ? "Data" : "")
        )
      )
        return true;
      const ms = milestonesUnderProject(p.id);
      for (const m of ms) {
        if (matchesSearch(m.name + " " + m.owner + " " + milestoneDeliveryStatus(m))) return true;
        const ts = state.tasks.filter((t) => t.milestoneId === m.id);
        for (const t of ts) {
          normalizeTaskRecord(t);
          const labNames = labelsForTask(t)
            .map((l) => l.name)
            .join(" ");
          if (
            matchesSearch(
              t.title +
                " " +
                t.assignee +
                " " +
                t.status +
                " " +
                (t.workItemType || "") +
                " " +
                labNames
            )
          )
            return true;
        }
      }
    }
    return false;
  }

  function entityMatchesOutlineTrack(scopeAi, scopeData) {
    if (!filterOutlineTrack) return true;
    const a = !!scopeAi;
    const b = !!scopeData;
    if (filterOutlineTrack === "ai") return a;
    if (filterOutlineTrack === "data") return b;
    if (filterOutlineTrack === "either") return a || b;
    if (filterOutlineTrack === "both") return a && b;
    return true;
  }

  function projectMatchesOutlineTrack(p) {
    return entityMatchesOutlineTrack(p.scopeAi, p.scopeData);
  }

  function initiativeMatchesOutlineTrackSelf(i) {
    return entityMatchesOutlineTrack(i.scopeAi, i.scopeData);
  }

  function ownerMatchesOutline(ownerField) {
    if (!filterTreeOwner) return true;
    const o = String(ownerField || "")
      .trim()
      .toLowerCase();
    if (filterTreeOwner === "__me__") {
      const me = profileDisplayName.trim().toLowerCase();
      if (!me) return true;
      return o === me;
    }
    if (filterTreeOwner === "__unassigned__") return !o || o === "—" || o === "-";
    return o === filterTreeOwner.trim().toLowerCase();
  }

  function outlineTaskVisible(t) {
    if (!ownerMatchesOutline(t.assignee)) return false;
    if (filterTreeStatus && t.status !== filterTreeStatus) return false;
    return true;
  }

  function outlineMilestoneVisible(m) {
    const tasks = state.tasks.filter((x) => x.milestoneId === m.id);
    if (tasks.some(outlineTaskVisible)) return true;
    return (
      ownerMatchesOutline(m.owner) &&
      (!filterTreeStatus || milestoneDeliveryStatus(m) === filterTreeStatus)
    );
  }

  function outlineProjectVisible(p) {
    if (!projectMatchesOutlineTrack(p)) return false;
    const ms = milestonesUnderProject(p.id);
    if (ms.some(outlineMilestoneVisible)) return true;
    return ownerMatchesOutline(projectOwnerField(p)) && !filterTreeStatus && ms.length === 0;
  }

  function outlineInitiativeVisible(i) {
    const projects = state.projects.filter((x) => x.initiativeId === i.id);
    if (projects.some(outlineProjectVisible)) return true;
    return (
      projects.length === 0 &&
      ownerMatchesOutline(i.owner) &&
      (!filterTreeStatus || i.initiativeStatus === filterTreeStatus) &&
      initiativeMatchesOutlineTrackSelf(i)
    );
  }

  function initiativesForTree() {
    return state.initiatives.filter((i) => {
      if (!domainIsActive(i.domainId)) return false;
      if (filterDomain && i.domainId !== filterDomain) return false;
      if (filterBU && i.primaryBU !== filterBU) return false;
      if (searchQ && !initiativeMatchesTreeSearch(i)) return false;
      if (!outlineInitiativeVisible(i)) return false;
      return true;
    });
  }

  function projectsForOutlineTop() {
    return state.projects
      .filter((p) => {
        const i = initiativeById(p.initiativeId);
        if (!i) return false;
        if (!domainIsActive(i.domainId)) return false;
        if (filterDomain && i.domainId !== filterDomain) return false;
        if (filterBU && i.primaryBU !== filterBU) return false;
        if (searchQ && !initiativeMatchesTreeSearch(i)) return false;
        return outlineProjectVisible(p);
      })
      .sort((a, b) => {
        const ia = initiativeById(a.initiativeId);
        const ib = initiativeById(b.initiativeId);
        const da = domainName(ia.domainId).localeCompare(domainName(ib.domainId));
        if (da !== 0) return da;
        const inCmp = ia.name.localeCompare(ib.name);
        if (inCmp !== 0) return inCmp;
        return a.name.localeCompare(b.name);
      });
  }

  function visibleMilestonesUnderInitiative(iid) {
    return state.projects
      .filter((p) => p.initiativeId === iid)
      .flatMap((p) => milestonesUnderProject(p.id).filter(outlineMilestoneVisible));
  }

  function visibleMilestonesUnderDomain(did) {
    return state.initiatives
      .filter((i) => i.domainId === did)
      .flatMap((i) => visibleMilestonesUnderInitiative(i.id));
  }

  function collectOutlineOwnerChoices() {
    const s = new Set();
    state.initiatives.forEach((i) => {
      if (i.owner && String(i.owner).trim()) s.add(String(i.owner).trim());
    });
    state.projects.forEach((p) => {
      const ex = projectOwnerField(p);
      if (ex && ex !== "—") s.add(ex);
      const pm = (p.projectManager || "").trim();
      if (pm) s.add(pm);
    });
    state.milestones.forEach((m) => {
      if (m.owner && String(m.owner).trim()) s.add(String(m.owner).trim());
    });
    (state.tasks || []).forEach((t) => {
      const a = t.assignee;
      if (a && String(a).trim() && a !== "—") s.add(String(a).trim());
    });
    return [...s].sort((a, b) => a.localeCompare(b));
  }

  function expandPathToInitiative(iid) {
    const ini = initiativeById(iid);
    if (!ini) return;
    expandedKeys.add(treeKey("domain", ini.domainId));
    expandedKeys.add(treeKey("initiative", iid));
    state.projects
      .filter((p) => p.initiativeId === iid)
      .forEach((p) => {
        expandedKeys.add(treeKey("project", p.id));
        milestonesUnderProject(p.id).forEach((m) => expandedKeys.add(treeKey("milestone", m.id)));
      });
    saveExpandedState();
  }

  function expandPathToProject(pid) {
    const p = projectById(pid);
    if (!p) return;
    const ini = initiativeById(p.initiativeId);
    if (!ini) return;
    expandedKeys.add(treeKey("domain", ini.domainId));
    expandedKeys.add(treeKey("initiative", ini.id));
    expandedKeys.add(treeKey("project", p.id));
    milestonesUnderProject(p.id).forEach((m) => expandedKeys.add(treeKey("milestone", m.id)));
    saveExpandedState();
  }

  function expandPathToMilestone(mid) {
    const m = milestoneById(mid);
    if (!m) return;
    const p = projectById(m.projectId);
    if (!p) return;
    expandPathToProject(p.id);
  }

  function expandPathToTask(tid) {
    const t = (state.tasks || []).find((x) => x.id === tid);
    if (!t) return;
    expandPathToMilestone(t.milestoneId);
  }

  function pruneExpandedKeysAfterMutation() {
    expandedKeys = new Set(
      [...expandedKeys].filter((key) => {
        const colon = key.indexOf(":");
        if (colon < 0) return false;
        const kind = key.slice(0, colon);
        const id = key.slice(colon + 1);
        if (kind === "domain") return state.domains.some((d) => d.id === id);
        if (kind === "initiative") return state.initiatives.some((i) => i.id === id);
        if (kind === "project") return state.projects.some((p) => p.id === id);
        if (kind === "milestone") return state.milestones.some((m) => m.id === id);
        return true;
      })
    );
    saveExpandedState();
  }

  /** Remove initiative and all nested projects, milestones, and tasks. */
  function deleteInitiativeAndDescendants(initiativeId) {
    const projectIds = state.projects.filter((p) => p.initiativeId === initiativeId).map((p) => p.id);
    const milestoneIds = state.milestones.filter((m) => projectIds.includes(m.projectId)).map((m) => m.id);
    state.tasks = (state.tasks || []).filter((t) => !milestoneIds.includes(t.milestoneId));
    state.milestones = state.milestones.filter((m) => !projectIds.includes(m.projectId));
    state.projects = state.projects.filter((p) => p.initiativeId !== initiativeId);
    state.initiatives = state.initiatives.filter((x) => x.id !== initiativeId);
    if (boardTaskFilterInitiative === initiativeId) boardTaskFilterInitiative = "";
    if (projectIds.includes(boardTaskFilterProject)) boardTaskFilterProject = "";
    if (boardScopeMilestoneId && milestoneIds.includes(boardScopeMilestoneId)) boardScopeMilestoneId = null;
    treeSelection = null;
    outlineBulkKeys.clear();
    drill = { domainId: null, initiativeId: null, projectId: null, milestoneId: null };
    pruneExpandedKeysAfterMutation();
  }

  /** Remove project and all nested milestones and tasks. */
  function deleteProjectAndDescendants(projectId) {
    const milestoneIds = state.milestones.filter((m) => m.projectId === projectId).map((m) => m.id);
    state.tasks = (state.tasks || []).filter((t) => !milestoneIds.includes(t.milestoneId));
    state.milestones = state.milestones.filter((m) => m.projectId !== projectId);
    state.projects = state.projects.filter((p) => p.id !== projectId);
    if (boardTaskFilterProject === projectId) boardTaskFilterProject = "";
    if (boardScopeMilestoneId && milestoneIds.includes(boardScopeMilestoneId)) boardScopeMilestoneId = null;
    treeSelection = null;
    outlineBulkKeys.clear();
    drill = { domainId: null, initiativeId: null, projectId: null, milestoneId: null };
    pruneExpandedKeysAfterMutation();
  }

  /** Remove one Features/Milestones row and all tasks under it. */
  function deleteMilestoneAndDescendants(milestoneId) {
    const removedTaskIds = (state.tasks || []).filter((t) => t.milestoneId === milestoneId).map((t) => t.id);
    state.tasks = (state.tasks || []).filter((t) => t.milestoneId !== milestoneId);
    state.milestones = state.milestones.filter((m) => m.id !== milestoneId);
    if (boardScopeMilestoneId === milestoneId) boardScopeMilestoneId = null;
    if (drill.milestoneId === milestoneId) drill.milestoneId = null;
    if (treeSelection && treeSelection.kind === "milestone" && treeSelection.id === milestoneId) treeSelection = null;
    else if (treeSelection && treeSelection.kind === "task" && !(state.tasks || []).some((t) => t.id === treeSelection.id)) {
      treeSelection = null;
    }
    outlineBulkKeys.delete(outlineBulkKey("milestone", milestoneId));
    removedTaskIds.forEach((tid) => outlineBulkKeys.delete(outlineBulkKey("task", tid)));
    pruneExpandedKeysAfterMutation();
  }

  /** Remove service and all initiatives (and nested work) under it. */
  function deleteDomainAndDescendants(domainId) {
    const iniIds = state.initiatives.filter((i) => i.domainId === domainId).map((i) => i.id);
    for (const iid of iniIds) {
      deleteInitiativeAndDescendants(iid);
    }
    state.domains = state.domains.filter((d) => d.id !== domainId);
    if (boardTaskFilterDomain === domainId) boardTaskFilterDomain = "";
    pruneExpandedKeysAfterMutation();
  }

  /**
   * Each epic under `parentInitiative` becomes a new initiative under the same Service, with a single
   * placeholder epic ("Delivery") holding that epic's Features/Milestones and tasks. Then removes the parent initiative.
   * @returns {{ ok: boolean, message: string, count?: number }}
   */
  function promoteEpicsToSiblingInitiatives(domainNameNeedle, parentInitiativeName) {
    hydratePortfolioNotes();
    const dn = String(domainNameNeedle || "").trim().toLowerCase();
    const pin = String(parentInitiativeName || "").trim().toLowerCase();
    if (!dn || !pin) return { ok: false, message: "Service match and parent initiative name are required." };

    const domain =
      state.domains.find((d) => d.name.trim().toLowerCase() === dn) ||
      state.domains.find((d) => d.name.toLowerCase().includes(dn));
    if (!domain) return { ok: false, message: `No Service matching “${domainNameNeedle}”.` };

    const parentIni = state.initiatives.find(
      (i) => i.domainId === domain.id && i.name.trim().toLowerCase() === pin
    );
    if (!parentIni) {
      return {
        ok: false,
        message: `Initiative “${parentInitiativeName}” not found under “${domain.name}”.`,
      };
    }

    const childEpics = state.projects.filter((p) => p.initiativeId === parentIni.id);
    if (childEpics.length === 0) {
      return { ok: false, message: "That initiative has no epics to promote." };
    }

    const iniFromEpicDelivery = (ds) => {
      const m = {
        Requested: "Requested",
        Planned: "Committed",
        "In Progress": "In Progress",
        "Attention Needed": "In Progress",
        Completed: "Delivered",
        Cancelled: "Delivered",
      };
      const s = m[ds];
      return s && INITIATIVE_STATUS.includes(s) ? s : parentIni.initiativeStatus;
    };

    const PLACEHOLDER_EPIC = "Delivery";

    for (const ep of childEpics) {
      const labelSet = new Set([...(parentIni.labelIds || []), ...(ep.labelIds || [])]);
      const ni = {
        id: uid(),
        domainId: domain.id,
        name: ep.name.trim() || "Initiative",
        owner: (ep.executionOwner || parentIni.owner || "—").trim() || "—",
        sponsor: (parentIni.sponsor || "").trim(),
        outcomeDescription: (parentIni.outcomeDescription || "").trim(),
        initiativeStatus: iniFromEpicDelivery(ep.deliveryStatus || "Planned"),
        fundingStatus: FUNDING_STATUS.includes(parentIni.fundingStatus) ? parentIni.fundingStatus : "Funded",
        primaryBU: (ep.primaryBU || parentIni.primaryBU || "Corporate").trim() || "Corporate",
        scopeAi: !!ep.scopeAi || !!parentIni.scopeAi,
        scopeData: !!ep.scopeData || !!parentIni.scopeData,
        labelIds: [...labelSet],
        notes: (ep.notes || "").trim(),
      };
      touchUpdatedAt(ni);
      state.initiatives.push(ni);

      const np = {
        id: uid(),
        initiativeId: ni.id,
        name: PLACEHOLDER_EPIC,
        executionOwner: (ep.executionOwner || "—").trim() || "—",
        projectManager: ep.projectManager || "",
        primaryBU: (ep.primaryBU || ni.primaryBU || "Corporate").trim() || "Corporate",
        startDate: ep.startDate || "",
        targetEndDate: ep.targetEndDate || "",
        deliveryStatus: DELIVERY_STATUS.includes(ep.deliveryStatus) ? ep.deliveryStatus : "Planned",
        scopeAi: !!ep.scopeAi,
        scopeData: !!ep.scopeData,
        labelIds: [...(ep.labelIds || [])],
        notes: ep.notes || "",
      };
      touchUpdatedAt(np);
      state.projects.push(np);

      state.milestones.forEach((m) => {
        if (m.projectId === ep.id) m.projectId = np.id;
      });

      state.projects = state.projects.filter((p) => p.id !== ep.id);
    }

    deleteInitiativeAndDescendants(parentIni.id);
    migratePortfolioState();
    hydrateAllTasks();
    save();
    return {
      ok: true,
      count: childEpics.length,
      message: `Promoted ${childEpics.length} epic(s) to initiatives under “${domain.name}” and removed “${parentInitiativeName}”.`,
    };
  }

  /**
   * Promote one epic to a new initiative under the same Service, with placeholder epic "Delivery"
   * holding its Features/Milestones. Does not call save() or render().
   * @returns {{ ok: boolean, message: string, newInitiativeId?: string }}
   */
  function promoteSingleEpicToInitiative(projectId) {
    hydratePortfolioNotes();
    const ep = projectById(projectId);
    if (!ep) return { ok: false, message: "Epic not found." };
    const parentIni = initiativeById(ep.initiativeId);
    if (!parentIni) return { ok: false, message: "Parent initiative not found." };
    const domain = state.domains.find((d) => d.id === parentIni.domainId);
    if (!domain) return { ok: false, message: "Service not found." };

    const iniFromEpicDelivery = (ds) => {
      const m = {
        Requested: "Requested",
        Planned: "Committed",
        "In Progress": "In Progress",
        "Attention Needed": "In Progress",
        Completed: "Delivered",
        Cancelled: "Delivered",
      };
      const s = m[ds];
      return s && INITIATIVE_STATUS.includes(s) ? s : parentIni.initiativeStatus;
    };

    const PLACEHOLDER_EPIC = "Delivery";
    const labelSet = new Set([...(parentIni.labelIds || []), ...(ep.labelIds || [])]);
    const ni = {
      id: uid(),
      domainId: domain.id,
      name: ep.name.trim() || "Initiative",
      owner: (ep.executionOwner || parentIni.owner || "—").trim() || "—",
      sponsor: (parentIni.sponsor || "").trim(),
      outcomeDescription: (parentIni.outcomeDescription || "").trim(),
      initiativeStatus: iniFromEpicDelivery(ep.deliveryStatus || "Planned"),
      fundingStatus: FUNDING_STATUS.includes(parentIni.fundingStatus) ? parentIni.fundingStatus : "Funded",
      primaryBU: (ep.primaryBU || parentIni.primaryBU || "Corporate").trim() || "Corporate",
      scopeAi: !!ep.scopeAi || !!parentIni.scopeAi,
      scopeData: !!ep.scopeData || !!parentIni.scopeData,
      labelIds: [...labelSet],
      notes: (ep.notes || "").trim(),
    };
    touchUpdatedAt(ni);
    state.initiatives.push(ni);

    const np = {
      id: uid(),
      initiativeId: ni.id,
      name: PLACEHOLDER_EPIC,
      executionOwner: (ep.executionOwner || "—").trim() || "—",
      projectManager: ep.projectManager || "",
      primaryBU: (ep.primaryBU || ni.primaryBU || "Corporate").trim() || "Corporate",
      startDate: ep.startDate || "",
      targetEndDate: ep.targetEndDate || "",
      deliveryStatus: DELIVERY_STATUS.includes(ep.deliveryStatus) ? ep.deliveryStatus : "Planned",
      scopeAi: !!ep.scopeAi,
      scopeData: !!ep.scopeData,
      labelIds: [...(ep.labelIds || [])],
      notes: ep.notes || "",
    };
    touchUpdatedAt(np);
    state.projects.push(np);

    state.milestones.forEach((m) => {
      if (m.projectId === ep.id) m.projectId = np.id;
    });

    state.projects = state.projects.filter((p) => p.id !== ep.id);
    if (boardTaskFilterProject === ep.id) boardTaskFilterProject = "";
    pruneExpandedKeysAfterMutation();
    expandedKeys.add(treeKey("domain", domain.id));
    expandedKeys.add(treeKey("initiative", ni.id));
    expandedKeys.add(treeKey("project", np.id));
    saveExpandedState();
    treeSelection = { kind: "initiative", id: ni.id };
    migratePortfolioState();
    hydrateAllTasks();
    return {
      ok: true,
      message: `Epic promoted to initiative “${ni.name}” (placeholder epic “${PLACEHOLDER_EPIC}”).`,
      newInitiativeId: ni.id,
    };
  }

  function isValidOutlineTreeDrop(sourceKind, targetKind) {
    if (sourceKind === "task" && targetKind === "milestone") return true;
    if (sourceKind === "milestone" && targetKind === "project") return true;
    if (sourceKind === "project" && targetKind === "initiative") return true;
    if (sourceKind === "initiative" && targetKind === "domain") return true;
    return false;
  }

  function outlineDropWouldChangeParent(srcKind, srcId, targetKind, targetId) {
    if (srcKind === "task" && targetKind === "milestone") {
      const t = state.tasks.find((x) => x.id === srcId);
      return !!(t && t.milestoneId !== targetId);
    }
    if (srcKind === "milestone" && targetKind === "project") {
      const m = milestoneById(srcId);
      return !!(m && m.projectId !== targetId);
    }
    if (srcKind === "project" && targetKind === "initiative") {
      const p = projectById(srcId);
      return !!(p && p.initiativeId !== targetId);
    }
    if (srcKind === "initiative" && targetKind === "domain") {
      const i = initiativeById(srcId);
      return !!(i && i.domainId !== targetId);
    }
    return false;
  }

  /** @returns {{ ok: boolean, message?: string }} */
  function performOutlineReparent(srcKind, srcId, targetKind, targetId) {
    if (!isValidOutlineTreeDrop(srcKind, targetKind)) {
      return { ok: false, message: "That drop is not allowed (wrong parent type)." };
    }
    if (!outlineDropWouldChangeParent(srcKind, srcId, targetKind, targetId)) {
      return { ok: true };
    }
    if (srcKind === "task" && targetKind === "milestone") {
      const t = state.tasks.find((x) => x.id === srcId);
      const m = milestoneById(targetId);
      if (!t || !m) return { ok: false, message: "Row not found." };
      t.milestoneId = targetId;
      touchUpdatedAt(t);
      return { ok: true, message: "Task moved." };
    }
    if (srcKind === "milestone" && targetKind === "project") {
      const ms = milestoneById(srcId);
      const p = projectById(targetId);
      if (!ms || !p) return { ok: false, message: "Row not found." };
      ms.projectId = targetId;
      touchUpdatedAt(ms);
      return { ok: true, message: "Features/Milestones moved to epic." };
    }
    if (srcKind === "project" && targetKind === "initiative") {
      const pr = projectById(srcId);
      const ini = initiativeById(targetId);
      if (!pr || !ini) return { ok: false, message: "Row not found." };
      pr.initiativeId = targetId;
      touchUpdatedAt(pr);
      return { ok: true, message: "Epic moved." };
    }
    if (srcKind === "initiative" && targetKind === "domain") {
      const ini = initiativeById(srcId);
      const d = state.domains.find((x) => x.id === targetId);
      if (!ini || !d) return { ok: false, message: "Row not found." };
      ini.domainId = targetId;
      touchUpdatedAt(ini);
      return { ok: true, message: "Initiative moved to service." };
    }
    return { ok: false, message: "Invalid reparent." };
  }

  /** @returns {{ ok: boolean, message: string }} */
  function convertTaskToMilestone(taskId) {
    const t = state.tasks.find((x) => x.id === taskId);
    if (!t) return { ok: false, message: "Task not found." };
    const oldM = milestoneById(t.milestoneId);
    if (!oldM) return { ok: false, message: "Parent Features/Milestones row missing." };
    const p = projectById(oldM.projectId);
    if (!p) return { ok: false, message: "Parent epic missing." };

    const nm = {
      id: uid(),
      projectId: p.id,
      name: t.title.trim() || "Features/Milestones",
      description: t.acceptanceCriteria || "",
      owner: t.assignee && t.assignee !== "—" ? t.assignee.trim() : oldM.owner || "—",
      committedDate: "",
      plannedDate: t.targetDate || "",
      deliveryStatus: "Planned",
      deliverableLink: "",
      labelIds: [...(t.labelIds || [])],
      notes: "",
    };
    touchUpdatedAt(nm);
    state.milestones.push(nm);
    state.tasks = state.tasks.filter((x) => x.id !== taskId);
    treeSelection = { kind: "milestone", id: nm.id };
    pruneExpandedKeysAfterMutation();
    expandedKeys.add(treeKey("project", p.id));
    expandedKeys.add(treeKey("milestone", nm.id));
    saveExpandedState();
    return { ok: true, message: `Task converted to Features/Milestones “${nm.name}”.` };
  }

  /** @returns {{ ok: boolean, message: string }} */
  function convertMilestoneToEpic(milestoneId) {
    const m = milestoneById(milestoneId);
    if (!m) return { ok: false, message: "Features/Milestones row not found." };
    const p = projectById(m.projectId);
    if (!p) return { ok: false, message: "Parent epic not found." };
    const ini = initiativeById(p.initiativeId);
    if (!ini) return { ok: false, message: "Initiative not found." };

    const tasks = state.tasks.filter((tk) => tk.milestoneId === m.id);

    const np = {
      id: uid(),
      initiativeId: ini.id,
      name: m.name.trim() || "Epic",
      executionOwner: (m.owner && m.owner !== "—" ? m.owner : p.executionOwner || "—").trim() || "—",
      projectManager: p.projectManager || "",
      primaryBU: (p.primaryBU || ini.primaryBU || "Corporate").trim() || "Corporate",
      startDate: m.committedDate || p.startDate || "",
      targetEndDate: m.plannedDate || p.targetEndDate || "",
      deliveryStatus: DELIVERY_STATUS.includes(m.deliveryStatus) ? m.deliveryStatus : p.deliveryStatus || "Planned",
      scopeAi: !!p.scopeAi,
      scopeData: !!p.scopeData,
      labelIds: [...new Set([...(m.labelIds || []), ...(p.labelIds || [])])],
      notes: [m.notes, p.notes].filter(Boolean).join("\n\n") || "",
    };
    if (!DELIVERY_STATUS.includes(np.deliveryStatus)) np.deliveryStatus = "Planned";
    touchUpdatedAt(np);
    state.projects.push(np);

    const holdMs = {
      id: uid(),
      projectId: np.id,
      name: "Delivery",
      description: m.description || "",
      owner: m.owner || np.executionOwner || "—",
      committedDate: m.committedDate || "",
      plannedDate: m.plannedDate || "",
      deliveryStatus: milestoneDeliveryStatus(m),
      deliverableLink: m.deliverableLink || "",
      labelIds: [...(m.labelIds || [])],
      notes: m.notes || "",
    };
    touchUpdatedAt(holdMs);
    state.milestones.push(holdMs);

    tasks.forEach((tk) => {
      tk.milestoneId = holdMs.id;
      touchUpdatedAt(tk);
    });

    state.milestones = state.milestones.filter((x) => x.id !== m.id);
    if (boardScopeMilestoneId === m.id) boardScopeMilestoneId = holdMs.id;
    treeSelection = { kind: "project", id: np.id };
    pruneExpandedKeysAfterMutation();
    expandedKeys.add(treeKey("initiative", ini.id));
    expandedKeys.add(treeKey("project", np.id));
    expandedKeys.add(treeKey("milestone", holdMs.id));
    saveExpandedState();
    return {
      ok: true,
      message: `Created epic “${np.name}” with Features/Milestones “${holdMs.name}” for former tasks.`,
    };
  }

  function wireOutlineDragDrop() {
    if (!canManageInitiatives()) return;

    document.querySelectorAll(".tree-drag-handle").forEach((handle) => {
      handle.addEventListener("click", (e) => e.stopPropagation());
      handle.addEventListener("mousedown", (e) => e.stopPropagation());
      handle.addEventListener("dragstart", (e) => {
        const row = handle.closest("tr.tree-row");
        if (!row) return;
        const kind = row.getAttribute("data-tree-kind");
        const id = row.getAttribute("data-tree-id");
        if (!kind || !id) return;
        outlineDragPayload = { kind, id };
        e.dataTransfer.effectAllowed = "move";
        try {
          e.dataTransfer.setData("text/plain", `portfolio:${kind}:${id}`);
        } catch (err) {}
        row.classList.add("tree-row-dragging");
      });
      handle.addEventListener("dragend", () => {
        outlineDragPayload = null;
        document.querySelectorAll(".tree-row-dragging").forEach((r) => r.classList.remove("tree-row-dragging"));
        document.querySelectorAll(".tree-drop-hover").forEach((r) => r.classList.remove("tree-drop-hover"));
      });
    });

    document.querySelectorAll("tr.tree-row[data-tree-kind]").forEach((row) => {
      row.addEventListener("dragover", (e) => {
        if (!outlineDragPayload) return;
        const tk = row.getAttribute("data-tree-kind");
        const tid = row.getAttribute("data-tree-id");
        if (!tk || !tid) return;
        if (!isValidOutlineTreeDrop(outlineDragPayload.kind, tk)) return;
        if (!outlineDropWouldChangeParent(outlineDragPayload.kind, outlineDragPayload.id, tk, tid)) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        document.querySelectorAll("tr.tree-row.tree-drop-hover").forEach((r) => {
          if (r !== row) r.classList.remove("tree-drop-hover");
        });
        row.classList.add("tree-drop-hover");
      });
      row.addEventListener("dragleave", (e) => {
        const rt = e.relatedTarget;
        if (rt && row.contains(/** @type {Node} */ (rt))) return;
        row.classList.remove("tree-drop-hover");
      });
      row.addEventListener("drop", (e) => {
        e.preventDefault();
        e.stopPropagation();
        row.classList.remove("tree-drop-hover");
        const payload = outlineDragPayload;
        outlineDragPayload = null;
        if (!payload) return;
        const tk = row.getAttribute("data-tree-kind");
        const tid = row.getAttribute("data-tree-id");
        if (!tk || !tid) return;
        const res = performOutlineReparent(payload.kind, payload.id, tk, tid);
        if (!res.ok) {
          if (res.message) toast(res.message);
          return;
        }
        save();
        if (res.message) toast(res.message);
        render();
      });
    });
  }

  function normalizeTaskRecord(t) {
    if (!t.workItemType || !WORK_ITEM_TYPES.includes(t.workItemType)) t.workItemType = "Task";
    if (!Array.isArray(t.subtasks)) t.subtasks = [];
    t.subtasks = t.subtasks
      .filter((s) => s && typeof s === "object")
      .map((s) => ({
        id: s.id && String(s.id).trim() ? String(s.id) : uid(),
        title: String(s.title || "").trim(),
        done: !!s.done,
      }))
      .filter((s) => s.title.length > 0);
    if (typeof t.acceptanceCriteria !== "string") t.acceptanceCriteria = "";
    if (!Array.isArray(t.discussion)) t.discussion = [];
    t.discussion = t.discussion
      .filter((c) => c && typeof c === "object")
      .map((c) => ({
        id: c.id && String(c.id).trim() ? String(c.id) : uid(),
        author: String(c.author || "—").trim() || "—",
        body: String(c.body || ""),
        createdAt:
          typeof c.createdAt === "string" && String(c.createdAt).trim()
            ? String(c.createdAt).trim()
            : new Date(0).toISOString(),
      }))
      .filter((c) => String(c.body).trim().length > 0);
    if (!Array.isArray(t.labelIds)) t.labelIds = [];
    if (Array.isArray(t.tags) && t.tags.length && state.labelCatalog && state.labelCatalog.length) {
      const byId = new Set(state.labelCatalog.map((c) => c.id));
      const byName = new Map(state.labelCatalog.map((c) => [String(c.name).trim().toLowerCase(), c.id]));
      t.tags.forEach((tag) => {
        const s = String(tag).trim();
        if (!s) return;
        if (byId.has(s) && !t.labelIds.includes(s)) {
          t.labelIds.push(s);
          return;
        }
        const lid = byName.get(s.toLowerCase());
        if (lid && !t.labelIds.includes(lid)) t.labelIds.push(lid);
      });
    }
    delete t.tags;
    if ("notes" in t) delete t.notes;
    if (LEGACY_TASK_STATUS[t.status]) t.status = LEGACY_TASK_STATUS[t.status];
    if (!TASK_COLUMNS.includes(t.status)) t.status = "Not Started";
    if (t.updatedAt != null && typeof t.updatedAt !== "string") t.updatedAt = "";
  }

  /** Kanban board only lists work items of type Task (User Story, Bug, Issue stay in outline only). */
  function isBoardTask(t) {
    return (t.workItemType || "Task") === "Task";
  }

  function hydrateAllTasks() {

  function domainIsActive(id) {

  function labelsForTask(t) {

  function labelsForMilestone(m) {

    return m.labelIds
      .map((lid) => state.labelCatalog.find((c) => c.id === lid))
      .filter(Boolean);
  }

  function rollupInitiative(init) {
    const projects = state.projects.filter((p) => p.initiativeId === init.id);
    const pids = new Set(projects.map((p) => p.id));
    const miles = state.milestones.filter((m) => pids.has(m.projectId));
    const atRisk = miles.filter((m) => milestoneDeliveryStatus(m) === "Attention Needed").length;
    const undelivered = miles.filter((m) => !["Completed", "Cancelled"].includes(milestoneDeliveryStatus(m)));
    let nextDate = null;
    undelivered.forEach((m) => {
      if (!m.plannedDate) return;
      if (!nextDate || m.plannedDate < nextDate) nextDate = m.plannedDate;
    });
    return {
      projectCount: projects.length,
      milestoneCount: miles.length,
      atRisk,
      nextMilestoneDate: nextDate,
    };
  }

  function todayYMD() {
    const n = new Date();
    const y = n.getFullYear();
    const mo = String(n.getMonth() + 1).padStart(2, "0");
    const d = String(n.getDate()).padStart(2, "0");
    return `${y}-${mo}-${d}`;
  }

  function getTaskRollup(t) {
    const m = milestoneById(t.milestoneId);
    if (!m) return null;
    const p = projectById(m.projectId);
    if (!p) return null;
    const i = initiativeById(p.initiativeId);
    if (!i) return null;
    const d = state.domains.find((x) => x.id === i.domainId);
    return {
      milestone: m,
      project: p,
      initiative: i,
      domain: d,
      domainName: d ? d.name : "—",
      primaryBU: i.primaryBU || "—",
      parentLabel: `${i.name} › ${p.name} › ${m.name}`,
    };
  }

  function getMilestoneRollup(m) {
    if (!m) return null;
    const p = projectById(m.projectId);
    if (!p) return null;
    const i = initiativeById(p.initiativeId);
    if (!i) return null;
    const d = state.domains.find((x) => x.id === i.domainId);
    return {
      milestone: m,
      project: p,
      initiative: i,
      domain: d,
      domainName: d ? d.name : "—",
      primaryBU: i.primaryBU || "—",
      parentLabel: `${i.name} › ${p.name}`,
    };
  }

  function milestonePassesBoardRollupFilters(m) {
    const r = getMilestoneRollup(m);
    if (!r) return false;
    if (boardTaskFilterDomain && r.initiative.domainId !== boardTaskFilterDomain) return false;
    if (boardTaskFilterBU && String(r.primaryBU) !== boardTaskFilterBU) return false;
    if (boardTaskFilterInitiative && r.initiative.id !== boardTaskFilterInitiative) return false;
    if (boardTaskFilterProject && r.project.id !== boardTaskFilterProject) return false;
    return true;
  }

  function milestonePassesAssigneeFilter(m) {
    if (!boardAssigneeFilter || boardAssigneeFilter === "__all__") return true;
    if (boardAssigneeFilter === "__me__") {
      const me = profileDisplayName.trim().toLowerCase();
      if (!me) return true;
      return String(m.owner || "")
        .trim()
        .toLowerCase() === me;
    }
    if (boardAssigneeFilter === "__unassigned__") return !m.owner || m.owner === "—";
    return String(m.owner || "")
      .trim()
      .toLowerCase() === boardAssigneeFilter.trim().toLowerCase();
  }

  function isMilestoneLateForBoard(m) {
    if (!m || !m.plannedDate || String(m.plannedDate).trim() === "") return false;
    if (["Completed", "Cancelled"].includes(milestoneDeliveryStatus(m))) return false;
    return String(m.plannedDate).trim() < todayYMD();
  }

  function effectiveTargetYMD(t, m) {
    if (t.targetDate && String(t.targetDate).trim()) return String(t.targetDate).trim();
    if (m && m.plannedDate) return String(m.plannedDate).trim();
    return "";
  }

  function isTaskLate(t, m) {
    const ymd = effectiveTargetYMD(t, m);
    if (!ymd) return false;
    if (!["Not Started", "In Progress", "Blocked"].includes(t.status)) return false;
    return ymd < todayYMD();
  }

  function formatMilestonePickLabel(m) {
    const p = projectById(m.projectId);
    if (!p) return m.name;
    const i = initiativeById(p.initiativeId);
    if (!i) return m.name;
    return `${i.name} › ${p.name} › ${m.name}`;
  }

  function esc(s) {
    if (s == null) return "";
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/"/g, "&quot;");
  }

  function initialsFromName(name) {
    if (!name || name === "—") return "?";
    const parts = String(name)
      .trim()
      .split(/\s+/)
      .filter(Boolean);
    if (parts.length >= 2)
      return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
    return String(name)
      .slice(0, 2)
      .toUpperCase();
  }

  function formatBoardDate(iso) {
    if (!iso) return "—";
    try {
      const d = new Date(iso + "T12:00:00");
      return d.toLocaleDateString(undefined, { month: "numeric", day: "numeric", year: "numeric" });
    } catch (e) {
      return iso;
    }
  }

  function wipCountHtml(colName, count, wipLookup) {
    const map = wipLookup !== undefined ? wipLookup : COLUMN_WIP;
    const lim = map[colName];
    if (lim == null) return `<span class="ado-wip">${count}</span>`;
    const over = count > lim;
    return `<span class="ado-wip${over ? " ado-wip-over" : ""}">${count}/${lim}</span>`;
  }

  function taskPassesAssigneeFilter(t) {
    if (!boardAssigneeFilter || boardAssigneeFilter === "__all__") return true;
    if (boardAssigneeFilter === "__me__") {
      const me = profileDisplayName.trim().toLowerCase();
      if (!me) return true;
      return String(t.assignee || "")
        .trim()
        .toLowerCase() === me;
    }
    if (boardAssigneeFilter === "__unassigned__") return !t.assignee || t.assignee === "—";
    return String(t.assignee || "")
      .trim()
      .toLowerCase() === boardAssigneeFilter.trim().toLowerCase();
  }

  function taskPassesBoardRollupFilters(t) {
    const r = getTaskRollup(t);
    if (!r) return false;
    if (boardTaskFilterDomain && r.initiative.domainId !== boardTaskFilterDomain) return false;
    if (boardTaskFilterBU && String(r.primaryBU) !== boardTaskFilterBU) return false;
    if (boardTaskFilterInitiative && r.initiative.id !== boardTaskFilterInitiative) return false;
    if (boardTaskFilterProject && r.project.id !== boardTaskFilterProject) return false;
    return true;
  }

  function daysBetweenYmd(a, b) {
    try {
      const d1 = new Date(String(a) + "T12:00:00");
      const d2 = new Date(String(b) + "T12:00:00");
      return Math.round((d2.getTime() - d1.getTime()) / 86400000);
    } catch (e) {
      return 0;
    }
  }

  function boardLeadDaysPhrase(ymd) {
    if (!ymd || typeof ymd !== "string") return "";
    const t = todayYMD();
    if (ymd < t) {
      const n = daysBetweenYmd(ymd, t);
      return `${n} day${n === 1 ? "" : "s"} overdue`;
    }
    if (ymd > t) {
      const n = daysBetweenYmd(t, ymd);
      return `${n} day${n === 1 ? "" : "s"} to target`;
    }
    return "Due today";
  }

  function kbPillsFromLabels(labs) {
    const colors = ["kb-pill--orange", "kb-pill--green", "kb-pill--blue", "kb-pill--slate"];
    if (!labs.length) return "";
    return `<div class="kb-card-pills">${labs
      .slice(0, 2)
      .map((l, i) => `<span class="kb-pill ${colors[i % colors.length]}">${esc(l.name)}</span>`)
      .join("")}</div>`;
  }

  function truncEllipsis(s, max) {
    const t = String(s || "").trim();
    if (t.length <= max) return t;
    return t.slice(0, Math.max(0, max - 1)) + "…";
  }

  /** After service prefix on Kanban cards: initiative › project › milestone */

    if (!r || !r.initiative || !r.project || !r.milestone) {

    const ti = truncEllipsis(r.initiative.name, 26);
    const tp = truncEllipsis(r.project.name, 20);
    const tm = truncEllipsis(r.milestone.name, 20);
    return `<span class="portfolio-initiative-name">${esc(ti)}</span><span class="kb-card-meta-sep"> › </span>${esc(tp)}<span class="kb-card-meta-sep"> › </span>${esc(tm)}`;

    return `<span class="portfolio-initiative-name">${esc(ti)}</span><span class="kb-card-meta-sep"> › </span>${esc(tp)}`;

  function initiativeStatusClass(s) {
    if (s === "Delivered") return "st-delivered";
    if (s === "On Hold") return "st-atrisk";
    if (s === "In Progress") return "st-committed";
    if (s === "Approved" || s === "Committed") return "st-committed";
    if (s === "Requested") return "st-planned";
    return "st-planned";
  }

  /** Delivery pipeline for projects & milestones */
  function deliveryStatusDotClass(st) {
    if (st === "Completed") return "rw-dot-done";
    if (st === "Cancelled") return "rw-dot-neutral";
    if (st === "Attention Needed") return "rw-dot-risk";
    if (st === "In Progress") return "rw-dot-active";
    if (st === "Planned") return "rw-dot-planned";
    if (st === "Requested") return "rw-dot-newish";
    return "rw-dot-neutral";
  }

  function outlineRowTypeMapKind(kind) {
    if (kind === "capability" || kind === "domain") return "domain";
    if (kind === "initiative") return "initiative";
    if (kind === "project") return "project";
    if (kind === "milestone") return "milestone";
    return "task";
  }

  /** Icon only — left of the name in the outline (full label in tooltip / aria). */
  function outlineTypeIconHtml(kind, shortLabel, fullLabel) {
    const mapKind = outlineRowTypeMapKind(kind);

    return `<span class="tree-type-chip tree-type-chip--icononly" title="${esc(tip)}" role="img" aria-label="${esc(tip)}"><span class="tree-type-chip-ic" aria-hidden="true">${witIconSvg(
      mapKind
    )}</span></span>`;
  }

  function outlineStatusCell(statusText, rowKind) {
    const s = statusText == null || statusText === "" ? "—" : String(statusText);

      return `<span class="tree-st-chip tree-st-chip--muted"><span class="tree-st-dot rw-dot-neutral"></span><span class="tree-st-txt">—</span></span>`;
    }
    let dot = "rw-dot-neutral";
    if (rowKind === "initiative") dot = initiativeStatusDotClass(s);
    else if (rowKind === "milestone" || rowKind === "project") dot = deliveryStatusDotClass(s);
    else if (rowKind === "task") dot = taskStatusDotClass(s);
    return `<span class="tree-st-chip"><span class="tree-st-dot ${dot}"></span><span class="tree-st-txt">${esc(s)}</span></span>`;
  }

  function filteredInitiatives() {
    return state.initiatives.filter((i) => {
      if (!domainIsActive(i.domainId)) return false;
      if (filterDomain && i.domainId !== filterDomain) return false;
      if (filterBU && i.primaryBU !== filterBU) return false;
      if (searchQ) {
        const blob = [
          i.name,
          i.owner,
          i.sponsor,
          i.primaryBU,
          i.outcomeDescription,
          i.fundingStatus,
          domainName(i.domainId),
          i.scopeAi ? "AI" : "",
          i.scopeData ? "Data" : "",
        ]
          .concat(labelsForInitiative(i).map((l) => l.name))
          .join(" ");
        if (!matchesSearch(blob)) return false;
      }
      return true;
    });

      <div class="card">
        <table class="data">
          <thead>
            <tr>
              <th>Initiative</th>
              <th>Service</th>
              <th>AI / Data</th>
              <th>Owner</th>
              <th>Sponsor</th>
              <th>Initiative status</th>
              <th>Epics</th>
              <th>Features/Milestones</th>
              <th>At risk</th>
              <th>Next Features/Milestones</th>
              <th>Primary BU</th>
              <th>Labels</th>
            </tr>
          </thead>
          <tbody>${rows || '<tr><td colspan="12" class="empty">No initiatives match filters.</td></tr>'}</tbody>

        const id = el.getAttribute("data-go-initiative");
        expandPathToInitiative(id);
        treeSelection = { kind: "initiative", id };
        drill.milestoneId = null;
        view = "hierarchy";
