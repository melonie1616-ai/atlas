      <div class="field"><label>Due date</label><input id="f_target" type="date" value="${esc(t.targetDate || "")}" /></div>
      <div class="field"><label>Labels</label>${labelsCheckboxHtml(t.labelIds || [], "task")}</div>
      <div class="field"><label>Acceptance criteria</label><textarea id="f_acceptance" rows="4" placeholder="What must be true for this task to be considered done?">${esc(
        t.acceptanceCriteria || ""
      )}</textarea></div>
      <div class="field">
        <div class="task-discussion-wrap">
          <span class="task-discussion-kicker">Discussion</span>
          <div id="task_discussion_list" class="task-discussion-list">${renderDiscussionEntriesHtml(t.discussion)}</div>
          <div class="task-discussion-composer">
            <p class="task-discussion-composer-hint">Comments are saved with your name from the sidebar (<strong>${esc(
              profileDisplayName
            )}</strong>) and a timestamp. <kbd>Ctrl</kbd>+<kbd>Enter</kbd> to post.</p>
            <textarea id="f_discussion_new" rows="3" placeholder="Add a comment…" aria-label="New comment"></textarea>
            <button type="button" class="btn" id="task_discussion_add">Add comment</button>
          </div>
        </div>
      </div>
      <div class="field"><label>Subtasks</label>
        <p style="font-size:12px;color:var(--muted);margin:0 0 8px">Check off as you complete. Empty rows are removed when you save.</p>
        <div id="f_subtasks_list" class="subtasks-editor-list"></div>
        <button type="button" class="btn btn-ghost" id="f_subtask_add">+ Add subtask</button>
      </div>
    `;

    const listEl = document.getElementById("f_subtasks_list");

    function subtaskRowHtml(st, idx) {
      return `<div class="subtask-row" data-sub-idx="${idx}">
        <input type="checkbox" data-sub-done ${st.done ? "checked" : ""} aria-label="Done" />
        <input type="text" data-sub-title value="${esc(st.title)}" placeholder="Subtask title" />
        <button type="button" class="btn btn-ghost subtask-row-remove" data-sub-remove aria-label="Remove subtask">×</button>
      </div>`;
    }

    function redrawSubtasksList() {
      listEl.innerHTML =
        subtasksEditing.length === 0
          ? '<p style="font-size:12px;color:var(--muted);margin:0">No subtasks yet.</p>'
          : subtasksEditing.map((st, i) => subtaskRowHtml(st, i)).join("");
      listEl.querySelectorAll(".subtask-row").forEach((row) => {
        const idx = +row.getAttribute("data-sub-idx");
        const cb = row.querySelector("[data-sub-done]");
        const ti = row.querySelector("[data-sub-title]");
        const rm = row.querySelector("[data-sub-remove]");
        cb.addEventListener("change", () => {
          subtasksEditing[idx].done = cb.checked;
        });
        ti.addEventListener("input", () => {
          subtasksEditing[idx].title = ti.value;
        });
        rm.addEventListener("click", () => {
          subtasksEditing.splice(idx, 1);
          redrawSubtasksList();
        });
      });
    }

    redrawSubtasksList();
    document.getElementById("f_subtask_add").addEventListener("click", () => {
      subtasksEditing.push({ id: uid(), title: "", done: false });
      redrawSubtasksList();
    });

    function appendTaskDiscussionComment() {
      const ta = document.getElementById("f_discussion_new");
      if (!ta) return;
      const raw = ta.value.trim();
      if (!raw) {
        toast("Enter a comment first.");
        return;
      }
      normalizeTaskRecord(t);
      t.discussion.push({
        id: uid(),
        author: profileDisplayName.trim() || "Anonymous",
        body: raw,
        createdAt: new Date().toISOString(),
      });
      ta.value = "";
      touchUpdatedAt(t);
      save();
      const listEl = document.getElementById("task_discussion_list");
      if (listEl) listEl.innerHTML = renderDiscussionEntriesHtml(t.discussion);
      toast("Comment added");
    }

    document.getElementById("task_discussion_add").addEventListener("click", appendTaskDiscussionComment);
    const discTa = document.getElementById("f_discussion_new");
    if (discTa)
      discTa.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
          e.preventDefault();
          appendTaskDiscussionComment();
        }
      });

    document.getElementById("overlay").classList.add("open");
    document.getElementById("modalSave").onclick = () => {
      t.title = document.getElementById("f_title").value.trim() || t.title;
      t.assignee = document.getElementById("f_assignee").value.trim() || "—";
      t.workItemType = "Task";
      t.status = document.getElementById("f_status").value;
      t.targetDate = document.getElementById("f_target").value.trim();
      t.labelIds = readLabelCheckboxes("task");
      t.acceptanceCriteria = document.getElementById("f_acceptance").value;
      t.subtasks = subtasksEditing
        .map((s) => ({ id: s.id, title: s.title.trim(), done: !!s.done }))
        .filter((s) => s.title.length > 0);
      touchUpdatedAt(t);
      closeModal();
      save();
      render();
      toast("Saved");
    };
    focusModalAutofocus();
    wireRelatedWorkNav();
  }

        <div class="field"><label>Labels</label>${labelsCheckboxHtml([], "dash_ini")}</div>
        <div class="field"><label>Notes</label><textarea id="f_form_notes" rows="4" placeholder="Free-form notes…"></textarea></div>`,
        () => {
          const sc = readScopeAiDataFromModal("f_dash_ini");
          state.initiatives.push({
            id: uid(),
            domainId: document.getElementById("f_domain").value,
            name: document.getElementById("f_name").value.trim() || "New initiative",
            outcomeDescription: document.getElementById("f_out").value.trim(),
            owner: document.getElementById("f_owner").value.trim() || "—",
            sponsor: document.getElementById("f_sponsor").value.trim(),
            initiativeStatus: document.getElementById("f_ist").value,
            fundingStatus: document.getElementById("f_fund").value,
            primaryBU: document.getElementById("f_bu").value.trim() || "—",
            scopeAi: sc.scopeAi,
            scopeData: sc.scopeData,
            labelIds: readLabelCheckboxes("dash_ini"),
            notes: document.getElementById("f_form_notes").value,
          });
        }
      );
      return;
    }
    if (view === "hierarchy") {
      if (!treeSelection) {
        toast("Select a row in the outline first (Service → initiative → epic → Features/Milestones → task).");
        return;
      }
      const ts = treeSelection;
      if (ts.kind === "domain") {
        if (!canManageInitiatives()) {
          toast("Only admins can add initiatives.");
          return;
        }
        openModal(
          "Add initiative",
          `          <div class="field"><label>Name <span class="req">*</span></label><input id="f_name" required data-modal-autofocus placeholder="Initiative name" /></div>
          ${scopeAiDataCheckboxHtml("f_tree_ini", false, false)}
          <div class="field"><label>Outcome description <span class="req">*</span></label><textarea id="f_out" required rows="3"></textarea></div>
          <div class="field"><label>Initiative Owner <span class="req">*</span></label><input id="f_owner" required /></div>
          <div class="field"><label>Initiative Sponsor</label><input id="f_sponsor" /></div>
          <div class="field"><label>Primary BU <span class="req">*</span></label>${primaryBUSelectHtml("Corporate", "f_bu", true)}</div>
          <div class="field"><label>Funding status <span class="req">*</span></label>
            <select id="f_fund">${FUNDING_STATUS.map((s) => `<option value="${esc(s)}">${esc(s)}</option>`).join("")}</select>
          </div>
          <div class="field"><label>Overall status <span class="req">*</span></label>
            <select id="f_ist">${INITIATIVE_STATUS.map((s) => `<option value="${esc(s)}">${esc(s)}</option>`).join("")}</select>
          </div>
          <div class="field"><label>Labels</label>${labelsCheckboxHtml([], "dom_ini")}</div>
          <div class="field"><label>Notes</label><textarea id="f_form_notes" rows="4" placeholder="Free-form notes…"></textarea></div>`,
          () => {
            const scT = readScopeAiDataFromModal("f_tree_ini");
            state.initiatives.push({
              id: uid(),
              domainId: ts.id,
              name: document.getElementById("f_name").value.trim() || "New initiative",
              outcomeDescription: document.getElementById("f_out").value.trim(),
              owner: document.getElementById("f_owner").value.trim() || "—",
              sponsor: document.getElementById("f_sponsor").value.trim(),
              initiativeStatus: document.getElementById("f_ist").value,
              fundingStatus: document.getElementById("f_fund").value,
              primaryBU: document.getElementById("f_bu").value.trim() || "—",
              scopeAi: scT.scopeAi,
              scopeData: scT.scopeData,
              labelIds: readLabelCheckboxes("dom_ini"),
              notes: document.getElementById("f_form_notes").value,
            });
            expandedKeys.add(treeKey("domain", ts.id));
            saveExpandedState();
          }
        );
        return;
      }
      if (ts.kind === "initiative") {
        if (!canCreateProject()) {
          toast("Only admins, leads, or project managers can create epics.");
          return;
        }
        const iid = ts.id;
        const iniRow = initiativeById(iid);
        const addPBanner = iniRow
          ? modalAddContextBanner("Epics", [domainName(iniRow.domainId), iniRow.name])
          : "";
        openModal(
          "Add epic",
          `${addPBanner}
          <div class="field"><label>Name <span class="req">*</span></label><input id="f_pn" required data-modal-autofocus /></div>
          ${scopeAiDataCheckboxHtml("f_tree_pr", false, false)}
          <div class="field"><label>Execution Owner (PM / Lead) <span class="req">*</span></label><input id="f_po" required /></div>
          <div class="field"><label>Project Manager</label><input id="f_pm" placeholder="Optional" /></div>
          <div class="field"><label>Primary Business Unit <span class="req">*</span></label>${primaryBUSelectHtml((state.primaryBUOptions || [])[0] || "", "f_pbu", true)}</div>
          <div class="field"><label>Start date</label><input id="f_psd" type="date" /></div>
          <div class="field"><label>Target end date</label><input id="f_ped" type="date" /></div>
          <div class="field"><label>Delivery status <span class="req">*</span></label>
            <select id="f_pds">${DELIVERY_STATUS.map(
              (s) => `<option value="${esc(s)}" ${s === "Planned" ? "selected" : ""}>${esc(s)}</option>`
            ).join("")}</select>
          </div>
          <div class="field"><label>Labels</label>${labelsCheckboxHtml([], "add_pr")}</div>
          <div class="field"><label>Notes</label><textarea id="f_form_notes" rows="4" placeholder="Free-form notes…"></textarea></div>`,
          () => {
            const scTr = readScopeAiDataFromModal("f_tree_pr");
            state.projects.push({
              id: uid(),
              initiativeId: iid,
              name: document.getElementById("f_pn").value.trim() || "New epic",
              executionOwner: document.getElementById("f_po").value.trim() || "—",
              projectManager: document.getElementById("f_pm").value.trim(),
              primaryBU: document.getElementById("f_pbu").value.trim() || "—",
              startDate: document.getElementById("f_psd").value || "",
              targetEndDate: document.getElementById("f_ped").value || "",
              deliveryStatus: document.getElementById("f_pds").value,
              scopeAi: scTr.scopeAi,
              scopeData: scTr.scopeData,
              labelIds: readLabelCheckboxes("add_pr"),
              notes: document.getElementById("f_form_notes").value,
            });
            expandedKeys.add(treeKey("initiative", iid));
            saveExpandedState();
          }
        );
        return;
      }
      if (ts.kind === "project") {
        const pid = ts.id;
        const pr = projectById(pid);
        const iniP = pr ? initiativeById(pr.initiativeId) : null;
        const addMBanner =
          pr && iniP
            ? modalAddContextBanner("Features/Milestones", [domainName(iniP.domainId), iniP.name, pr.name])
            : "";
        openModal(
          "Add feature / milestone",
          `${addMBanner}
          <div class="field"><label>Name <span class="req">*</span></label><input id="f_mn" required data-modal-autofocus /></div>
          <div class="field"><label>Description</label><textarea id="f_mdesc" rows="2"></textarea></div>
          <div class="field"><label>Owner <span class="req">*</span></label><input id="f_mo" required /></div>
          <div class="field"><label>Committed date (to BU)</label><input id="f_mcd" type="date" /></div>
          <div class="field"><label>Planned date</label><input id="f_md" type="date" /></div>
          <div class="field"><label>Delivery status <span class="req">*</span></label>
            <select id="f_mds">${MILESTONE_DELIVERY_STATUS.map(
              (s) => `<option value="${esc(s)}" ${s === "Planned" ? "selected" : ""}>${esc(s)}</option>`
            ).join("")}</select>
          </div>
          <div class="field"><label>Deliverable link</label><input id="f_mlk" type="url" placeholder="https://…" /></div>
          <div class="field"><label>Labels</label>${labelsCheckboxHtml([], "add_ms")}</div>
          <div class="field"><label>Notes</label><textarea id="f_form_notes" rows="4" placeholder="Free-form notes…"></textarea></div>`,
          () => {
            state.milestones.push({
              id: uid(),
              projectId: pid,
              name: document.getElementById("f_mn").value.trim() || "New feature / milestone",
              description: document.getElementById("f_mdesc").value,
              owner: document.getElementById("f_mo").value.trim() || "—",
              committedDate: document.getElementById("f_mcd").value || "",
              plannedDate: document.getElementById("f_md").value || "",
              deliveryStatus: document.getElementById("f_mds").value,
              deliverableLink: document.getElementById("f_mlk").value.trim(),
              labelIds: readLabelCheckboxes("add_ms"),
              notes: document.getElementById("f_form_notes").value,
            });
            expandedKeys.add(treeKey("project", pid));
            saveExpandedState();
          }
        );
        return;
      }
      if (ts.kind === "milestone" || ts.kind === "task") {
        const milestoneId =
          ts.kind === "milestone" ? ts.id : (state.tasks.find((x) => x.id === ts.id) || {}).milestoneId;
        if (!milestoneId) {
          toast("Could not resolve Features/Milestones row for this task.");
          return;
        }
        const addTBanner = modalAddContextBanner("Task", milestoneContextPathParts(milestoneId));
        openModal(
          "Add task",
          `${addTBanner}
          <div class="field"><label>Task name <span class="req">*</span></label><input id="f_ttitle" required data-modal-autofocus /></div>
          <div class="field"><label>Assignee</label><input id="f_tas" value="${esc(profileDisplayName)}" /></div>
          <div class="field"><label>Due date</label><input id="f_td" type="date" /></div>
          <div class="field"><label>Task status</label>
            <select id="f_tst">${TASK_COLUMNS.map((s) => `<option value="${esc(s)}">${esc(s)}</option>`).join("")}</select>
          </div>
          <div class="field"><label>Labels</label>${labelsCheckboxHtml([], "add_task_outline")}</div>`,
          () => {
            state.tasks.push({
              id: uid(),
              milestoneId: milestoneId,
              title: document.getElementById("f_ttitle").value.trim() || "New task",
              assignee: document.getElementById("f_tas").value.trim() || "—",
              status: document.getElementById("f_tst").value,
              workItemType: "Task",
              labelIds: readLabelCheckboxes("add_task_outline"),
              targetDate: document.getElementById("f_td").value || "",
              subtasks: [],
              acceptanceCriteria: "",
              discussion: [],
            });
            normalizeTaskRecord(state.tasks[state.tasks.length - 1]);
            expandedKeys.add(treeKey("milestone", milestoneId));
            saveExpandedState();
          }
        );
        return;
      }
      toast("Select a Service, initiative, epic, Features/Milestones row, or task row.");
      return;
    }
    if (view === "board") {
      const defaultMid =
        boardScopeMilestoneId || (state.milestones[0] && state.milestones[0].id) || "";
      if (!state.milestones.length) {
        toast("Add a Features/Milestones row in the outline before creating tasks.");
        return;
      }
      const mopts = state.milestones
        .map((m) => {
          const sel = m.id === defaultMid ? " selected" : "";
          return `<option value="${esc(m.id)}"${sel}>${esc(formatMilestonePickLabel(m))}</option>`;
        })
        .join("");
      openModal(
        "Add task",
        `<div class="field"><label>Parent Features/Milestones row <span class="req">*</span></label>
          <select id="f_tms" required data-modal-autofocus>${mopts}</select>
        </div>
        <div class="field"><label>Task name <span class="req">*</span></label><input id="f_ttitle" required /></div>
        <div class="field"><label>Assignee</label><input id="f_tas" value="${esc(profileDisplayName)}" /></div>
        <div class="field"><label>Due date</label><input id="f_td" type="date" /></div>
        <div class="field"><label>Task status</label>
          <select id="f_tst">${TASK_COLUMNS.map((s) => `<option value="${esc(s)}">${esc(s)}</option>`).join("")}</select>
        </div>
        <div class="field"><label>Labels</label>${labelsCheckboxHtml([], "add_task_board")}</div>`,
        () => {
          const midPick = document.getElementById("f_tms").value;
          if (!midPick) return;
          const nt = {
            id: uid(),
            milestoneId: midPick,
            title: document.getElementById("f_ttitle").value.trim() || "New task",
            assignee: document.getElementById("f_tas").value.trim() || "—",
            status: document.getElementById("f_tst").value,
            workItemType: "Task",
            labelIds: readLabelCheckboxes("add_task_board"),
            targetDate: document.getElementById("f_td").value || "",
            subtasks: [],
            acceptanceCriteria: "",
            discussion: [],
          };
          normalizeTaskRecord(nt);
          state.tasks.push(nt);
        }
      );
    }
  }

  document.querySelectorAll(".nav-btn[data-view]").forEach((btn) => {
    btn.addEventListener("click", () => {
      if (btn.disabled) return;
      if (btn.dataset.view === "board") {
        boardScopeMilestoneId = null;
        boardAssigneeFilter = "__all__";
        boardTaskFilterDomain = "";
        boardTaskFilterBU = "";
        boardTaskFilterInitiative = "";
        boardTaskFilterProject = "";
        drill.milestoneId = null;
      }
      view = btn.dataset.view;
      document.querySelectorAll(".nav-btn[data-view]").forEach((b) => b.classList.toggle("on", b === btn));
      render();
    });
  });

  document.querySelector('.nav-btn[data-action="theme"]').addEventListener("click", () => {
    const b = document.body;
    const d = b.getAttribute("data-theme") === "dark" ? "light" : "dark";
    b.setAttribute("data-theme", d);
    try {
      localStorage.setItem("atlas_portfolio_unified_theme", d);
    } catch (e) {}
  });

  document.querySelector('.nav-btn[data-action="reset"]').addEventListener("click", () => {
    if (!confirm("Reset all portfolio preview data to the built-in demo?")) return;
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(EXPANDED_KEY);
    state = seedData();
    boardAssigneeFilter = "__all__";
    boardScopeMilestoneId = null;
    boardTaskFilterDomain = "";
    boardTaskFilterBU = "";
    boardTaskFilterInitiative = "";
    boardTaskFilterProject = "";
    boardKanbanMode = "milestones";
    adminTab = "areas";
    try {
      localStorage.removeItem(BOARD_KANBAN_MODE_KEY);
      localStorage.removeItem(ADMIN_TAB_KEY);
    } catch (e) {}
    drill = { domainId: null, initiativeId: null, projectId: null, milestoneId: null };
    treeSelection = null;
    outlineBulkKeys.clear();
    seedAllExpanded();
    saveExpandedState();
    toast("Demo data restored");
    render();
  });

  document.getElementById("globalSearch").addEventListener("input", () => render());
  document.getElementById("btnAdd").addEventListener("click", addEntity);
  document.getElementById("modalCloseBtn").addEventListener("click", closeModal);
  document.getElementById("modalCancelBtn").addEventListener("click", closeModal);
  document.getElementById("overlay").addEventListener("click", (e) => {
    if (e.target.id === "overlay") closeModal();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key !== "Escape") return;
    const ov = document.getElementById("overlay");
    if (ov && ov.classList.contains("open")) {
      e.preventDefault();
      closeModal();
    }
  });

  load();
  hydratePortfolioNotes();
  hydrateAllTasks();
  loadExpandedState();
  readProfileFromStorage();
  readRoleFromStorage();
  readBoardKanbanModeFromStorage();
  readAdminTabFromStorage();
  try {
    const th = localStorage.getItem("atlas_portfolio_unified_theme");
    if (th === "dark") document.body.setAttribute("data-theme", "dark");
  } catch (e) {}
  syncProfileInput();
  const pn = document.getElementById("portfolioProfileName");
  if (pn) {
    pn.addEventListener("change", () => {
      persistProfileName(pn.value);
      if (view === "board" || view === "hierarchy") render();
    });
  }
  const prSel = document.getElementById("portfolioRole");
  if (prSel) {
    prSel.value = portfolioRole;
    prSel.addEventListener("change", () => {
      persistRole(prSel.value);
      render();
    });
  }
  syncNavBoard();
  /** Optional console: portfolioTools.promoteEpicsToSiblingInitiatives("AI Roadmapping", "AI for the Business") */
  window.portfolioTools = {
    promoteEpicsToSiblingInitiatives: (serviceNeedle, parentInitiativeName) => {
      const r = promoteEpicsToSiblingInitiatives(serviceNeedle, parentInitiativeName);
      if (r.ok) render();
      return r;
    },
    /** Promote a single epic to an initiative (placeholder epic "Delivery"); then save + re-render. */
    promoteSingleEpicToInitiative: (projectId) => {
      const r = promoteSingleEpicToInitiative(projectId);
      if (r.ok) {
        save();
        render();
      }
      return r;
    },
    convertTaskToMilestone: (taskId) => {
      const r = convertTaskToMilestone(taskId);
      if (r.ok) {
        save();
        render();
      }
      return r;
    },
    convertMilestoneToEpic: (milestoneId) => {
      const r = convertMilestoneToEpic(milestoneId);
      if (r.ok) {
        save();
        render();
      }
      return r;
    },
    exportFullPortfolioJson,
    /** @returns {{ ok: boolean, message: string }} */
    importFullPortfolioFromJsonText: (text) => {
      try {
        const { state: next } = parseFullPortfolioJsonText(text);
        if (!next) return { ok: false, message: "Invalid portfolio JSON." };
        const r = applyFullPortfolioImportState(next);
        if (r.ok) render();
        return r;
      } catch (e) {
        return { ok: false, message: e && e.message ? e.message : String(e) };
      }
    },
  };
  render();
})();
  </script>
</body>
</html>
